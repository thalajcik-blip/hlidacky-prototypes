<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translation Editor — Hlídačky.cz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #f96073;
      --pink-hover: #e8556a;
      --gray-800: #2a3539;
      --gray-600: #6b7176;
      --gray-300: #c8cacc;
      --gray-200: #e8eaeb;
      --gray-100: #f4f5f5;
      --white: #ffffff;
      --green: #1a6e3a;
      --font: 'Inter', sans-serif;
    }

    body {
      font-family: var(--font);
      color: var(--gray-800);
      background: var(--gray-100);
      min-height: 100vh;
    }

    /* Header */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo { height: 22px; }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--gray-800);
    }

    .badge {
      background: var(--pink);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 100px;
      letter-spacing: 0.3px;
    }

    /* Layout */
    .main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    /* Language tabs */
    .lang-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 5px;
    }

    .lang-tab {
      flex: 1;
      padding: 8px 12px;
      border: none;
      background: none;
      border-radius: 7px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-600);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }

    .lang-tab:hover {
      background: var(--gray-100);
      color: var(--gray-800);
    }

    .lang-tab.active {
      background: var(--gray-800);
      color: white;
    }

    .lang-tab .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--pink);
      display: none;
    }

    .lang-tab.has-changes .dot {
      display: inline-block;
    }

    /* Progress */
    #progress-wrap { margin-bottom: 20px; }

    .progress-label {
      font-size: 12px;
      color: var(--gray-600);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .progress-bar {
      height: 4px;
      background: var(--gray-200);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--pink);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .toolbar-left {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .toolbar-right {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .search-input {
      padding: 7px 12px;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-family: var(--font);
      font-size: 14px;
      width: 220px;
      outline: none;
      background: white;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: var(--pink); }

    .section-filter {
      padding: 7px 10px;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-family: var(--font);
      font-size: 14px;
      background: white;
      outline: none;
      cursor: pointer;
      color: var(--gray-800);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 13px;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--pink);
      color: white;
    }
    .btn-primary:hover { background: var(--pink-hover); }

    .btn-outline {
      background: white;
      color: var(--gray-800);
      border: 1px solid var(--gray-200);
    }
    .btn-outline:hover { background: var(--gray-100); }

    .btn-danger {
      background: white;
      color: #c0392b;
      border: 1px solid var(--gray-200);
    }
    .btn-danger:hover { background: #fff5f5; border-color: #f5c6c6; }

    /* Table */
    .table-wrap {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    col.col-key   { width: 200px; }
    col.col-ref   { width: 40%; }
    col.col-edit  { width: auto; }

    thead th {
      background: var(--gray-100);
      padding: 9px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-600);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--gray-200);
    }

    tbody tr { border-bottom: 1px solid var(--gray-200); }
    tbody tr:last-child { border-bottom: none; }

    .section-row td {
      background: var(--gray-100);
      padding: 5px 16px;
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-600);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      border-bottom: 1px solid var(--gray-200);
    }

    td {
      padding: 6px 16px;
      vertical-align: top;
    }

    .key-cell {
      font-family: 'Courier New', monospace;
      font-size: 11.5px;
      color: var(--gray-600);
      word-break: break-all;
      padding-top: 10px;
    }

    .ref-cell {
      font-size: 13.5px;
      color: var(--gray-600);
      padding-top: 10px;
      line-height: 1.5;
      word-break: break-word;
    }

    .edit-cell { padding: 4px 16px 4px 0; }

    .string-input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid transparent;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 13.5px;
      color: var(--gray-800);
      background: transparent;
      resize: none;
      outline: none;
      line-height: 1.5;
      overflow: hidden;
      transition: border-color 0.12s, background 0.12s, box-shadow 0.12s;
    }

    .string-input:not([readonly]):hover {
      border-color: var(--gray-200);
    }

    .string-input:focus {
      border-color: var(--pink);
      background: white;
      box-shadow: 0 0 0 3px rgba(249, 96, 115, 0.1);
    }

    .string-input.modified {
      color: var(--green);
      font-weight: 500;
    }

    .string-input[readonly] {
      color: var(--gray-600);
      cursor: default;
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--gray-600);
      font-size: 14px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--gray-800);
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .hidden { display: none !important; }

    /* Settings panel */
    .settings-panel {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 20px;
      display: none;
    }
    .settings-panel.open { display: block; }
    .settings-panel h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-800);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .settings-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .settings-row label {
      font-size: 13px;
      color: var(--gray-600);
      white-space: nowrap;
    }
    .token-input {
      flex: 1;
      min-width: 280px;
      padding: 7px 12px;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
    }
    .token-input:focus { border-color: var(--pink); }
    .settings-hint {
      font-size: 12px;
      color: var(--gray-600);
      margin-top: 8px;
    }
    .settings-hint a { color: var(--pink); }
    .token-status {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 100px;
    }
    .token-status.ok { background: #e6f4ec; color: #1a6e3a; }
    .token-status.missing { background: #fef3cd; color: #7a5c00; }

    /* Publish button */
    .btn-publish {
      background: #1a6e3a;
      color: white;
    }
    .btn-publish:hover:not(:disabled) { background: #155c30; }
    .btn-publish:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Deploy status bar */
    .deploy-status {
      display: none;
      align-items: center;
      gap: 10px;
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 14px;
      font-size: 13px;
    }
    .deploy-status.visible { display: flex; }
    .deploy-status.success { border-color: #a8d5b8; background: #f0faf4; color: #1a6e3a; }
    .deploy-status.error   { border-color: #f5c6c6; background: #fff5f5; color: #c0392b; }
    .deploy-status.loading { color: var(--gray-600); }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--gray-200);
      border-top-color: var(--pink);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .deploy-status a { color: inherit; font-weight: 600; }
  </style>
  <style>
    #login-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--gray-100);
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 36px 32px;
      width: 100%; max-width: 360px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .login-box img { height: 24px; margin-bottom: 4px; }
    .login-box h2 { font-size: 17px; font-weight: 600; color: var(--gray-800); }
    .login-box label { font-size: 12px; font-weight: 600; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.4px; display: block; margin-bottom: 5px; }
    .login-box input {
      width: 100%; padding: 8px 12px;
      border: 1px solid var(--gray-200); border-radius: 8px;
      font-family: var(--font); font-size: 14px; outline: none;
    }
    .login-box input:focus { border-color: var(--pink); }
    .login-error { font-size: 13px; color: #c0392b; display: none; }
    .login-error.show { display: block; }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <img src="/hlidacky-logo_small.svg" alt="Hlídačky.cz">
    <h2>Translation Editor</h2>
    <div>
      <label>Username</label>
      <input type="text" id="login-user" autocomplete="username" autofocus>
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="login-pass" autocomplete="current-password">
    </div>
    <span class="login-error" id="login-error">Incorrect username or password.</span>
    <button class="btn btn-primary" id="login-btn" style="width:100%;justify-content:center;padding:10px">Log in</button>
  </div>
</div>

<script>
(function() {
  if (sessionStorage.getItem('hlidacky_auth') === '1') {
    document.getElementById('login-overlay').style.display = 'none';
    return;
  }
  function attempt() {
    var u = document.getElementById('login-user').value;
    var p = document.getElementById('login-pass').value;
    if (u === 'hlidacky' && p === 'conquering-europe') {
      sessionStorage.setItem('hlidacky_auth', '1');
      document.getElementById('login-overlay').style.display = 'none';
    } else {
      document.getElementById('login-error').classList.add('show');
      document.getElementById('login-pass').value = '';
      document.getElementById('login-pass').focus();
    }
  }
  document.getElementById('login-btn').addEventListener('click', attempt);
  document.getElementById('login-pass').addEventListener('keydown', function(e) { if (e.key === 'Enter') attempt(); });
  document.getElementById('login-user').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('login-pass').focus(); });
})();
</script>

<header>
  <img src="/hlidacky-logo_small.svg" class="logo" alt="Hlídačky.cz">
  <h1>Translation Editor</h1>
  <span class="badge">internal tool</span>
</header>

<div class="main">

  <div class="lang-tabs" id="lang-tabs"></div>

  <!-- GitHub settings panel -->
  <div class="settings-panel" id="settings-panel">
    <h3>GitHub connection</h3>
    <div class="settings-row">
      <label>Personal Access Token</label>
      <input type="password" class="token-input" id="gh-token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      <button class="btn btn-outline" id="btn-save-token">Save token</button>
      <span class="token-status missing hidden" id="token-status"></span>
    </div>
    <p class="settings-hint">
      Token requires scope <strong>repo</strong>.
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=Hlidacky+strings+editor" target="_blank">Generate token on GitHub →</a>
    </p>
  </div>

  <div class="deploy-status" id="deploy-status">
    <span class="spinner hidden" id="deploy-spinner"></span>
    <span id="deploy-msg"></span>
  </div>

  <div id="progress-wrap">
    <div class="progress-label" id="progress-label"></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="toolbar">
    <div class="toolbar-left">
      <select class="section-filter" id="prototype-filter"></select>
      <input type="text" class="search-input" placeholder="🔍 Search keys or text…" id="search-input">
      <select class="section-filter" id="section-filter">
        <option value="">All sections</option>
      </select>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-outline" id="btn-upload">↑ Upload JSON</button>
      <input type="file" id="file-upload" accept=".json" class="hidden">
      <button class="btn btn-outline" id="btn-download">↓ Download JSON</button>
      <button class="btn btn-danger hidden" id="btn-reset">↺ Reset to EN</button>
      <button class="btn btn-outline" id="btn-settings" title="GitHub token settings">⚙️</button>
      <button class="btn btn-primary" id="btn-save">Save</button>
      <button class="btn btn-publish hidden" id="btn-publish" disabled>🚀 Publish</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <colgroup>
        <col class="col-key">
        <col class="col-ref">
        <col class="col-edit">
      </colgroup>
      <thead>
        <tr>
          <th>Key</th>
          <th>🇬🇧 EN (source)</th>
          <th id="col-lang-header">Translation</th>
        </tr>
      </thead>
      <tbody id="strings-tbody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PROTOTYPES = [
  { id: 'jobs', label: 'Jobs for families', base: '/jobs' }
];

const LANGUAGES = [
  { code: 'CZ', label: 'Čeština',      flag: '🇨🇿' },
  { code: 'SK', label: 'Slovenčina',   flag: '🇸🇰' },
  { code: 'HU', label: 'Magyar',       flag: '🇭🇺' },
  { code: 'AT', label: 'Deutsch (AT)', flag: '🇦🇹' },
  { code: 'HR', label: 'Hrvatski',     flag: '🇭🇷' },
  { code: 'EN', label: 'English',      flag: '🇬🇧' },
];

let baseSource = {};    // flat CZ base keys → values (from strings.js / STRINGS global)
let enSource = {};      // flat EN source keys → values (CZ base + EN overrides)
let czSource = {};      // alias kept for CZ-specific actions
let allLangs  = {};     // { CZ: {flat}, SK: {flat}, … }
let touched   = {};     // { SK: Set{key, …}, EN: Set{key, …}, … } — confirmed by upload or manual edit
let currentLang = 'EN';
let pendingChanges = {};
let currentPrototype = null;

/* ── Flatten / Unflatten ─────────────────────────────────── */

function flatten(obj, prefix) {
  const out = {};
  prefix = prefix || '';
  for (const k of Object.keys(obj)) {
    const path = prefix ? prefix + '.' + k : k;
    const v = obj[k];
    if (Array.isArray(v)) {
      v.forEach(function(item, i) {
        if (item !== null && typeof item === 'object') {
          Object.assign(out, flatten(item, path + '.' + i));
        } else {
          out[path + '.' + i] = String(item);
        }
      });
    } else if (v !== null && typeof v === 'object') {
      Object.assign(out, flatten(v, path));
    } else {
      out[path] = String(v);
    }
  }
  return out;
}

function unflatten(flat) {
  const result = {};
  for (const key of Object.keys(flat)) {
    const parts = key.split('.');
    let cur = result;
    for (let i = 0; i < parts.length - 1; i++) {
      const p = parts[i];
      const nextIsNum = /^\d+$/.test(parts[i + 1]);
      if (cur[p] === undefined) cur[p] = nextIsNum ? [] : {};
      cur = cur[p];
    }
    const last = parts[parts.length - 1];
    if (/^\d+$/.test(last)) {
      cur[parseInt(last)] = flat[key];
    } else {
      cur[last] = flat[key];
    }
  }
  return result;
}

/* ── Storage ─────────────────────────────────────────────── */

function prototypeStoragePrefix() {
  return 'hlidacky_' + (currentPrototype ? currentPrototype.id : 'jobs') + '_';
}

function storageKey(lang) { return prototypeStoragePrefix() + 'strings_' + lang; }
function touchedKey(lang)  { return prototypeStoragePrefix() + 'touched_' + lang; }

function saveLang(lang, flat) {
  localStorage.setItem(storageKey(lang), JSON.stringify(flat));
}

function saveTouched(lang) {
  localStorage.setItem(touchedKey(lang), JSON.stringify(Array.from(touched[lang] || [])));
}

function loadTouched(lang) {
  const s = localStorage.getItem(touchedKey(lang));
  return s ? new Set(JSON.parse(s)) : new Set();
}

function loadLang(lang) {
  const s = localStorage.getItem(storageKey(lang));
  return s ? JSON.parse(s) : null;
}

function getPrototypeById(id) {
  return PROTOTYPES.find(function(proto) { return proto.id === id; }) || PROTOTYPES[0];
}

function getPrototypeQueryParam() {
  return new URLSearchParams(location.search).get('prototype');
}

function rememberPrototype(id) {
  localStorage.setItem('hlidacky_current_prototype', id);
}

function getInitialPrototype() {
  return getPrototypeById(
    getPrototypeQueryParam() ||
    localStorage.getItem('hlidacky_current_prototype') ||
    PROTOTYPES[0].id
  );
}

function prototypeAssetPath(path) {
  return currentPrototype.base + '/' + path.replace(/^\/+/, '');
}

function ghRepoPath(path) {
  return currentPrototype.base.replace(/^\/+/, '') + '/' + path.replace(/^\/+/, '');
}

function parseBaseStrings(text) {
  if (!text) return null;
  var match = text.match(/window\.STRINGS\s*=\s*(\{[\s\S]*\})\s*;/);
  if (!match) return null;
  try {
    return flatten(JSON.parse(match[1]));
  } catch (e) {
    return null;
  }
}

/* ── Init ─────────────────────────────────────────────────── */

async function init() {
  currentPrototype = getInitialPrototype();
  pendingChanges = {};
  baseSource = {};
  enSource = {};
  czSource = {};
  allLangs = {};
  touched = {};

  renderPrototypeFilter();

  var resp;
  try {
    resp = await fetch(prototypeAssetPath('strings.js'));
  } catch (e) {}
  if (!resp || !resp.ok) {
    document.querySelector('.main').innerHTML =
      '<div style="padding:60px;text-align:center;color:#c0392b;font-size:15px">' +
      'Error: strings.js could not be loaded for ' + currentPrototype.label + '.</div>';
    return;
  }

  var text = await resp.text();
  var parsed = parseBaseStrings(text);
  if (!parsed) {
    document.querySelector('.main').innerHTML =
      '<div style="padding:60px;text-align:center;color:#c0392b;font-size:15px">' +
      'Error: strings.js could not be parsed for ' + currentPrototype.label + '.</div>';
    return;
  }

  baseSource = parsed;
  czSource = Object.assign({}, baseSource);
  enSource = Object.assign({}, baseSource);

  // CZ is always sourced from strings.js (authoritative)
  allLangs['CZ'] = Object.assign({}, czSource);
  saveLang('CZ', allLangs['CZ']);

  // Other languages default to EN source; while EN overrides are still loading,
  // baseSource acts as a temporary fallback and is later upgraded to EN.
  LANGUAGES.forEach(function(lang) {
    if (lang.code === 'CZ') return;
    const saved = loadLang(lang.code);
    allLangs[lang.code] = Object.assign({}, enSource, saved || {});
    if (!saved) saveLang(lang.code, allLangs[lang.code]);
    touched[lang.code] = loadTouched(lang.code);
  });

  renderTabs();
  renderSectionFilter();
  renderTable();
  bindToolbar();
  loadPublishedLangFiles();
}

function syncLangDefaults(langCode, prevDefaults, nextDefaults) {
  var current = allLangs[langCode] || {};
  var langTouched = touched[langCode] || new Set();
  Object.keys(nextDefaults).forEach(function(k) {
    var currentVal = current[k];
    var missing = currentVal === undefined;
    var stillOnPrevDefault = currentVal === prevDefaults[k];
    if (!langTouched.has(k) && (missing || stillOnPrevDefault)) {
      current[k] = nextDefaults[k];
    }
  });
  allLangs[langCode] = current;
  saveLang(langCode, current);
}

function parsePublishedOverrides(text) {
  if (!text) return null;
  var match = text.match(/_dm\(window\.STRINGS,\s*(\{[\s\S]*\})\s*\)\s*;/);
  if (!match) return null;
  try {
    return flatten(JSON.parse(match[1]));
  } catch (e) {
    return null;
  }
}

async function loadPublishedLangFile(langCode) {
  var path = prototypeAssetPath('strings_' + langCode.toLowerCase() + '.js');
  try {
    var resp = await fetch(path);
    if (!resp.ok) return;
    var text = await resp.text();
    var flat = parsePublishedOverrides(text);
    if (!flat) return;

    if (langCode === 'EN') {
      var prevEnSource = Object.assign({}, enSource);
      enSource = Object.assign({}, baseSource, flat);
      syncLangDefaults('EN', prevEnSource, enSource);
      LANGUAGES.forEach(function(lang) {
        if (lang.code === 'CZ' || lang.code === 'EN') return;
        syncLangDefaults(lang.code, prevEnSource, enSource);
      });
      return;
    }

    var current = allLangs[langCode];
    var langTouched = touched[langCode] || new Set();
    Object.keys(flat).forEach(function(k) {
      if (!langTouched.has(k) && current[k] === enSource[k] && flat[k] !== enSource[k]) {
        current[k] = flat[k];
      }
    });
    saveLang(langCode, current);
  } catch (e) {}
}

function renderPrototypeFilter() {
  var sel = document.getElementById('prototype-filter');
  sel.innerHTML = PROTOTYPES.map(function(proto) {
    return '<option value="' + proto.id + '">' + proto.label + '</option>';
  }).join('');
  sel.value = currentPrototype.id;
}

// Fetch published lang .js files and sync any keys missing from localStorage into allLangs.
async function loadPublishedLangFiles() {
  await loadPublishedLangFile('EN');
  await Promise.all(LANGUAGES.filter(function(lang) {
    return lang.code !== 'CZ' && lang.code !== 'EN';
  }).map(function(lang) {
    return loadPublishedLangFile(lang.code);
  }));
  renderTabs();
  renderTable();
}

/* ── Tabs ─────────────────────────────────────────────────── */

function countChanges(lang) {
  if (lang === 'CZ') return 0;
  return (touched[lang] || new Set()).size;
}

function renderTabs() {
  const container = document.getElementById('lang-tabs');
  container.innerHTML = LANGUAGES.map(function(lang) {
    const changes = countChanges(lang.code);
    const isActive = lang.code === currentLang;
    const hasChanges = changes > 0;
    return '<button class="lang-tab' +
      (isActive ? ' active' : '') +
      (hasChanges ? ' has-changes' : '') +
      '" data-lang="' + lang.code + '">' +
      lang.flag + ' ' + lang.label +
      '<span class="dot"></span>' +
      '</button>';
  }).join('');

  container.querySelectorAll('.lang-tab').forEach(function(btn) {
    btn.addEventListener('click', function() { switchLang(btn.dataset.lang); });
  });
}

/* ── Section filter ──────────────────────────────────────── */

function getSections() {
  const seen = {};
  Object.keys(czSource).forEach(function(k) { seen[k.split('.')[0]] = true; });
  return Object.keys(seen);
}

function renderSectionFilter() {
  const sel = document.getElementById('section-filter');
  sel.innerHTML = '<option value="">All sections</option>' +
    getSections().map(function(s) {
      return '<option value="' + s + '">' + s + '</option>';
    }).join('');
}

/* ── Table ───────────────────────────────────────────────── */

function renderTable() {
  const tbody    = document.getElementById('strings-tbody');
  const search   = document.getElementById('search-input').value.toLowerCase();
  const section  = document.getElementById('section-filter').value;
  const langData = allLangs[currentLang] || {};
  const isCZ     = currentLang === 'CZ';

  const langMeta = LANGUAGES.find(function(l) { return l.code === currentLang; });
  document.getElementById('col-lang-header').textContent =
    langMeta ? langMeta.flag + ' ' + langMeta.label : currentLang;

  // Progress (non-CZ)
  const progressWrap = document.getElementById('progress-wrap');
  if (isCZ) {
    progressWrap.style.display = 'none';
  } else {
    progressWrap.style.display = '';
    const total = Object.keys(enSource).length;
    const langTouched = touched[currentLang] || new Set();
    const translated = Object.keys(enSource).filter(function(k) {
      return langTouched.has(k);
    }).length;
    const pct = total > 0 ? Math.round(translated / total * 100) : 0;
    document.getElementById('progress-label').textContent =
      'Translated: ' + translated + ' / ' + total + ' strings (' + pct + '%)';
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  // Toolbar actions
  document.getElementById('btn-reset').classList.toggle('hidden', isCZ);
  document.getElementById('btn-upload').classList.remove('hidden');

  const keys = Object.keys(baseSource);
  let html = '';
  let currentSection = null;
  let visibleCount = 0;

  keys.forEach(function(key) {
    const sectionName = key.split('.')[0];
    const enVal    = (allLangs['EN'] && allLangs['EN'][key]) || enSource[key] || baseSource[key] || '';
    const czVal    = enVal;
    const transVal = (langData[key] !== undefined) ? langData[key] : enSource[key] || baseSource[key] || '';

    if (section && sectionName !== section) return;
    if (search) {
      const subKey = key.slice(sectionName.length + 1);
      if (
        key.toLowerCase().indexOf(search) === -1 &&
        subKey.toLowerCase().indexOf(search) === -1 &&
        czVal.toLowerCase().indexOf(search) === -1 &&
        transVal.toLowerCase().indexOf(search) === -1
      ) return;
    }

    if (sectionName !== currentSection) {
      currentSection = sectionName;
      html += '<tr class="section-row"><td colspan="3">' + esc(sectionName) + '</td></tr>';
    }

    const subKey    = key.slice(sectionName.length + 1);
    const isModified = !isCZ && (touched[currentLang] || new Set()).has(key);
    visibleCount++;

    html += '<tr>' +
      '<td class="key-cell" title="' + esc(key) + '">' + esc(subKey) + '</td>' +
      '<td class="ref-cell">' + esc(czVal) + '</td>' +
      '<td class="edit-cell">' +
        '<textarea class="string-input' + (isModified ? ' modified' : '') + '"' +
          ' data-key="' + esc(key) + '"' +
          (isCZ ? ' readonly' : '') +
          ' rows="1">' + esc(transVal) + '</textarea>' +
      '</td>' +
      '</tr>';
  });

  if (visibleCount === 0) {
    html = '<tr><td colspan="3" class="empty-state">No results for the current filter.</td></tr>';
  }

  tbody.innerHTML = html;

  // Auto-resize & input binding
  tbody.querySelectorAll('.string-input').forEach(function(ta) {
    autoResize(ta);
    if (!isCZ) {
      ta.addEventListener('input', function() {
        autoResize(ta);
        pendingChanges[ta.dataset.key] = ta.value;
        if (!touched[currentLang]) touched[currentLang] = new Set();
        touched[currentLang].add(ta.dataset.key);
        ta.classList.toggle('modified', touched[currentLang].has(ta.dataset.key));
      });
    }
  });
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ── Actions ─────────────────────────────────────────────── */

function applyAndSave() {
  if (Object.keys(pendingChanges).length === 0) return;
  Object.keys(pendingChanges).forEach(function(k) {
    allLangs[currentLang][k] = pendingChanges[k];
  });
  saveLang(currentLang, allLangs[currentLang]);
  saveTouched(currentLang);
  pendingChanges = {};
}

function switchLang(code) {
  if (Object.keys(pendingChanges).length > 0) applyAndSave();
  currentLang = code;
  pendingChanges = {};
  renderTabs();
  renderTable();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2600);
}

function bindToolbar() {
  document.getElementById('prototype-filter').addEventListener('change', function(e) {
    if (Object.keys(pendingChanges).length > 0) applyAndSave();
    currentPrototype = getPrototypeById(e.target.value);
    rememberPrototype(currentPrototype.id);
    history.replaceState(null, '', '?prototype=' + encodeURIComponent(currentPrototype.id));
    pendingChanges = {};
    init();
  });

  document.getElementById('btn-save').addEventListener('click', function() {
    applyAndSave();
    showToast('✓ Changes saved');
    renderTabs();
    renderTable();
  });

  function downloadFile(content, filename, type) {
    const blob = new Blob([content], { type: type });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  document.getElementById('btn-download').addEventListener('click', function() {
    applyAndSave();
    const nested = unflatten(allLangs[currentLang]);
    const json   = JSON.stringify(nested, null, 2);
    downloadFile(
      json,
      currentPrototype.id + '_strings_' + currentLang.toLowerCase() + '.json',
      'application/json'
    );
  });

  document.getElementById('btn-upload').addEventListener('click', function() {
    document.getElementById('file-upload').click();
  });

  document.getElementById('file-upload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(evt) {
      try {
        const obj = JSON.parse(evt.target.result);
        allLangs[currentLang] = flatten(obj);
        saveLang(currentLang, allLangs[currentLang]);
        // Mark all uploaded keys as confirmed/translated
        if (!touched[currentLang]) touched[currentLang] = new Set();
        Object.keys(allLangs[currentLang]).forEach(function(k) { touched[currentLang].add(k); });
        saveTouched(currentLang);
        pendingChanges = {};
        renderTabs();
        renderTable();
      showToast('✓ Loaded ' + Object.keys(allLangs[currentLang]).length + ' strings');
      } catch (err) {
        alert('Error loading JSON: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  document.getElementById('btn-reset').addEventListener('click', function() {
    const langLabel = LANGUAGES.find(function(l) { return l.code === currentLang; }).label;
    if (!confirm('Reset ' + langLabel + ' to EN source?\n\nAll translations for this language will be lost.')) return;
    allLangs[currentLang] = Object.assign({}, enSource);
    touched[currentLang] = new Set();
    saveLang(currentLang, allLangs[currentLang]);
    saveTouched(currentLang);
    pendingChanges = {};
    renderTabs();
    renderTable();
    showToast('↺ ' + langLabel + ' reset to EN');
  });

  document.getElementById('search-input').addEventListener('input', renderTable);
  document.getElementById('section-filter').addEventListener('change', renderTable);
}

/* ── GitHub publishing ───────────────────────────────────── */

function buildJsContent(lang) {
  const nested = unflatten(allLangs[lang]);
  const meta   = LANGUAGES.find(function(l) { return l.code === lang; });
  if (lang === 'CZ') {
    return '// Auto-generated from strings.json — do not edit manually.\n' +
           '// To update: paste the translated JSON content between the braces below.\n\n' +
           'window.STRINGS = ' + JSON.stringify(nested, null, 2) + ';\n';
  }
  const dm     = 'function _dm(b,o){var r=Object.assign({},b||{});Object.keys(o).forEach(function(k){r[k]=(o[k]&&typeof o[k]==="object"&&!Array.isArray(o[k]))?_dm((b&&b[k])||{},o[k]):o[k];});return r;}';
  return '// strings_' + lang.toLowerCase() + '.js \u2014 ' + meta.label + '\n' +
         '// Published via /strings editor. Missing keys fall back to CZ source (strings.js).\n' +
         '(function(){\n  ' + dm + '\n' +
         '  window.STRINGS = _dm(window.STRINGS, ' + JSON.stringify(nested, null, 2) + ');\n' +
         '})();\n';
}

const GH_REPO  = 'thalajcik-blip/hlidacky-prototypes';
const GH_API   = 'https://api.github.com';

function getToken() {
  return localStorage.getItem('hlidacky_gh_token') || '';
}

function setToken(t) {
  localStorage.setItem('hlidacky_gh_token', t.trim());
}

function ghFilePath(lang) {
  return ghRepoPath(lang === 'CZ' ? 'strings.js' : 'strings_' + lang.toLowerCase() + '.js');
}


function toBase64(str) {
  // Handles unicode (UTF-8 → binary → base64)
  var bytes = new TextEncoder().encode(str);
  var binary = '';
  bytes.forEach(function(b) { binary += String.fromCharCode(b); });
  return btoa(binary);
}

function setDeployStatus(type, msg, link) {
  var bar = document.getElementById('deploy-status');
  var msgEl = document.getElementById('deploy-msg');
  var spinner = document.getElementById('deploy-spinner');
  bar.className = 'deploy-status visible ' + type;
  spinner.classList.toggle('hidden', type !== 'loading');
  msgEl.innerHTML = link
    ? msg + ' <a href="' + link + '" target="_blank">View deploy →</a>'
    : msg;
}

function hideDeployStatus() {
  document.getElementById('deploy-status').className = 'deploy-status';
}

async function publishToGitHub() {
  const token = getToken();
  if (!token) {
    document.getElementById('settings-panel').classList.add('open');
    document.getElementById('gh-token-input').focus();
    return;
  }

  applyAndSave();
  const path    = ghFilePath(currentLang);
  const content = buildJsContent(currentLang);
  const headers = {
    'Authorization': 'Bearer ' + token,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
    'Content-Type': 'application/json'
  };

  var btn = document.getElementById('btn-publish');
  btn.disabled = true;
  setDeployStatus('loading', 'Publishing…');

  try {
    // 1. Get current file SHA
    var getResp = await fetch(GH_API + '/repos/' + GH_REPO + '/contents/' + path, { headers: headers });
    if (!getResp.ok && getResp.status !== 404) throw new Error('GitHub API: ' + getResp.status);
    var sha = null;
    if (getResp.ok) {
      var fileData = await getResp.json();
      sha = fileData.sha;
    }

    // 2. Commit updated file
    var body = {
      message: 'Update ' + path + ' via /strings editor',
      content: toBase64(content)
    };
    if (sha) body.sha = sha;

    var putResp = await fetch(GH_API + '/repos/' + GH_REPO + '/contents/' + path, {
      method: 'PUT',
      headers: headers,
      body: JSON.stringify(body)
    });
    if (!putResp.ok) {
      var err = await putResp.json();
      throw new Error(err.message || ('GitHub API: ' + putResp.status));
    }
    var result = await putResp.json();
    var vercelUrl = 'https://vercel.com/tomas-halajciks-projects/hlidacky-prototypes/deployments';
    setDeployStatus('success', '✓ Published — Vercel is deploying (~30–60 s)', vercelUrl);
    setTimeout(hideDeployStatus, 12000);
  } catch (err) {
    setDeployStatus('error', '✗ Error: ' + err.message);
  } finally {
    btn.disabled = false;
  }
}

function initGitHub() {
  // Token settings
  var tokenInput = document.getElementById('gh-token-input');
  var tokenStatus = document.getElementById('token-status');

  function updateTokenStatus() {
    var t = getToken();
    var publishBtn = document.getElementById('btn-publish');
    if (t) {
      tokenInput.value = t;
      tokenStatus.textContent = '✓ Token saved';
      tokenStatus.className = 'token-status ok';
      tokenStatus.classList.remove('hidden');
      publishBtn.classList.remove('hidden');
      publishBtn.disabled = false;
    } else {
      tokenStatus.textContent = 'Token missing';
      tokenStatus.className = 'token-status missing';
      tokenStatus.classList.remove('hidden');
      publishBtn.classList.add('hidden');
    }
  }

  document.getElementById('btn-save-token').addEventListener('click', function() {
    setToken(tokenInput.value);
    updateTokenStatus();
    document.getElementById('settings-panel').classList.remove('open');
    showToast('✓ Token saved');
  });

  document.getElementById('btn-settings').addEventListener('click', function() {
    document.getElementById('settings-panel').classList.toggle('open');
  });

  document.getElementById('btn-publish').addEventListener('click', publishToGitHub);

  updateTokenStatus();
}

/* ── Boot ────────────────────────────────────────────────── */
init();
initGitHub();
</script>
