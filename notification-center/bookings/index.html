<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hlidačky.cz - Bookings</title>
  <link rel="icon" type="image/svg+xml" href="/hlidacky-logo_small.svg">
  <style>
    :root {
      --pink-100: #FEECEE;
      --pink-300: #FF9BA7;
      --pink-400: #F96073;
      --pink-500: #E6213A;
      --gray-100: #F7F9FC;
      --gray-200: #EEF2F7;
      --gray-300: #E5E5EA;
      --gray-400: #BEC2CE;
      --gray-500: #8B91A3;
      --gray-600: #6C757D;
      --gray-700: #4A5A61;
      --gray-800: #2A3539;
      --gray-900: #212529;
      --white: #FFF;
      --color-pink-400: #F96073;
      --color-gray-200: #EEF2F7;
      --shadow-card: 0 10px 24px rgba(42, 53, 57, 0.08);
    }

    * { box-sizing: border-box; }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--white);
      color: var(--gray-800);
      font-family: Soleil, soleil, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a,
    button {
      cursor: pointer;
      font: inherit;
    }

    .app-shell {
      width: 100%;
      min-width: 1180px;
    }

    .topbar {
      position: relative;
      padding: 0 40px;
      border-bottom: 1px solid rgba(229, 229, 234, 0.9);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .brand img {
      width: 148px;
      height: auto;
      display: block;
    }

    .mobile-nav-toggle {
      display: none;
      width: 48px;
      height: 48px;
      padding: 8px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--gray-800);
      align-items: center;
      justify-content: center;
    }

    .mobile-nav-toggle-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .mobile-nav-toggle svg {
      width: 32px;
      height: 32px;
      display: block;
    }

    .mobile-nav-toggle-close {
      display: none;
    }

    .mobile-nav-toggle[aria-expanded="true"] .mobile-nav-toggle-menu {
      display: none;
    }

    .mobile-nav-toggle[aria-expanded="true"] .mobile-nav-toggle-close {
      display: inline-flex;
    }

    .main-nav {
      display: inline-flex;
      align-items: center;
      gap: 0;
    }

    .main-nav a {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 96px;
      padding: 12px 14px 8px;
      border-bottom: 6px solid transparent;
      color: var(--gray-800);
      text-decoration: none;
      text-align: center;
      font-size: 14px;
      font-weight: 450;
      line-height: 120%;
      letter-spacing: -0.3px;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    .main-nav a.active {
      color: var(--pink-400);
    }

    .main-nav a:hover,
    .main-nav a:focus-visible {
      border-bottom-color: var(--color-pink-400);
      background: var(--color-gray-200);
      outline: none;
    }

    .main-nav-icon {
      position: relative;
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 26px;
    }

    .main-nav-icon img {
      width: 26px;
      height: 26px;
      display: block;
      filter: brightness(0) saturate(100%) invert(15%) sepia(10%) saturate(1152%) hue-rotate(157deg) brightness(95%) contrast(88%);
      transition: filter 0.15s ease;
    }

    .main-nav a.active .main-nav-icon img {
      filter: brightness(0) saturate(100%) invert(70%) sepia(55%) saturate(3600%) hue-rotate(309deg) brightness(101%) contrast(95%);
    }

    .main-nav-notification {
      position: absolute;
      top: -4px;
      right: -8px;
      display: flex;
      min-width: 16px;
      padding: 2px 4px;
      justify-content: center;
      align-items: center;
      border-radius: 64px;
      background: var(--pink-400);
      color: var(--white);
      text-align: center;
      font-size: 12px;
      font-weight: 450;
      line-height: 100%;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.96);
    }

    .main-nav-label {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      height: 18px;
      justify-content: flex-start;
    }

    .main-nav-divider {
      width: 1px;
      height: 48px;
      background: var(--gray-300);
      margin: 0 2px 0 4px;
    }

    .mobile-nav-backdrop {
      display: none;
    }

    .switch-view-button {
      position: fixed;
      top: 108px;
      right: 0;
      z-index: 120;
      width: 72px;
      min-height: 64px;
      padding: 14px 8px 18px 18px;
      border: 0;
      border-radius: 999px 0 0 999px;
      background: linear-gradient(90deg, #6C4EF8 0%, #7A57FF 100%);
      box-shadow: inset 0 -6px 0 rgba(67, 25, 224, 0.9);
      color: var(--white);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 14px;
      overflow: hidden;
      font-family: Soleil, soleil, Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 450;
      line-height: 20px;
      white-space: nowrap;
      cursor: pointer;
      transition: width 240ms ease, filter 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }

    .switch-view-button-icon {
      width: 32px;
      height: 32px;
      flex: 0 0 32px;
      display: block;
    }

    .switch-view-button-label {
      opacity: 0;
      transform: translateX(16px);
      transition: opacity 180ms ease, transform 240ms ease;
      pointer-events: none;
    }

    .switch-view-button:hover {
      width: 256px;
      filter: brightness(1.03);
    }

    .switch-view-button:hover .switch-view-button-label,
    .switch-view-button:focus-visible .switch-view-button-label {
      opacity: 1;
      transform: translateX(0);
    }

    .switch-view-button:focus-visible {
      width: 256px;
      outline: none;
      filter: brightness(1.03);
    }

    .switch-view-button:active {
      transform: translateY(1px);
      box-shadow: inset 0 -3px 0 rgba(67, 25, 224, 0.9);
    }

    body.settings-modal-open {
      overflow: hidden;
    }

    .settings-modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 260;
      background: rgba(42, 53, 57, 0.42);
      backdrop-filter: blur(4px);
    }

    .settings-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 270;
      width: min(1120px, calc(100vw - 32px));
      max-height: min(80vh, 860px);
      transform: translate(-50%, -50%);
      border: 1px solid var(--gray-300);
      border-radius: 16px;
      background: var(--white);
      box-shadow: 0 24px 60px rgba(42, 53, 57, 0.24);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .settings-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--gray-300);
    }

    .settings-modal-header h2 {
      margin: 0;
      color: var(--gray-900);
      font-family: Soleil, soleil, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 24px;
      font-weight: 450;
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .settings-modal-header-actions {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .settings-modal-header-action {
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--pink-400);
      font-family: Soleil, soleil, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      font-weight: 450;
      line-height: 1.2;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .settings-modal-header-action:hover,
    .settings-modal-header-action:focus-visible {
      color: var(--pink-500);
      outline: none;
    }

    .settings-modal-close {
      width: 40px;
      height: 40px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--gray-500);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .settings-modal-close img {
      width: 20px;
      height: 20px;
      display: block;
    }

    .settings-modal-close:hover,
    .settings-modal-close:focus-visible {
      background: var(--gray-200);
      outline: none;
    }

    .settings-modal-body {
      padding: 16px 24px 24px;
      overflow-y: auto;
      overflow-x: auto;
    }

    .settings-matrix {
      min-width: 960px;
      display: grid;
      grid-template-columns: minmax(280px, 1.8fr) repeat(6, minmax(88px, 1fr));
      border: 1px solid var(--gray-300);
      border-radius: 16px;
      overflow: hidden;
      background: var(--white);
    }

    .settings-cell {
      min-width: 0;
      padding: 16px 14px;
      border-right: 1px solid var(--gray-300);
      border-bottom: 1px solid var(--gray-300);
      background: var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-cell:nth-child(7n) {
      border-right: 0;
    }

    .settings-cell--head {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--white);
      color: var(--gray-700);
      font-size: 13px;
      font-weight: 450;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .settings-cell--label {
      justify-content: flex-start;
      padding-inline: 18px;
    }

    .settings-item-label {
      color: var(--gray-900);
      font-family: Soleil, soleil, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      font-weight: 450;
      line-height: 1.35;
      letter-spacing: -0.16px;
    }

    .settings-cell--label.is-hidden .settings-row-label {
      opacity: 0.56;
    }

    .settings-toggle {
      position: relative;
      width: 24px;
      height: 24px;
      padding: 0;
      border: 1px solid #D8DDE7;
      border-radius: 6px;
      background: var(--white);
      transition: border-color 0.15s ease, background-color 0.15s ease, transform 0.15s ease;
    }

    .settings-toggle[aria-pressed="true"] {
      border-color: var(--pink-400);
      background: var(--pink-400);
    }

    .settings-toggle[aria-pressed="true"]::after {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
      width: 11px;
      height: 6px;
      border-left: 2px solid var(--white);
      border-bottom: 2px solid var(--white);
      transform: rotate(-45deg) translate(1px, -1px);
    }

    main {
      width: min(1100px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 72px 0 88px;
    }

    .hero {
      display: grid;
      justify-items: center;
      text-align: center;
      gap: 16px;
      padding: 22px 0 40px;
    }

    .calendar-action-feed-slot {
      width: min(740px, 100%);
      min-height: 1px;
      margin: 0 auto 20px;
      display: grid;
      gap: 12px;
    }

    .action-item {
      width: 100%;
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) auto;
      align-items: start;
      gap: 14px;
      padding: 16px 18px;
      border: 1px solid var(--gray-300);
      border-radius: 4px;
      background: var(--white);
      box-shadow: var(--shadow-card);
    }

    .action-item--priority-urgent {
      border-color: var(--pink-300);
      background: var(--pink-100);
    }

    .action-item--priority-normal {
      border-color: #BF7BFF;
      background: #F4EAFE;
    }

    .action-item--priority-low {
      border-color: rgba(229, 229, 234, 0.9);
      background: var(--white);
    }

    .action-item__media {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      flex: 0 0 56px;
    }

    .action-item__media img {
      width: 56px;
      height: 56px;
      display: block;
    }

    .action-item__body {
      min-width: 0;
      display: grid;
      gap: 3px;
      align-self: center;
    }

    .action-item__title {
      margin: 0;
      color: var(--gray-900);
      font-family: Soleil, soleil, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 450;
      line-height: 132%;
      letter-spacing: -0.16px;
      overflow-wrap: anywhere;
    }

    .action-item__description {
      margin: 0;
      color: var(--gray-700);
      font-family: Soleil, soleil, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 300;
      line-height: 145%;
      letter-spacing: -0.16px;
      overflow-wrap: anywhere;
    }

    .action-item__description a {
      color: var(--pink-400);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .action-item__aside {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      align-self: center;
      min-height: 40px;
    }

    .action-item__aside--button {
      align-self: center;
    }

    .action-item__button {
      min-width: 142px;
      height: 40px;
      padding: 0 18px;
      border: 0;
      border-radius: 4px;
      background: var(--pink-400);
      color: var(--white);
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.16);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font: inherit;
      font-size: 16px;
      font-weight: 450;
      line-height: 20px;
      text-decoration: none;
      white-space: nowrap;
    }

    .action-item__button--grow {
      background: #0BA825;
    }

    .action-item__button--grow:hover {
      background: #078E1D;
      box-shadow: 0 -3px 0 0 rgba(0, 0, 0, 0.16) inset;
    }

    .action-item__button:hover {
      background: var(--pink-500);
    }

    .action-item__control {
      width: 28px;
      height: 28px;
      padding: 0;
      border: 0;
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0.9;
      transition: opacity 0.15s ease;
    }

    .action-item__control:hover {
      opacity: 1;
    }

    .action-item__control img {
      width: 20px;
      height: 20px;
      display: block;
    }

    .hero h1 {
      margin: 0;
      color: var(--gray-800);
      text-align: center;
      font-feature-settings: 'liga' off, 'clig' off;
      font-size: 48px;
      font-style: normal;
      font-weight: 450;
      line-height: 120%;
      letter-spacing: -0.32px;
    }

    .hero p {
      margin: 0;
      color: var(--gray-700);
      text-align: center;
      font-feature-settings: 'liga' off, 'clig' off;
      font-size: 18px;
      font-style: normal;
      font-weight: 400;
      line-height: 150%;
      letter-spacing: -0.32px;
    }

    .calendar-layout {
      display: grid;
      gap: 28px;
      width: min(740px, 100%);
      margin: 0 auto;
    }

    .bookings-layout {
      display: grid;
      gap: 24px;
      width: min(740px, 100%);
      margin: 0 auto;
    }

    .bookings-section {
      display: grid;
      gap: 16px;
    }

    .bookings-section-title {
      margin: 0;
      color: var(--gray-800);
      font-family: Soleil, soleil, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 20px;
      font-style: normal;
      font-weight: 450;
      line-height: 120%;
      letter-spacing: -0.24px;
    }

    .booking-placeholder-card {
      min-height: 168px;
      padding: 24px;
      display: grid;
      align-items: stretch;
    }

    .booking-placeholder-card__inner {
      width: 100%;
      height: 100%;
      border-radius: 4px;
      border: 1px solid var(--gray-300);
      background: linear-gradient(180deg, rgba(247, 249, 252, 0.92) 0%, rgba(255, 255, 255, 1) 100%);
    }

    .card {
      border: 1px solid var(--gray-300);
      border-radius: 8px;
      background: var(--white);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .availability-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 22px 26px;
      border-bottom: 1px solid var(--gray-300);
    }

    .availability-card-header h2 {
      margin: 0;
      color: var(--gray-800);
      font-variant-numeric: lining-nums tabular-nums;
      font-family: Soleil, soleil, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 450;
      line-height: 140%;
    }

    .display-mode {
      position: relative;
      min-width: 340px;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 14px;
      height: 64px;
      border: 1px solid var(--gray-300);
      border-radius: 4px;
      background: var(--white);
    }

    .display-mode-select {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      border: 0;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
    }

    .display-mode-visual {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      color: var(--gray-700);
      font-size: 17px;
      line-height: 1.2;
      pointer-events: none;
    }

    .display-mode-copy {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .display-mode-copy img {
      width: 18px;
      height: 18px;
      display: block;
    }

    .display-mode-chevron {
      width: 18px;
      height: 18px;
      border-right: 2px solid var(--pink-400);
      border-bottom: 2px solid var(--pink-400);
      transform: rotate(45deg) translateY(-2px);
      flex: 0 0 18px;
    }

    .availability-card-body {
      padding: 18px 26px 28px;
    }

    .availability-grid {
      display: grid;
      grid-template-columns: 100px repeat(7, minmax(54px, 1fr));
      gap: 4px;
      align-items: center;
      justify-items: center;
    }

    .day-label {
      text-align: center;
      color: var(--pink-300);
      font-size: 16px;
      font-weight: 450;
      line-height: 1.1;
      text-decoration: underline;
      text-underline-offset: 4px;
      padding: 0 0 12px;
    }

    .period-label {
      color: var(--gray-700);
      font-variant-numeric: lining-nums tabular-nums;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: Soleil, soleil, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 400;
      line-height: 120%;
      letter-spacing: -0.32px;
      padding-right: 16px;
      justify-self: start;
    }

    .slot {
      width: 24px;
      height: 24px;
      border: 1px solid #D8DDE7;
      border-radius: 6px;
      background: var(--white);
      position: relative;
      transition: border-color 0.15s ease, background-color 0.15s ease, transform 0.15s ease;
    }

    .slot.is-active {
      border-color: var(--pink-400);
      background: var(--pink-400);
    }

    .slot.is-active::after {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
      width: 11px;
      height: 6px;
      border-left: 2px solid var(--white);
      border-bottom: 2px solid var(--white);
      transform: rotate(-45deg) translate(1px, -1px);
    }

    .slot:hover {
      transform: translateY(-1px);
    }

    .availability-legend {
      display: flex;
      justify-content: flex-end;
      gap: 18px;
      margin-top: 24px;
      color: var(--gray-700);
      font-size: 16px;
      line-height: 1.25;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .legend-square {
      width: 24px;
      height: 24px;
      border-radius: 2px;
      border: 1px solid #D8DDE7;
      background: var(--white);
    }

    .legend-square.is-active {
      border-color: var(--pink-400);
      background: var(--pink-400);
    }

    .card.card--timeoff {
      background: var(--gray-200);
    }

    .timeoff-card {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding: 18px 20px 16px;
      border-radius: inherit;
      background: transparent;
    }

    .timeoff-card-icon {
      width: 76px;
      height: 76px;
      flex: 0 0 76px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .timeoff-card-icon img {
      width: 76px;
      height: 76px;
      display: block;
    }

    .timeoff-card-body {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .timeoff-card-body h2 {
      margin: 0;
      color: var(--gray-800);
      font-size: 18px;
      font-weight: 450;
      line-height: 1.25;

      function writeJSON(key, value) {
        try {
          window.localStorage.setItem(key, JSON.stringify(value));
        } catch (error) {}
      }

      function slugify(value) {
        return (value || '')
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-+|-+$/g, '');
      }

      ACTION_ITEMS.forEach(function(item, index) {
        item.id = (slugify(item.label) || 'action-item') + '-' + (index + 1);
      });

      function normalizeActionItemSettings(settingsValue) {
        var normalizedSettings = {};

        ACTION_ITEMS.forEach(function(item) {
          var currentValue = settingsValue ? settingsValue[item.id] : null;
          var pageSettings = {};

          ACTION_ITEM_PAGES.forEach(function(pageKey) {
            if (currentValue && typeof currentValue === 'object' && !Array.isArray(currentValue)) {
              pageSettings[pageKey] = currentValue[pageKey] === true;
            } else if (pageKey === 'dashboard') {
              pageSettings[pageKey] = currentValue !== false;
            } else {
              pageSettings[pageKey] = false;
            }
          });

          normalizedSettings[item.id] = pageSettings;
        });

        return normalizedSettings;
      }

      var actionItemSettings = normalizeActionItemSettings(readJSON(ACTION_ITEM_SETTINGS_KEY, {}));
      var dismissedActionItems = readJSON(ACTION_ITEM_DISMISSED_KEY, {});

      writeJSON(ACTION_ITEM_SETTINGS_KEY, actionItemSettings);

      function isActionItemEnabled(item) {
        return actionItemSettings[item.id] && actionItemSettings[item.id][CURRENT_ACTION_ITEM_PAGE] === true;
      }

      function buildSettingsModalList() {
        if (!settingsModalList) return;

        settingsModalList.innerHTML = '';

        var matrix = document.createElement('div');
        matrix.className = 'settings-matrix';

        var cornerCell = document.createElement('div');
        cornerCell.className = 'settings-cell settings-cell--head settings-cell--label';
        cornerCell.textContent = 'Action item';
        matrix.appendChild(cornerCell);

        ACTION_ITEM_PAGES.forEach(function(pageKey) {
          var headCell = document.createElement('div');
          headCell.className = 'settings-cell settings-cell--head';
          headCell.textContent = ACTION_ITEM_PAGE_LABELS[pageKey];
          matrix.appendChild(headCell);
        });

        ACTION_ITEMS.forEach(function(item) {
          var labelCell = document.createElement('div');
          labelCell.className = 'settings-cell settings-cell--label';
          labelCell.innerHTML = '<div class="settings-item-label settings-row-label">' + item.label + '</div>';
          matrix.appendChild(labelCell);

          ACTION_ITEM_PAGES.forEach(function(pageKey) {
            var toggleCell = document.createElement('div');
            toggleCell.className = 'settings-cell';

            var toggle = document.createElement('button');
            toggle.className = 'settings-toggle';
            toggle.type = 'button';
            toggle.setAttribute('aria-label', 'Toggle ' + item.label + ' on ' + ACTION_ITEM_PAGE_LABELS[pageKey]);
            toggle.setAttribute('data-settings-toggle-id', item.id);
            toggle.setAttribute('data-settings-page', pageKey);

            toggleCell.appendChild(toggle);
            matrix.appendChild(toggleCell);
          });
        });

        settingsModalList.appendChild(matrix);
        updateSettingsToggleStates();
      }

      function updateSettingsToggleStates() {
        if (!settingsModalList) return;

        Array.prototype.slice.call(settingsModalList.querySelectorAll('[data-settings-toggle-id]')).forEach(function(toggle) {
          var actionItemId = toggle.getAttribute('data-settings-toggle-id');
          var pageKey = toggle.getAttribute('data-settings-page');
          var isEnabled = actionItemSettings[actionItemId] && actionItemSettings[actionItemId][pageKey] === true;
          toggle.setAttribute('aria-pressed', isEnabled ? 'true' : 'false');
        });
      }

      function openSettingsModal() {
        if (!settingsModal || !settingsModalBackdrop) return;

        if (!settingsModalList || !settingsModalList.children.length) {
          buildSettingsModalList();
        } else {
          updateSettingsToggleStates();
        }

        settingsModal.hidden = false;
        settingsModalBackdrop.hidden = false;
        document.body.classList.add('settings-modal-open');
      }

      function closeSettingsModal() {
        if (!settingsModal || !settingsModalBackdrop) return;

        settingsModal.hidden = true;
        settingsModalBackdrop.hidden = true;
        document.body.classList.remove('settings-modal-open');
      }

      function getActionItemMarkup(item) {
        var classes = ['action-item', 'action-item--priority-' + item.priority];
        var aside = '';

        if (item.buttonLabel) {
          aside =
            '<div class="action-item__aside action-item__aside--button">' +
              '<a class="' + (item.buttonClassName || 'action-item__button') + '" href="#">' + item.buttonLabel + '</a>' +
            '</div>';
        } else if (item.dismissible) {
          aside =
            '<div class="action-item__aside">' +
              '<button class="action-item__control" type="button" aria-label="Dismiss" data-dismiss-action-item="' + item.id + '">' +
                '<img src="/notification-center/assets/xicon.svg" alt="">' +
              '</button>' +
            '</div>';
        }

        return (
          '<article class="' + classes.join(' ') + '" data-action-item-id="' + item.id + '">' +
            '<div class="action-item__media"><img src="' + item.icon + '" alt=""></div>' +
            '<div class="action-item__body">' +
              '<h3 class="action-item__title">' + item.label + '</h3>' +
              '<p class="action-item__description">' + item.description + '</p>' +
            '</div>' +
            aside +
          '</article>'
        );
      }

      function renderCalendarActionFeed() {
        if (!calendarActionFeedSlot) return;

        var visibleItems = ACTION_ITEMS.filter(function(item) {
          return isActionItemEnabled(item) && dismissedActionItems[item.id] !== true;
        });

        if (!visibleItems.length) {
          calendarActionFeedSlot.hidden = true;
          calendarActionFeedSlot.innerHTML = '';
          return;
        }

        calendarActionFeedSlot.hidden = false;
        calendarActionFeedSlot.innerHTML = visibleItems.map(getActionItemMarkup).join('');
      }

      if (settingsButton) {
        settingsButton.addEventListener('click', function(event) {
          event.preventDefault();
          openSettingsModal();
        });
      }

      if (settingsModalBackdrop) {
        settingsModalBackdrop.addEventListener('click', closeSettingsModal);
      }

      if (settingsModalClose) {
        settingsModalClose.addEventListener('click', closeSettingsModal);
      }

      if (settingsModalList) {
        settingsModalList.addEventListener('click', function(event) {
          var toggle = event.target.closest('[data-settings-toggle-id]');
          if (!toggle) return;

          var actionItemId = toggle.getAttribute('data-settings-toggle-id');
          var pageKey = toggle.getAttribute('data-settings-page');
          var nextEnabledState = !(actionItemSettings[actionItemId] && actionItemSettings[actionItemId][pageKey] === true);

          actionItemSettings[actionItemId][pageKey] = nextEnabledState;

          if (pageKey === CURRENT_ACTION_ITEM_PAGE && nextEnabledState) {
            delete dismissedActionItems[actionItemId];
            writeJSON(ACTION_ITEM_DISMISSED_KEY, dismissedActionItems);
          }

          writeJSON(ACTION_ITEM_SETTINGS_KEY, actionItemSettings);
          updateSettingsToggleStates();
          renderCalendarActionFeed();
        });
      }

      if (settingsShowAllButton) {
        settingsShowAllButton.addEventListener('click', function() {
          ACTION_ITEMS.forEach(function(item) {
            ACTION_ITEM_PAGES.forEach(function(pageKey) {
              actionItemSettings[item.id][pageKey] = true;
            });
          });

          dismissedActionItems = {};
          writeJSON(ACTION_ITEM_SETTINGS_KEY, actionItemSettings);
          writeJSON(ACTION_ITEM_DISMISSED_KEY, dismissedActionItems);
          updateSettingsToggleStates();
          renderCalendarActionFeed();
        });
      }

      if (settingsShowNoneButton) {
        settingsShowNoneButton.addEventListener('click', function() {
          ACTION_ITEMS.forEach(function(item) {
            ACTION_ITEM_PAGES.forEach(function(pageKey) {
              actionItemSettings[item.id][pageKey] = false;
            });
          });

          writeJSON(ACTION_ITEM_SETTINGS_KEY, actionItemSettings);
          updateSettingsToggleStates();
          renderCalendarActionFeed();
        });
      }

      if (calendarActionFeedSlot) {
        calendarActionFeedSlot.addEventListener('click', function(event) {
          var dismissButton = event.target.closest('[data-dismiss-action-item]');
          if (!dismissButton) return;

          var actionItemId = dismissButton.getAttribute('data-dismiss-action-item');
          dismissedActionItems[actionItemId] = true;
          writeJSON(ACTION_ITEM_DISMISSED_KEY, dismissedActionItems);
          renderCalendarActionFeed();
        });
      }

      document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape' && settingsModal && !settingsModal.hidden) {
          closeSettingsModal();
        }
      });

      Array.prototype.slice.call(document.querySelectorAll('.slot')).forEach(function(slot) {
        slot.addEventListener('click', function() {
          var nextPressed = slot.getAttribute('aria-pressed') !== 'true';
          slot.setAttribute('aria-pressed', nextPressed ? 'true' : 'false');
          slot.classList.toggle('is-active', nextPressed);
        });
      });

      renderCalendarActionFeed();
    })();
  </script>
</body>
</html>
