<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Hlídačky.cz — Jobs for sitters</title>
  <link rel="icon" type="image/svg+xml" href="/hlidacky-logo_small.svg">
  <script>
    window.STRINGS = window.STRINGS || {};
    (function() {
      var langs = ['en', 'sk', 'hu', 'at', 'hr', 'cz'];
      var segments = location.pathname.split('/').filter(Boolean);
      var first = segments[0] || '';
      var second = segments[1] || '';
      var base = first && langs.indexOf(first) === -1 ? '/' + first : '';
      var lang = langs.indexOf(first) !== -1 ? first : (langs.indexOf(second) !== -1 ? second : '');
      document.write('<scr' + 'ipt src="' + (base || '') + '/strings.js"><\/scr' + 'ipt>');
      if (lang !== 'cz') {
        document.write('<scr' + 'ipt src="' + (base || '') + '/strings_' + (lang || 'en') + '.js"><\/scr' + 'ipt>');
      }
    })();
  </script>
  <style>
    :root {
      --text: #2a3539;
      --muted: #6b7176;
      --bg: #dce2e8;
      --panel: #ffffff;
      --border: #dde2e5;
      --green: #0ba825;
      --green-shadow: rgba(0, 0, 0, 0.16);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: 'soleil', Inter, system-ui, sans-serif;
    }

    .phone-frame {
      width: 390px;
      max-width: 100%;
      height: min(844px, calc(100vh - 48px));
      background: var(--panel);
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(49, 72, 87, 0.18);
      display: flex;
      flex-direction: column;
    }

    .phone-notch {
      width: 110px;
      height: 28px;
      background: #000;
      border-radius: 0 0 16px 16px;
      margin: 0 auto;
      flex-shrink: 0;
    }

    .phone-header {
      height: 74px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #f0f2f4;
      flex-shrink: 0;
    }

    .phone-header img {
      width: 28px;
      height: 28px;
    }

    .phone-header h1 {
      font-size: 15px;
      font-weight: 450;
      line-height: 1.2;
    }

    .hero {
      padding: 34px 24px 28px;
      background: linear-gradient(180deg, #f7f8fb 0%, #eff3f8 100%);
      border-bottom: 1px solid #edf1f5;
      text-align: center;
    }

    .hero h2 {
      margin-bottom: 10px;
      font-size: 32px;
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .hero p {
      max-width: 280px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }

    .body {
      flex: 1;
      min-height: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 24px;
    }

    .content {
      display: grid;
      gap: 12px;
    }

    .content h3 {
      font-size: 26px;
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .content p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }

    .footer {
      display: grid;
      gap: 10px;
    }

    .btn {
      min-height: 52px;
      padding: 14px 24px 16px;
      border-radius: 4px;
      border: 1px solid #e5e5ea;
      font: inherit;
      font-size: 16px;
      line-height: 22px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: var(--text);
      box-shadow: inset 0 -3px 0 #e5e5ea;
    }

    .btn.primary {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
      box-shadow: inset 0 -3px 0 var(--green-shadow);
    }

    @media (pointer: coarse) and (max-width: 768px) {
      body {
        padding: 0;
        background: #fff;
      }

      .phone-frame {
        width: 100%;
        height: 100vh;
        max-height: none;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="phone-frame">
    <div class="phone-notch"></div>
    <header class="phone-header">
      <img src="/hlidacky-logo_small.svg" alt="Hlídačky.cz">
      <h1 data-i18n="sittersHub.navTitle"></h1>
      <div style="width:28px"></div>
    </header>
    <section class="hero">
      <h2 data-i18n="sittersHub.title"></h2>
      <p data-i18n="sittersHub.subtitle"></p>
    </section>
    <section class="body">
      <div class="content">
        <h3 data-i18n="sittersHub.bodyTitle"></h3>
        <p data-i18n="sittersHub.bodyText"></p>
      </div>
      <div class="footer">
        <a class="btn primary" href="/strings/?prototype=sitters" data-i18n="sittersHub.primaryCta"></a>
        <a class="btn" href="/" data-i18n="sittersHub.secondaryCta"></a>
      </div>
    </section>
  </main>
  <script>
    function t(path) {
      return path.split('.').reduce(function(acc, key) {
        return acc && acc[key] !== undefined ? acc[key] : null;
      }, window.STRINGS) || path;
    }

    document.querySelectorAll('[data-i18n]').forEach(function(node) {
      node.textContent = t(node.getAttribute('data-i18n'));
    });
  </script>
</body>
</html>
