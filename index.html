<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hlídačky.cz prototypes</title>
  <style>
    :root {
      --bg: #edf2f7;
      --card: #ffffff;
      --text: #27363c;
      --muted: #6f7b81;
      --border: #dde2e5;
      --green: #22BF1E;
      --purple: #5f3dff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 20px;
      font-family: soleil, Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #dce2e8 0%, var(--bg) 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hub {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid rgba(221, 226, 229, 0.9);
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(49, 72, 87, 0.12);
      overflow: hidden;
    }

    .hero {
      padding: 40px 32px 28px;
      background: linear-gradient(180deg, #f6f7fb 0%, #eef2f7 100%);
      border-bottom: 1px solid var(--border);
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(32px, 6vw, 46px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 0;
      max-width: 520px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.45;
    }

    .content {
      padding: 28px 32px 32px;
      display: grid;
      gap: 18px;
    }

    .card {
      display: grid;
      gap: 12px;
      padding: 22px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: #fff;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--purple);
    }

    .card h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 4px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      background: #fff;
    }

    .btn.primary {
      color: #fff;
      background: var(--green);
      border-color: var(--green);
    }

    @media (max-width: 640px) {
      body { padding: 16px; }
      .hero, .content { padding-left: 20px; padding-right: 20px; }
      .actions { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="hub">
    <section class="hero">
      <h1>Hlídačky.cz prototypes</h1>
      <p>Internal hub for active prototype flows and their translation workspace.</p>
    </section>
    <section class="content">
      <article class="card">
        <div class="eyebrow">Prototype</div>
        <h2>Jobs for families</h2>
        <p>The current family job-posting prototype, including single-service and multi-service flows.</p>
        <div class="actions">
          <a class="btn primary" href="/jobs/">Open prototype</a>
          <a class="btn" href="/strings/?prototype=jobs">Open strings editor</a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
