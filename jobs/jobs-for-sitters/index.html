<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Hlídačky.cz — Jobs for sitters</title>
  <link rel="icon" type="image/svg+xml" href="/hlidacky-logo_small.svg">
  <script>
    window.STRINGS = window.STRINGS || {};
    (function() {
      var langs = ['en', 'sk', 'hu', 'at', 'hr', 'cz'];
      var segments = location.pathname.split('/').filter(Boolean);
      var last = segments[segments.length - 1] || '';
      var lang = langs.indexOf(last) !== -1 ? last : '';
      var baseSegments = lang ? segments.slice(0, -1) : segments.slice();
      var base = baseSegments.length ? '/' + baseSegments.join('/') : '';
      document.write('<scr' + 'ipt src="' + base + '/strings.js"><\/scr' + 'ipt>');
      if (lang !== 'cz') {
        document.write('<scr' + 'ipt src="' + base + '/strings_' + (lang || 'en') + '.js"><\/scr' + 'ipt>');
      }
    })();
  </script>
  <style>
    :root {
      --text: #2a3539;
      --muted: #6b7176;
      --bg: #dce2e8;
      --panel: #ffffff;
      --border: #dde2e5;
      --surface: #f7f8fb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: 'soleil', Inter, system-ui, sans-serif;
    }

    .phone-frame {
      width: 390px;
      max-width: 100%;
      height: min(844px, calc(100vh - 48px));
      background: var(--panel);
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(49, 72, 87, 0.18);
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      height: 52px;
      padding: 14px 21px 10px 23px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      background: #fff;
      flex-shrink: 0;
      position: relative;
      z-index: 5;
    }

    .screen-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      background: var(--panel);
    }

    .top-navbar {
      display: flex;
      width: 100%;
      padding: 8px 16px;
      justify-content: center;
      border-bottom: 1px solid #E5E5EA;
      background: #FFF;
      flex-shrink: 0;
      position: relative;
      z-index: 4;
    }

    .top-navbar-inner {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .top-navbar img {
      display: block;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .top-navbar-title {
      color: #2A3539;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: -0.051px;
    }

    .status-time {
      color: #2A3539;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 20px;
      letter-spacing: -0.165px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .status-icons img {
      display: block;
      flex-shrink: 0;
    }

    .content {
      min-height: 100%;
      padding: 0 0 120px;
      display: grid;
      align-content: start;
      gap: 0;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
    }

    .selector-section {
      display: flex;
      width: 375px;
      max-width: 100%;
      padding: 16px 20px 12px;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin: 0 auto;
      background: #FFF;
    }

    .selector-section-label {
      color: #2A3539;
      text-align: center;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: -0.051px;
    }

    .selector-group {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 450;
      line-height: 150%;
      letter-spacing: -0.16px;
    }

    .selector-chip {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      border: 1px solid #E5E5EA;
      background: #FFF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
      cursor: pointer;
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }

    .selector-chip:not(.is-selected):hover {
      border-color: #2A3539;
      background: #F7F7F7;
    }

    .selector-chip img {
      width: 24px;
      height: 24px;
      display: block;
      transition: filter 0.15s ease;
    }

    .selector-chip.is-selected {
      border-color: var(--chip-color, #F96073);
    }

    .selector-chip.is-selected:hover {
      border-color: var(--chip-color, #F96073);
      background: #F7F7F7;
    }

    .selector-chip--babysitting { --chip-color: #F96073; }
    .selector-chip--cleaning { --chip-color: #35CFEA; }
    .selector-chip--pet-care { --chip-color: #00D98B; }
    .selector-chip--senior-care { --chip-color: #FD8B25; }
    .selector-chip--tutoring { --chip-color: #B85EFF; }

    .selector-chip:focus-visible {
      outline: 2px solid rgba(42, 53, 57, 0.25);
      outline-offset: 2px;
    }

    .form-demo-section {
      display: flex;
      width: 100%;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      margin: 0 auto;
      border-top: 1px solid #E5E5EA;
      border-bottom: 1px solid #E5E5EA;
      background: #F1F5FB;
    }

    .form-demo-grid {
      width: 375px;
      max-width: 100%;
      display: flex;
      height: 52px;
      align-items: flex-start;
      gap: 12px;
      flex: 1 0 0;
      padding: 0 12px;
    }

    .jobs-field {
      flex: 1 0 0;
      height: 52px;
      border: 1px solid #E5E5EA;
      border-radius: 4px;
      background: #FFF;
      box-shadow: 0 1px 0 rgba(42, 53, 57, 0.04);
      display: flex;
      align-items: center;
      padding: 0 12px;
      min-width: 0;
      position: relative;
    }

    .jobs-field--location {
      flex: 1 1 0;
      position: relative;
      justify-content: space-between;
      gap: 8px;
      overflow: hidden;
      min-width: 0;
    }

    .jobs-field--select {
      flex: 0 0 128px;
      position: relative;
      justify-content: space-between;
      gap: 8px;
      overflow: hidden;
    }

    .jobs-field-icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .jobs-field-icon img,
    .jobs-field-icon svg,
    .jobs-field-action img,
    .jobs-field-action svg {
      display: block;
      width: 18px;
      height: 18px;
    }

    .jobs-field-value,
    .jobs-field-input,
    .jobs-field-select {
      min-width: 0;
      color: #2A3539;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: -0.051px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .jobs-field-select {
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      background: transparent;
      outline: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      padding: 0 12px;
      cursor: pointer;
      z-index: 2;
      white-space: nowrap;
      text-overflow: clip;
    }

    .jobs-field-action {
      margin-left: auto;
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #F96073;
      background: none;
      border: 0;
      padding: 0;
      cursor: pointer;
    }

    .jobs-field-action--passive {
      pointer-events: none;
    }

    .results-section {
      width: 100%;
      background: #FFF;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 120px;
    }

    .results-inner {
      width: 375px;
      max-width: 100%;
      padding: 20px 12px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .results-notifications-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      opacity: 0.8;
      color: #8B91A3;
      font-variant-numeric: lining-nums tabular-nums;
      font-family: 'soleil', sans-serif;
      font-size: 12px;
      font-style: normal;
      font-weight: 400;
      line-height: 140%;
      text-decoration: underline;
      transition: opacity 0.15s ease;
    }

    .results-notifications-link:hover {
      opacity: 1;
    }

    .results-notifications-link img {
      width: 16px;
      height: 16px;
      display: block;
      flex-shrink: 0;
    }

    @media (pointer: coarse) and (max-width: 768px) {
      body {
        padding: 0;
        background: #fff;
      }

      .status-bar {
        display: none;
      }

      .top-navbar {
        display: none;
      }

      .phone-frame {
        width: 100%;
        height: 100vh;
        max-height: none;
        border-radius: 0;
        box-shadow: none;
      }

      .form-demo-grid {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="phone-frame">
    <div class="status-bar">
      <div class="status-time">9:41</div>
      <div class="status-icons" aria-label="Phone status">
        <img src="/jobs/jobs-for-sitters/assets/mobile-signal.svg" alt="" width="17" height="11">
        <img src="/jobs/jobs-for-sitters/assets/wifi.svg" alt="" width="16" height="11">
        <img src="/jobs/jobs-for-sitters/assets/battery.svg" alt="" width="25" height="12">
      </div>
    </div>
    <div class="top-navbar">
      <div class="top-navbar-inner">
        <img src="/jobs/jobs-for-sitters/assets/icon-paperplane.svg" alt="">
        <div class="top-navbar-title" data-i18n="sittersHub.topNavTitle"></div>
      </div>
    </div>
    <div class="screen-scroll">
      <section class="content">
        <section class="selector-section">
          <div class="selector-section-label" data-i18n="sittersHub.selectorLabel"></div>
          <div class="selector-group" aria-label="Service filters">
            <button class="selector-chip selector-chip--babysitting is-selected" type="button" aria-pressed="true" data-on="/jobs/jobs-for-sitters/assets/babysitting-on.svg" data-off="/jobs/jobs-for-sitters/assets/babysitting-off.svg">
              <img src="/jobs/jobs-for-sitters/assets/babysitting-on.svg" alt="Babysitting">
            </button>
            <button class="selector-chip selector-chip--cleaning" type="button" aria-pressed="false" data-on="/jobs/jobs-for-sitters/assets/cleaning-on.svg" data-off="/jobs/jobs-for-sitters/assets/cleaning-off.svg">
              <img src="/jobs/jobs-for-sitters/assets/cleaning-off.svg" alt="Cleaning">
            </button>
            <button class="selector-chip selector-chip--pet-care" type="button" aria-pressed="false" data-on="/jobs/jobs-for-sitters/assets/pet-care-on.svg" data-off="/jobs/jobs-for-sitters/assets/pet-care-off.svg">
              <img src="/jobs/jobs-for-sitters/assets/pet-care-off.svg" alt="Pet care">
            </button>
            <button class="selector-chip selector-chip--senior-care" type="button" aria-pressed="false" data-on="/jobs/jobs-for-sitters/assets/senior-care-on.svg" data-off="/jobs/jobs-for-sitters/assets/senior-care-off.svg">
              <img src="/jobs/jobs-for-sitters/assets/senior-care-off.svg" alt="Senior care">
            </button>
            <button class="selector-chip selector-chip--tutoring" type="button" aria-pressed="false" data-on="/jobs/jobs-for-sitters/assets/tutoring-on.svg" data-off="/jobs/jobs-for-sitters/assets/tutoring-off.svg">
              <img src="/jobs/jobs-for-sitters/assets/tutoring-off.svg" alt="Tutoring">
            </button>
          </div>
        </section>
        <section class="form-demo-section" aria-label="Filters">
          <div class="form-demo-grid">
            <div class="jobs-field jobs-field--location">
              <div class="jobs-field-value" id="sitters-location-display">Praha 2</div>
              <select class="jobs-field-select" id="sitters-location-select" aria-label="Search jobs in">
                <option selected>Praha 2</option>
                <option>from all locations</option>
                <option>from all my locations</option>
              </select>
              <span class="jobs-field-action jobs-field-action--passive" aria-hidden="true">
                <img src="/jobs/jobs-for-sitters/assets/icon-chevron-down.svg" alt="">
              </span>
            </div>
            <div class="jobs-field jobs-field--select">
              <div class="jobs-field-value" id="sitters-radius-display">+20 km</div>
              <select class="jobs-field-select" id="sitters-radius-select" aria-label="Distance radius">
                <option>+5 km</option>
                <option>+10 km</option>
                <option>+15 km</option>
                <option selected>+20 km</option>
                <option>+25 km</option>
              </select>
              <span class="jobs-field-action jobs-field-action--passive" aria-hidden="true">
                <img src="/jobs/jobs-for-sitters/assets/icon-chevron-down.svg" alt="">
              </span>
            </div>
          </div>
        </section>
        <section class="results-section" aria-label="Results">
          <div class="results-inner">
            <a class="results-notifications-link" href="#" id="sitters-notifications-link">
              <img src="/jobs/jobs-for-sitters/assets/icon-bell.svg" alt="" aria-hidden="true">
              <span data-i18n="sittersHub.notificationsLink"></span>
            </a>
          </div>
        </section>
      </section>
    </div>
  </main>
  <script>
    function t(path) {
      return path.split('.').reduce(function(acc, key) {
        return acc && acc[key] !== undefined ? acc[key] : null;
      }, window.STRINGS) || path;
    }

    document.querySelectorAll('[data-i18n]').forEach(function(node) {
      node.textContent = t(node.getAttribute('data-i18n'));
    });

    document.querySelectorAll('.selector-chip').forEach(function(button) {
      var image = button.querySelector('img');

      button.addEventListener('click', function() {
        var isSelected = button.classList.contains('is-selected');
        button.classList.toggle('is-selected', !isSelected);
        button.setAttribute('aria-pressed', isSelected ? 'false' : 'true');
        image.src = isSelected ? button.getAttribute('data-off') : button.getAttribute('data-on');
      });
    });

    (function initSittersLocationSelect() {
      var select = document.getElementById('sitters-location-select');
      var display = document.getElementById('sitters-location-display');
      if (!select || !display) return;

      function sync() {
        var option = select.options[select.selectedIndex];
        display.textContent = option ? option.text : '';
      }

      select.addEventListener('change', sync);
      sync();
    })();

    (function initSittersRadiusSelect() {
      var select = document.getElementById('sitters-radius-select');
      var display = document.getElementById('sitters-radius-display');
      if (!select || !display) return;

      function sync() {
        var option = select.options[select.selectedIndex];
        display.textContent = option ? option.text : '';
      }

      select.addEventListener('change', sync);
      sync();
    })();
  </script>
</body>
</html>
