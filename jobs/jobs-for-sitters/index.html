<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Hlídačky.cz — Jobs for sitters</title>
  <link rel="icon" type="image/svg+xml" href="/hlidacky-logo_small.svg">
  <script>
    window.STRINGS = window.STRINGS || {};
    (function() {
      var langs = ['en', 'sk', 'hu', 'at', 'hr', 'cz'];
      var segments = location.pathname.split('/').filter(Boolean);
      var last = segments[segments.length - 1] || '';
      var lang = langs.indexOf(last) !== -1 ? last : '';
      var baseSegments = lang ? segments.slice(0, -1) : segments.slice();
      var base = baseSegments.length ? '/' + baseSegments.join('/') : '';
      document.write('<scr' + 'ipt src="' + base + '/strings.js"><\/scr' + 'ipt>');
      if (lang !== 'cz') {
        document.write('<scr' + 'ipt src="' + base + '/strings_' + (lang || 'en') + '.js"><\/scr' + 'ipt>');
      }
    })();
  </script>
  <style>
    :root {
      --text: #2a3539;
      --muted: #6b7176;
      --bg: #dce2e8;
      --panel: #ffffff;
      --border: #dde2e5;
      --surface: #f7f8fb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: 'soleil', Inter, system-ui, sans-serif;
    }

    .phone-frame {
      width: 390px;
      max-width: 100%;
      height: min(844px, calc(100vh - 48px));
      background: var(--panel);
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(49, 72, 87, 0.18);
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      height: 52px;
      padding: 14px 21px 10px 23px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      background: #fff;
      flex-shrink: 0;
      position: relative;
      z-index: 5;
    }

    .notch-pill {
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .screen-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      background: var(--panel);
    }

    .top-navbar {
      display: flex;
      width: 100%;
      padding: 8px 16px;
      justify-content: center;
      border-bottom: 1px solid #E5E5EA;
      background: #FFF;
      flex-shrink: 0;
      position: relative;
      z-index: 4;
    }

    .top-navbar-inner {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .top-navbar img {
      display: block;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .top-navbar-title {
      color: #2A3539;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: -0.051px;
    }

    .status-time {
      color: #2A3539;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 20px;
      letter-spacing: -0.165px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .status-icons img {
      display: block;
      flex-shrink: 0;
    }

    .content {
      min-height: 100%;
      padding: 0 0 20px;
      display: grid;
      align-content: start;
      gap: 0;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
    }

    .results-filter-tabs {
      display: flex;
      width: 375px;
      max-width: 100%;
      align-items: flex-start;
      margin: 0 auto;
      background: #FFF;
      border-bottom: 1px solid #E5E5EA;
      flex-shrink: 0;
      position: relative;
      z-index: 3;
    }

    .results-filter-tab {
      display: flex;
      width: 125px;
      padding: 8px 0;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1 0 0;
      border: 0;
      border-bottom: 2px solid #FFF;
      background: #FFF;
      cursor: pointer;
    }

    .results-filter-tab.is-active {
      border-bottom-color: #F96073;
    }

    .results-filter-tab:hover {
      background: #F7F7F7;
    }

    .results-filter-tab-label {
      display: flex;
      width: 100%;
      height: 28px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #212529;
      text-align: center;
      font-feature-settings: 'liga' off, 'clig' off;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: 'soleil', sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 450;
      line-height: 120%;
      letter-spacing: -0.32px;
    }

    .selector-section {
      display: flex;
      width: 375px;
      max-width: 100%;
      padding: 16px 20px 12px;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin: 0 auto;
      background: #FFF;
    }

    .selector-section-label {
      color: #2A3539;
      text-align: center;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: -0.051px;
    }

    .selector-group {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 450;
      line-height: 150%;
      letter-spacing: -0.16px;
    }

    .selector-chip {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      border: 1px solid #E5E5EA;
      background: #FFF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
      cursor: pointer;
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }

    .selector-chip:not(.is-selected):hover {
      border-color: #2A3539;
      background: #F7F7F7;
    }

    .selector-chip img {
      width: 24px;
      height: 24px;
      display: block;
      transition: filter 0.15s ease;
    }

    .selector-chip.is-selected {
      border-color: var(--chip-color, #F96073);
    }

    .selector-chip.is-selected:hover {
      border-color: var(--chip-color, #F96073);
      background: #F7F7F7;
    }

    .selector-chip--babysitting { --chip-color: #F96073; }
    .selector-chip--cleaning { --chip-color: #35CFEA; }
    .selector-chip--pet-care { --chip-color: #00D98B; }
    .selector-chip--senior-care { --chip-color: #FD8B25; }
    .selector-chip--tutoring { --chip-color: #B85EFF; }

    .selector-chip:focus-visible {
      outline: 2px solid rgba(42, 53, 57, 0.25);
      outline-offset: 2px;
    }

    .form-demo-section {
      display: flex;
      width: 100%;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      margin: 0 auto;
      border-top: 1px solid #E5E5EA;
      border-bottom: 1px solid #E5E5EA;
      background: #F1F5FB;
    }

    .form-demo-grid {
      width: 375px;
      max-width: 100%;
      display: flex;
      height: 52px;
      align-items: flex-start;
      gap: 12px;
      flex: 1 0 0;
      padding: 0 12px;
    }

    .jobs-field {
      flex: 1 0 0;
      height: 52px;
      border: 1px solid #E5E5EA;
      border-radius: 4px;
      background: #FFF;
      box-shadow: 0 1px 0 rgba(42, 53, 57, 0.04);
      display: flex;
      align-items: center;
      padding: 0 12px;
      min-width: 0;
      position: relative;
    }

    .jobs-field--location {
      flex: 1 1 0;
      position: relative;
      justify-content: space-between;
      gap: 8px;
      overflow: hidden;
      min-width: 0;
    }

    .jobs-field--select {
      flex: 0 0 128px;
      position: relative;
      justify-content: space-between;
      gap: 8px;
      overflow: hidden;
    }

    .jobs-field-icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .jobs-field-icon img,
    .jobs-field-icon svg,
    .jobs-field-action img,
    .jobs-field-action svg {
      display: block;
      width: 18px;
      height: 18px;
    }

    .jobs-field-value,
    .jobs-field-input,
    .jobs-field-select {
      min-width: 0;
      color: #2A3539;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: -0.051px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .jobs-field-select {
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      background: transparent;
      outline: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      padding: 0 12px;
      cursor: pointer;
      z-index: 2;
      white-space: nowrap;
      text-overflow: clip;
    }

    .jobs-field-action {
      margin-left: auto;
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #F96073;
      background: none;
      border: 0;
      padding: 0;
      cursor: pointer;
    }

    .jobs-field-action--passive {
      pointer-events: none;
    }

    .results-section {
      width: 100%;
      background: #FFF;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 24px;
    }

    .results-inner {
      width: 375px;
      max-width: 100%;
      padding: 20px 12px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .results-notifications-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      opacity: 0.8;
      color: #8B91A3;
      font-variant-numeric: lining-nums tabular-nums;
      font-family: 'soleil', sans-serif;
      font-size: 12px;
      font-style: normal;
      font-weight: 400;
      line-height: 140%;
      text-decoration: underline;
      transition: opacity 0.15s ease;
    }

    .results-notifications-link:hover {
      opacity: 1;
    }

    .results-notifications-link img {
      width: 16px;
      height: 16px;
      display: block;
      flex-shrink: 0;
    }

    .job-adverts-grid {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .job-advert-box {
      display: flex;
      width: 100%;
      min-width: 320px;
      max-width: 720px;
      padding: 16px 16px 18px 16px;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      border-radius: 8px;
      border: 1px solid #E5E5EA;
      background: #FFF;
      box-shadow: 0 4px 8px -4px rgba(42, 53, 57, 0.20);
    }

    .job-advert-box.is-hidden {
      display: none;
    }

    .job-advert-card {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .job-advert-topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .job-advert-posted {
      color: #6C757D;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', sans-serif;
      font-size: 12px;
      font-style: normal;
      font-weight: 350;
      line-height: 132%;
      letter-spacing: -0.16px;
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
    }

    .job-advert-posted-time {
      color: #2A3539;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', sans-serif;
      font-size: 12px;
      font-style: normal;
      font-weight: 600;
      line-height: 132%;
      letter-spacing: -0.16px;
    }

    .job-advert-close {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      background: none;
      color: #8B91A3;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
    }

    .job-advert-close svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    .job-advert-close img {
      width: 20px;
      height: 20px;
      display: block;
    }

    .job-advert-heading {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .job-advert-heading-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      min-width: 0;
    }

    .job-advert-distance-line {
      color: #6F7A86;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', sans-serif;
      font-size: 12px;
      font-style: normal;
      font-weight: 350;
      line-height: 132%;
      letter-spacing: -0.16px;
    }

    .job-advert-distance-line strong {
      color: #2A3539;
      font-feature-settings: 'liga' off, 'clig' off;
      font-weight: 600;
    }

    .job-advert-title {
      color: #2A3539;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', sans-serif;
      font-size: 20px;
      font-style: normal;
      font-weight: 450;
      line-height: 132%;
      letter-spacing: -0.32px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .job-advert-tags {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .job-advert-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 24px;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: 'soleil', sans-serif;
      font-size: 10.5px;
      font-style: normal;
      font-weight: 450;
      line-height: normal;
      letter-spacing: -0.058px;
      white-space: nowrap;
    }

    .job-advert-tag-icon {
      width: 12px;
      height: 12px;
      display: block;
      flex-shrink: 0;
    }

    .job-advert-tag--price {
      background: #FFF3DB;
      color: #FD8B25;
    }

    .job-advert-tag--service {
      background: #FEE8EA;
      color: #F96073;
    }

    .job-advert-tag--date {
      background: #F3ECFF;
      color: #7C4DFF;
    }

    .job-advert-divider {
      width: 100%;
      height: 1px;
      background: #E5E5EA;
      margin-top: 14px;
    }

    .job-advert-message {
      color: #4A5A61;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 350;
      line-height: 150%;
      letter-spacing: -0.16px;
      margin-top: 12px;
    }

    .job-advert-message-intro {
      margin-bottom: 4px;
    }

    .job-advert-author {
      color: #F96073;
      text-decoration: underline;
      font-weight: 600;
    }

    .job-advert-reply {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 4px;
      background: #F96073;
      color: #FFF;
      display: flex;
      padding: 14px 24px 16px 20px;
      justify-content: center;
      align-items: center;
      gap: 10px;
      align-self: stretch;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 450;
      line-height: 22px;
      cursor: pointer;
      box-shadow: inset 0 -3px 0 #E6213A;
      margin-top: 14px;
    }

    .job-advert-reply svg {
      width: 16px;
      height: 16px;
      display: block;
      flex-shrink: 0;
    }

    .job-advert-reply img {
      width: 16px;
      height: 16px;
      display: block;
      flex-shrink: 0;
    }

    .job-advert-reply:hover {
      background: #E6213A;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.16);
    }

    .job-advert-actions {
      align-self: stretch;
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border: 0;
      background: none;
      padding: 0;
      color: #8B91A3;
      text-align: center;
      font-family: 'soleil', sans-serif;
      font-size: 12px;
      font-style: normal;
      font-weight: 400;
      line-height: 140%;
      cursor: pointer;
      margin-top: 8px;
      text-decoration: underline;
      appearance: none;
    }

    .job-advert-actions svg {
      width: 12px;
      height: 12px;
      display: block;
    }

    .job-advert-actions img {
      width: 12px;
      height: 12px;
      display: block;
    }

    .results-show-more {
      display: inline-flex;
      min-height: 52px;
      padding: 14px 16px 16px;
      justify-content: center;
      align-items: center;
      gap: 8px;
      border: 1px solid #E5E5EA;
      border-radius: 4px;
      background: #FFF;
      color: #2A3539;
      text-align: center;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 22px;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: inset 0 -3px 0 #E5E5EA;
      transition: background 0.15s ease;
    }

    .results-show-more:hover {
      background: #F7F7F7;
    }

    .results-show-more svg {
      display: block;
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    @media (pointer: coarse) and (max-width: 768px) {
      body {
        padding: 0;
        background: #fff;
      }

      .status-bar {
        display: none;
      }

      .top-navbar {
        display: none;
      }

      .phone-frame {
        width: 100%;
        height: 100vh;
        max-height: none;
        border-radius: 0;
        box-shadow: none;
      }

      .form-demo-grid {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="phone-frame">
    <div class="status-bar">
      <div class="notch-pill"></div>
      <div class="status-time">9:41</div>
      <div class="status-icons" aria-label="Phone status">
        <img src="/jobs/jobs-for-sitters/assets/mobile-signal.svg" alt="" width="17" height="11">
        <img src="/jobs/jobs-for-sitters/assets/wifi.svg" alt="" width="16" height="11">
        <img src="/jobs/jobs-for-sitters/assets/battery.svg" alt="" width="25" height="12">
      </div>
    </div>
    <div class="top-navbar">
      <div class="top-navbar-inner">
        <img src="/jobs/jobs-for-sitters/assets/icon-paperplane.svg" alt="">
        <div class="top-navbar-title" data-i18n="sittersHub.topNavTitle"></div>
      </div>
    </div>
    <section class="results-filter-tabs" aria-label="Result filters">
      <button class="results-filter-tab is-active" type="button" aria-pressed="true">
        <span class="results-filter-tab-label" data-i18n="sittersHub.resultsTabs.new"></span>
      </button>
      <button class="results-filter-tab" type="button" aria-pressed="false">
        <span class="results-filter-tab-label" data-i18n="sittersHub.resultsTabs.replied"></span>
      </button>
      <button class="results-filter-tab" type="button" aria-pressed="false">
        <span class="results-filter-tab-label" data-i18n="sittersHub.resultsTabs.all"></span>
      </button>
    </section>
    <div class="screen-scroll">
      <section class="content">
        <section class="selector-section">
          <div class="selector-section-label" data-i18n="sittersHub.selectorLabel"></div>
          <div class="selector-group" aria-label="Service filters">
            <button class="selector-chip selector-chip--babysitting is-selected" type="button" aria-pressed="true" data-on="/jobs/jobs-for-sitters/assets/babysitting-on.svg" data-off="/jobs/jobs-for-sitters/assets/babysitting-off.svg">
              <img src="/jobs/jobs-for-sitters/assets/babysitting-on.svg" alt="Babysitting">
            </button>
            <button class="selector-chip selector-chip--cleaning" type="button" aria-pressed="false" data-on="/jobs/jobs-for-sitters/assets/cleaning-on.svg" data-off="/jobs/jobs-for-sitters/assets/cleaning-off.svg">
              <img src="/jobs/jobs-for-sitters/assets/cleaning-off.svg" alt="Cleaning">
            </button>
            <button class="selector-chip selector-chip--pet-care" type="button" aria-pressed="false" data-on="/jobs/jobs-for-sitters/assets/pet-care-on.svg" data-off="/jobs/jobs-for-sitters/assets/pet-care-off.svg">
              <img src="/jobs/jobs-for-sitters/assets/pet-care-off.svg" alt="Pet care">
            </button>
            <button class="selector-chip selector-chip--senior-care" type="button" aria-pressed="false" data-on="/jobs/jobs-for-sitters/assets/senior-care-on.svg" data-off="/jobs/jobs-for-sitters/assets/senior-care-off.svg">
              <img src="/jobs/jobs-for-sitters/assets/senior-care-off.svg" alt="Senior care">
            </button>
            <button class="selector-chip selector-chip--tutoring" type="button" aria-pressed="false" data-on="/jobs/jobs-for-sitters/assets/tutoring-on.svg" data-off="/jobs/jobs-for-sitters/assets/tutoring-off.svg">
              <img src="/jobs/jobs-for-sitters/assets/tutoring-off.svg" alt="Tutoring">
            </button>
          </div>
        </section>
        <section class="form-demo-section" aria-label="Filters">
          <div class="form-demo-grid">
            <div class="jobs-field jobs-field--location">
              <div class="jobs-field-value" id="sitters-location-display">Praha 2</div>
              <select class="jobs-field-select" id="sitters-location-select" aria-label="Search jobs in">
                <option selected>Praha 2</option>
                <option>from all locations</option>
                <option>from all my locations</option>
              </select>
              <span class="jobs-field-action jobs-field-action--passive" aria-hidden="true">
                <img src="/jobs/jobs-for-sitters/assets/icon-chevron-down-v2.svg" alt="">
              </span>
            </div>
            <div class="jobs-field jobs-field--select">
              <div class="jobs-field-value" id="sitters-radius-display">+20 km</div>
              <select class="jobs-field-select" id="sitters-radius-select" aria-label="Distance radius">
                <option>+5 km</option>
                <option>+10 km</option>
                <option>+15 km</option>
                <option selected>+20 km</option>
                <option>+25 km</option>
              </select>
              <span class="jobs-field-action jobs-field-action--passive" aria-hidden="true">
                <img src="/jobs/jobs-for-sitters/assets/icon-chevron-down-v2.svg" alt="">
              </span>
            </div>
          </div>
        </section>
        <section class="results-section" aria-label="Results">
          <div class="results-inner">
            <a class="results-notifications-link" href="#" id="sitters-notifications-link">
              <img src="/jobs/jobs-for-sitters/assets/icon-bell.svg" alt="" aria-hidden="true">
              <span data-i18n="sittersHub.notificationsLink"></span>
            </a>
            <div class="job-adverts-grid" id="sitters-results-grid"></div>
            <button class="results-show-more" id="sitters-show-more" type="button">
              <span data-i18n="sittersHub.showMore"></span>
            </button>
          </div>
        </section>
      </section>
    </div>
  </main>
  <script>
    function t(path) {
      return path.split('.').reduce(function(acc, key) {
        return acc && acc[key] !== undefined ? acc[key] : null;
      }, window.STRINGS) || path;
    }

    document.querySelectorAll('[data-i18n]').forEach(function(node) {
      node.textContent = t(node.getAttribute('data-i18n'));
    });

    document.querySelectorAll('.selector-chip').forEach(function(button) {
      var image = button.querySelector('img');

      button.addEventListener('click', function() {
        var isSelected = button.classList.contains('is-selected');
        button.classList.toggle('is-selected', !isSelected);
        button.setAttribute('aria-pressed', isSelected ? 'false' : 'true');
        image.src = isSelected ? button.getAttribute('data-off') : button.getAttribute('data-on');
      });
    });

    document.querySelectorAll('.results-filter-tab').forEach(function(button) {
      button.addEventListener('click', function() {
        document.querySelectorAll('.results-filter-tab').forEach(function(tab) {
          tab.classList.remove('is-active');
          tab.setAttribute('aria-pressed', 'false');
        });
        button.classList.add('is-active');
        button.setAttribute('aria-pressed', 'true');
      });
    });

    (function initSittersLocationSelect() {
      var select = document.getElementById('sitters-location-select');
      var display = document.getElementById('sitters-location-display');
      if (!select || !display) return;

      function sync() {
        var option = select.options[select.selectedIndex];
        display.textContent = option ? option.text : '';
      }

      select.addEventListener('change', sync);
      sync();
    })();

    (function initSittersRadiusSelect() {
      var select = document.getElementById('sitters-radius-select');
      var display = document.getElementById('sitters-radius-display');
      if (!select || !display) return;

      function sync() {
        var option = select.options[select.selectedIndex];
        display.textContent = option ? option.text : '';
      }

      select.addEventListener('change', sync);
      sync();
    })();

    (function initSittersShowMore() {
      var grid = document.getElementById('sitters-results-grid');
      var button = document.getElementById('sitters-show-more');
      if (!grid || !button) return;

      var totalCards = 40;
      var batchSize = 10;
      var visibleCount = 0;

      function esc(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function iconClose() {
        return '<img src="/jobs/jobs-for-sitters/assets/icon-close-v2.svg" alt="" aria-hidden="true">';
      }

      function iconReply() {
        return '<img src="/jobs/jobs-for-sitters/assets/icon-reply-v2.svg" alt="" aria-hidden="true">';
      }

      function iconChevronDown() {
        return '<img src="/jobs/jobs-for-sitters/assets/icon-chevron-down-v2.svg" alt="" aria-hidden="true">';
      }

      function iconBabysitting() {
        return '<svg class="job-advert-tag-icon" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M6 2.25a1.375 1.375 0 1 0 0 2.75 1.375 1.375 0 0 0 0-2.75ZM3.417 9.75V7.958A1.958 1.958 0 0 1 5.375 6h1.25a1.958 1.958 0 0 1 1.958 1.958V9.75M2.667 5.333V6.5M9.333 5.333V6.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }

      function cardMarkup(hidden) {
        return [
          '<article class="job-advert-box', hidden ? ' is-hidden' : '', '">',
            '<div class="job-advert-card">',
              '<div class="job-advert-topline">',
                '<div class="job-advert-posted"><span>', esc(t('sittersHub.jobAdvert.postedLabel')), '</span><span class="job-advert-posted-time">', esc(t('sittersHub.jobAdvert.postedTime')), '</span></div>',
                '<button class="job-advert-close" type="button" aria-label="Close advert">', iconClose(), '</button>',
              '</div>',
              '<div class="job-advert-heading-group">',
                '<div class="job-advert-heading">',
                  '<div class="job-advert-title">', esc(t('sittersHub.jobAdvert.title')), '</div>',
                '</div>',
                '<div class="job-advert-distance-line"><strong>', esc(t('sittersHub.jobAdvert.distance')), '</strong> ', esc(t('sittersHub.jobAdvert.distanceSuffix')), '</div>',
              '</div>',
              '<div class="job-advert-tags">',
                '<span class="job-advert-tag job-advert-tag--price">', esc(t('sittersHub.jobAdvert.price')), '</span>',
                '<span class="job-advert-tag job-advert-tag--service">', iconBabysitting(), esc(t('sittersHub.jobAdvert.service')), '</span>',
                '<span class="job-advert-tag job-advert-tag--date">', esc(t('sittersHub.jobAdvert.date')), '</span>',
              '</div>',
              '<div class="job-advert-divider"></div>',
              '<div class="job-advert-message">',
                '<div class="job-advert-message-intro"><span class="job-advert-author">', esc(t('sittersHub.jobAdvert.author')), '</span> ', esc(t('sittersHub.jobAdvert.wrote')), '</div>',
                '<div>', esc(t('sittersHub.jobAdvert.body')), '</div>',
              '</div>',
              '<div class="job-advert-divider"></div>',
              '<button class="job-advert-reply" type="button">', iconReply(), '<span>', esc(t('sittersHub.jobAdvert.reply')), '</span></button>',
              '<button class="job-advert-actions" type="button"><span>', esc(t('sittersHub.jobAdvert.otherActions')), '</span>', iconChevronDown(), '</button>',
            '</div>',
          '</article>'
        ].join('');
      }

      var html = '';
      for (var i = 0; i < totalCards; i++) {
        html += cardMarkup(i >= batchSize);
      }
      grid.innerHTML = html;
      visibleCount = batchSize;

      function syncButton() {
        button.style.display = visibleCount < totalCards ? 'inline-flex' : 'none';
      }

      button.addEventListener('click', function() {
        var cards = Array.prototype.slice.call(grid.querySelectorAll('.job-advert-box'));
        var nextBatch = cards.slice(visibleCount, visibleCount + batchSize);
        nextBatch.forEach(function(card) {
          card.classList.remove('is-hidden');
        });
        if (nextBatch.length) {
          requestAnimationFrame(function() {
            nextBatch[0].scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
        }
        visibleCount = Math.min(visibleCount + batchSize, totalCards);
        syncButton();
      });

      syncButton();
    })();
  </script>
</body>
</html>
