<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Hlídačky.cz — Jobs for sitters</title>
  <link rel="icon" type="image/svg+xml" href="/hlidacky-logo_small.svg">
  <script>
    window.STRINGS = window.STRINGS || {};
    (function() {
      var langs = ['en', 'sk', 'hu', 'at', 'hr', 'cz'];
      var segments = location.pathname.split('/').filter(Boolean);
      var last = segments[segments.length - 1] || '';
      var lang = langs.indexOf(last) !== -1 ? last : '';
      var baseSegments = lang ? segments.slice(0, -1) : segments.slice();
      var base = baseSegments.length ? '/' + baseSegments.join('/') : '';
      document.write('<scr' + 'ipt src="' + base + '/strings.js"><\/scr' + 'ipt>');
      if (lang !== 'cz') {
        document.write('<scr' + 'ipt src="' + base + '/strings_' + (lang || 'en') + '.js"><\/scr' + 'ipt>');
      }
    })();
  </script>
  <style>
    :root {
      --text: #2a3539;
      --muted: #6b7176;
      --bg: #dce2e8;
      --panel: #ffffff;
      --border: #dde2e5;
      --surface: #f7f8fb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: 'soleil', Inter, system-ui, sans-serif;
    }

    .phone-frame {
      width: 390px;
      max-width: 100%;
      height: min(844px, calc(100vh - 48px));
      position: relative;
      background: var(--panel);
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(49, 72, 87, 0.18);
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      height: 52px;
      padding: 14px 21px 10px 23px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      background: #fff;
      flex-shrink: 0;
      position: relative;
      z-index: 5;
    }

    .notch-pill {
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .screen-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      background: var(--panel);
    }

    .top-navbar {
      display: flex;
      width: 100%;
      padding: 8px 16px;
      justify-content: center;
      border-bottom: 1px solid #E5E5EA;
      background: #FFF;
      flex-shrink: 0;
      position: relative;
      z-index: 4;
    }

    .top-navbar-inner {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .top-navbar img {
      display: block;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .top-navbar-title {
      color: #2A3539;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: -0.051px;
    }

    .status-time {
      color: #2A3539;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 20px;
      letter-spacing: -0.165px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .status-icons img {
      display: block;
      flex-shrink: 0;
    }

    .content {
      min-height: 100%;
      padding: 0 0 20px;
      display: grid;
      align-content: start;
      gap: 0;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
    }

    .results-filter-tabs {
      display: flex;
      width: 375px;
      max-width: 100%;
      align-items: flex-start;
      margin: 0 auto;
      background: #FFF;
      border-bottom: 1px solid #E5E5EA;
      flex-shrink: 0;
      position: relative;
      z-index: 3;
    }

    .results-filter-tab {
      display: flex;
      width: 125px;
      padding: 8px 0;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1 0 0;
      border: 0;
      border-bottom: 2px solid #FFF;
      background: #FFF;
      cursor: pointer;
    }

    .results-filter-tab.is-active {
      border-bottom-color: #F96073;
    }

    .results-filter-tab:hover {
      background: #F7F7F7;
    }

    .results-filter-tab-label {
      display: flex;
      width: 100%;
      height: 28px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #212529;
      text-align: center;
      font-feature-settings: 'liga' off, 'clig' off;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: 'soleil', sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 450;
      line-height: 120%;
      letter-spacing: -0.32px;
    }

    .selector-section {
      display: flex;
      width: 375px;
      max-width: 100%;
      padding: 16px 20px 12px;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin: 0 auto;
      background: #FFF;
    }

    .selector-section-label {
      color: #2A3539;
      text-align: center;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: -0.051px;
    }

    .selector-group {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 450;
      line-height: 150%;
      letter-spacing: -0.16px;
    }

    .selector-chip {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      border: 1px solid #E5E5EA;
      background: #FFF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
      cursor: pointer;
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }

    .selector-chip:not(.is-selected):hover {
      border-color: #2A3539;
      background: #F7F7F7;
    }

    .selector-chip img {
      width: 24px;
      height: 24px;
      display: block;
      transition: filter 0.15s ease;
    }

    .selector-chip.is-selected {
      border-color: var(--chip-color, #F96073);
    }

    .selector-chip.is-selected:hover {
      border-color: var(--chip-color, #F96073);
      background: #F7F7F7;
    }

    .selector-chip--babysitting { --chip-color: #F96073; }
    .selector-chip--cleaning { --chip-color: #35CFEA; }
    .selector-chip--pet-care { --chip-color: #00D98B; }
    .selector-chip--senior-care { --chip-color: #FD8B25; }
    .selector-chip--tutoring { --chip-color: #B85EFF; }

    .selector-chip:focus-visible {
      outline: 2px solid rgba(42, 53, 57, 0.25);
      outline-offset: 2px;
    }

    .form-demo-section {
      display: flex;
      width: 100%;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      margin: 0 auto;
      border-top: 1px solid #E5E5EA;
      border-bottom: 1px solid #E5E5EA;
      background: #F1F5FB;
    }

    .form-demo-grid {
      width: 375px;
      max-width: 100%;
      display: flex;
      height: 52px;
      align-items: flex-start;
      gap: 8px;
      flex: 1 0 0;
      padding: 0 12px;
    }

    .jobs-field {
      flex: 1 0 0;
      height: 52px;
      border: 1px solid #E5E5EA;
      border-radius: 4px;
      background: #FFF;
      box-shadow: 0 1px 0 rgba(42, 53, 57, 0.04);
      display: flex;
      align-items: center;
      padding: 0 12px;
      min-width: 0;
      position: relative;
    }

    .jobs-field--location {
      flex: 1 1 0;
      position: relative;
      justify-content: space-between;
      gap: 8px;
      overflow: hidden;
      min-width: 0;
    }

    .jobs-field--select {
      flex: 0 0 92px;
      position: relative;
      justify-content: space-between;
      gap: 8px;
      overflow: hidden;
    }

    .jobs-filter-button {
      width: 52px;
      height: 52px;
      border: 1px solid #E5E5EA;
      border-radius: 4px;
      background: #FFF;
      box-shadow: 0 1px 0 rgba(42, 53, 57, 0.04);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      cursor: pointer;
    }

    .jobs-filter-button:hover {
      background: #F7F7F7;
    }

    .jobs-filter-button img {
      width: 16px;
      height: 16px;
      display: block;
    }

    .jobs-filter-badge {
      position: absolute;
      top: -10px;
      right: -10px;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: #F96073;
      color: #FFF;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'soleil', sans-serif;
      font-size: 18px;
      font-style: normal;
      font-weight: 450;
      line-height: 100%;
      pointer-events: none;
    }

    .filters-modal,
    .notifications-modal {
      position: absolute;
      inset: 52px 0 0;
      background: #FFF;
      z-index: 20;
      display: none;
      flex-direction: column;
      min-height: 0;
    }

    .filters-modal.is-open,
    .notifications-modal.is-open {
      display: flex;
    }

    .filters-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid #E5E5EA;
      background: #FFF;
      flex-shrink: 0;
    }

    .filters-modal-title-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .filters-modal-title-icon,
    .filters-modal-title-icon svg {
      width: 16px;
      height: 16px;
      display: block;
      color: #4A5A61;
      flex-shrink: 0;
    }

    .filters-modal-title {
      color: #2A3539;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', sans-serif;
      font-size: 24px;
      font-style: normal;
      font-weight: 450;
      line-height: 132%;
      letter-spacing: -0.32px;
    }

    .notifications-modal .filters-modal-title-wrap {
      gap: 8px;
      align-items: center;
    }

    .notifications-modal .filters-modal-title-icon,
    .notifications-modal .filters-modal-title-icon img {
      width: 42px;
      height: 42px;
      display: block;
      flex-shrink: 0;
    }

    .notifications-modal .filters-modal-title {
      color: #2A3539;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', sans-serif;
      font-size: 24px;
      font-style: normal;
      font-weight: 450;
      line-height: 140%;
      letter-spacing: -0.2px;
    }

    .filters-modal-header-badge {
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 999px;
      background: #F96073;
      color: #FFF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'soleil', sans-serif;
      font-size: 18px;
      font-style: normal;
      font-weight: 450;
      line-height: 100%;
      flex-shrink: 0;
    }

    .filters-modal-close {
      width: 40px;
      height: 40px;
      border: 0;
      background: none;
      color: #BEC2CE;
      opacity: 0.8;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s ease;
      margin: -8px -8px -8px 0;
    }

    .filters-modal-close img {
      width: 20px;
      height: 20px;
      display: block;
    }

    .filters-modal-close:hover {
      opacity: 1;
    }

    .filters-modal-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0 16px;
      background: #FFF;
    }

    .filters-section {
      padding: 16px 0;
      border-bottom: 1px solid #E5E5EA;
    }

    .filters-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
    }

    .filters-section-title-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .filters-section-icon,
    .filters-section-icon svg {
      width: 18px;
      height: 18px;
      display: block;
      color: #6F7A86;
      flex-shrink: 0;
    }

    .filters-section-title {
      color: #2A3539;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 450;
      line-height: 140%;
      letter-spacing: -0.32px;
    }

    .filters-section-controls {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .filters-section-clear {
      color: #F96073;
      font-family: 'soleil', sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 450;
      line-height: 140%;
      text-decoration: underline;
      background: none;
      border: 0;
      padding: 0;
      cursor: pointer;
    }

    .filters-section-clear-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #F96073;
      flex-shrink: 0;
    }

    .filters-section-chevron,
    .filters-section-chevron svg {
      width: 16px;
      height: 16px;
      display: block;
      color: #4A5A61;
      flex-shrink: 0;
      transition: transform 0.15s ease;
    }

    .filters-section.is-collapsed .filters-section-chevron {
      transform: rotate(-180deg);
    }

    .filters-section-content {
      padding-top: 14px;
    }

    .filters-section.is-collapsed .filters-section-content {
      display: none;
    }

    .filters-service-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 8px;
    }

    .filters-service-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid #E5E5EA;
      background: #FFF;
      color: #2A3539;
      font-family: 'soleil', sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 450;
      line-height: 140%;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .filters-service-chip.is-active {
      border-color: transparent;
      background: #F96073;
      color: #FFF;
    }

    .filters-service-chip.is-active:hover {
      background: #E6213A;
      border-color: transparent;
      color: #FFF;
    }

    .filters-service-chip:not(.is-active):hover {
      border-color: #BEC2CE;
      background: #F7F7F7;
      color: #2A3539;
    }

    .filters-service-chip-icon,
    .filters-service-chip-icon img {
      width: 16px;
      height: 16px;
      display: block;
      flex-shrink: 0;
    }

    .filters-service-chip.is-active .filters-service-chip-icon img {
      filter: brightness(0) invert(1);
    }

    .filters-sort-options {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .filters-sort-option {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      color: #4A5A61;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 450;
      line-height: 140%;
      cursor: pointer;
      background: none;
      border: 0;
      padding: 0;
      text-align: left;
    }

    .filters-sort-radio {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .filters-sort-radio img {
      width: 18px;
      height: 18px;
      display: block;
    }

    .filters-modal-footer {
      position: sticky;
      bottom: 0;
      background: #FFF;
      border-top: 1px solid #E5E5EA;
      padding: 14px 20px 20px;
      flex-shrink: 0;
    }

    .filters-modal-cta {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 4px;
      background: #0DB020;
      color: #FFF;
      text-align: center;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 450;
      line-height: 22px;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.16);
      cursor: pointer;
    }

    .notifications-modal-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px 20px 20px;
      background: #FFF;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .notifications-modal-lead {
      color: #4A5A61;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 350;
      line-height: 150%;
      letter-spacing: -0.24px;
      margin: 0;
    }

    .notifications-field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .notifications-field-label {
      color: #2A3539;
      font-variant-numeric: lining-nums tabular-nums;
      font-family: 'soleil', sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 450;
      line-height: 140%;
      letter-spacing: 0;
    }

    .notifications-field {
      width: 100%;
      min-height: 52px;
    }

    .notifications-field .jobs-field-value {
      padding-right: 28px;
      overflow: hidden;
      color: #2A3539;
      font-variant-numeric: lining-nums tabular-nums;
      text-overflow: ellipsis;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 140%;
      letter-spacing: 0.2px;
    }

    .notifications-field .jobs-field-action {
      pointer-events: none;
      color: #F96073;
    }

    .notifications-modal-footer {
      position: sticky;
      bottom: 0;
      background: #FFF;
      border-top: 1px solid #E5E5EA;
      padding: 14px 20px 20px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .notifications-modal-cancel {
      color: #A6ADBB;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 140%;
      text-decoration: underline;
      background: none;
      border: 0;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
    }

    .notifications-modal-save {
      flex: 1;
      min-height: 52px;
      border: 0;
      border-radius: 4px;
      background: #0DB020;
      color: #FFF;
      text-align: center;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 450;
      line-height: 22px;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.16);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px 16px;
    }

    .notifications-modal-save img {
      width: 16px;
      height: 16px;
      display: block;
    }

    .jobs-field-icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .jobs-field-icon img,
    .jobs-field-icon svg,
    .jobs-field-action img,
    .jobs-field-action svg {
      display: block;
      width: 18px;
      height: 18px;
    }

    .jobs-field-value,
    .jobs-field-input,
    .jobs-field-select {
      min-width: 0;
      color: #2A3539;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: -0.051px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .jobs-field-select {
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      background: transparent;
      outline: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      padding: 0 12px;
      cursor: pointer;
      z-index: 2;
      white-space: nowrap;
      text-overflow: clip;
    }

    .jobs-field-action {
      margin-left: auto;
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #F96073;
      background: none;
      border: 0;
      padding: 0;
      cursor: pointer;
    }

    .jobs-field-action--passive {
      pointer-events: none;
    }

    .results-section {
      width: 100%;
      background: #FFF;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 24px;
    }

    .results-inner {
      width: 375px;
      max-width: 100%;
      padding: 20px 12px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .active-filters-summary {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;

                <svg viewBox="0 0 16 16" fill="none"><path d="m3.5 9.5 4.5-4 4.5 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </span>
            </div>
          </div>
          <div class="filters-section-content">
            <div class="filters-sort-options">
              <button class="filters-sort-option is-active" type="button" aria-pressed="true"><span class="filters-sort-radio"><img src="/jobs/jobs-for-sitters/assets/radio-selected.svg" alt=""></span><span data-i18n="sittersHub.filtersModal.latest"></span></button>
              <button class="filters-sort-option" type="button" aria-pressed="false"><span class="filters-sort-radio"><img src="/jobs/jobs-for-sitters/assets/radio-non-selected.svg" alt=""></span><span data-i18n="sittersHub.filtersModal.closest"></span></button>
              <button class="filters-sort-option" type="button" aria-pressed="false"><span class="filters-sort-radio"><img src="/jobs/jobs-for-sitters/assets/radio-non-selected.svg" alt=""></span><span data-i18n="sittersHub.filtersModal.bestPaid"></span></button>

      <div class="filters-modal-header">
        <div class="filters-modal-title-wrap">
          <span class="filters-modal-title-icon" aria-hidden="true">
            <img src="/jobs/jobs-for-sitters/assets/doodle-notification-settings.svg" alt="">
          </span>
          <div class="filters-modal-title" data-i18n="sittersHub.notificationsModal.title"></div>
        </div>
        <button class="filters-modal-close" id="sitters-close-notifications" type="button" aria-label="Close notifications">
          <img src="/jobs/jobs-for-sitters/assets/icon-close-v2.svg" alt="">

      </div>
      <div class="notifications-modal-body">
        <p class="notifications-modal-lead" data-i18n="sittersHub.notificationsModal.body"></p>
        <div class="notifications-field-group">
          <label class="notifications-field-label" for="sitters-email-notifications" data-i18n="sittersHub.notificationsModal.emailLabel"></label>
          <div class="jobs-field notifications-field">
            <div class="jobs-field-value" id="sitters-email-notifications-display"></div>
            <select class="jobs-field-select" id="sitters-email-notifications" aria-label="E-mail notifications">
              <option selected data-i18n="sittersHub.notificationsModal.immediately">Immediately after publication</option>
              <option data-i18n="sittersHub.notificationsModal.never">Never</option>
              <option data-i18n="sittersHub.notificationsModal.daily">Summary once a day</option>
              <option data-i18n="sittersHub.notificationsModal.weekly">Summary once a week</option>
            </select>
            <span class="jobs-field-action jobs-field-action--passive" aria-hidden="true">
              <img src="/jobs/jobs-for-sitters/assets/icon-chevron-down-v3.svg" alt="">
            </span>
          </div>
        </div>
        <div class="notifications-field-group">
          <label class="notifications-field-label" for="sitters-mobile-notifications" data-i18n="sittersHub.notificationsModal.mobileLabel"></label>
          <div class="jobs-field notifications-field">
            <div class="jobs-field-value" id="sitters-mobile-notifications-display"></div>
            <select class="jobs-field-select" id="sitters-mobile-notifications" aria-label="Mobile notifications">
              <option selected data-i18n="sittersHub.notificationsModal.immediately">Immediately after publication</option>
              <option data-i18n="sittersHub.notificationsModal.never">Never</option>
              <option data-i18n="sittersHub.notificationsModal.daily">Summary once a day</option>
              <option data-i18n="sittersHub.notificationsModal.weekly">Summary once a week</option>
            </select>
            <span class="jobs-field-action jobs-field-action--passive" aria-hidden="true">
              <img src="/jobs/jobs-for-sitters/assets/icon-chevron-down-v3.svg" alt="">
            </span>
          </div>
        </div>

      <div class="notifications-modal-footer">
        <button class="notifications-modal-cancel" id="sitters-cancel-notifications" type="button" data-i18n="sittersHub.notificationsModal.cancel"></button>
        <button class="notifications-modal-save" id="sitters-save-notifications" type="button">
          <img src="/jobs/jobs-for-sitters/assets/icon-check.svg" alt="" aria-hidden="true">
          <span data-i18n="sittersHub.notificationsModal.save"></span>
        </button>
      </div>
    </div>
  </main>
  <script>
    window.sittersState = {
      appliedServices: ['babysitting'],
      dismissedJobIds: [],
      openDismissJobId: null
    };

    function t(path) {
      return path.split('.').reduce(function(acc, key) {
        return acc && acc[key] !== undefined ? acc[key] : null;
      }, window.STRINGS) || path;
    }

    document.querySelectorAll('[data-i18n]').forEach(function(node) {
      node.textContent = t(node.getAttribute('data-i18n'));
    });

    document.querySelectorAll('.selector-chip').forEach(function(button) {
      var image = button.querySelector('img');

      button.addEventListener('click', function() {
        var isSelected = button.classList.contains('is-selected');
        button.classList.toggle('is-selected', !isSelected);
        button.setAttribute('aria-pressed', isSelected ? 'false' : 'true');
        image.src = isSelected ? button.getAttribute('data-off') : button.getAttribute('data-on');
      });
    });

    document.querySelectorAll('.results-filter-tab').forEach(function(button) {
      button.addEventListener('click', function() {
        document.querySelectorAll('.results-filter-tab').forEach(function(tab) {
          tab.classList.remove('is-active');
          tab.setAttribute('aria-pressed', 'false');
        });
        button.classList.add('is-active');
        button.setAttribute('aria-pressed', 'true');
        if (window.sittersRenderActiveFilters) window.sittersRenderActiveFilters();
        if (window.sittersTriggerResultsReload) window.sittersTriggerResultsReload();
      });
    });

    (function initSittersActiveFilters() {
      var heading = document.getElementById('sitters-active-filters-heading');
      var row = document.getElementById('sitters-active-filters-row');
      var locationDisplay = document.getElementById('sitters-location-display');
      var radiusDisplay = document.getElementById('sitters-radius-display');
      if (!heading || !row || !locationDisplay || !radiusDisplay) return;

      var serviceMeta = {
        babysitting: {
          labelKey: 'sittersHub.filtersModal.babysitting',
          pillClass: 'active-filter-pill--babysitting',
          icon: '/jobs/jobs-for-sitters/assets/active-babysitting.svg',
          close: '/jobs/jobs-for-sitters/assets/x-pink.svg'
        },
        cleaning: {
          labelKey: 'sittersHub.filtersModal.cleaning',
          pillClass: 'active-filter-pill--cleaning',
          icon: '/jobs/jobs-for-sitters/assets/active-cleaning.svg',
          close: '/jobs/jobs-for-sitters/assets/x-cyan.svg'
        },
        petCare: {
          labelKey: 'sittersHub.filtersModal.petCare',
          pillClass: 'active-filter-pill--petCare',
          icon: '/jobs/jobs-for-sitters/assets/active-pet-care.svg',
          close: '/jobs/jobs-for-sitters/assets/x-teal.svg'
        },
        seniorCare: {
          labelKey: 'sittersHub.filtersModal.seniorCare',
          pillClass: 'active-filter-pill--seniorCare',
          icon: '/jobs/jobs-for-sitters/assets/active-senior-care.svg',
          close: '/jobs/jobs-for-sitters/assets/x-orange.svg'
        },
        tutoring: {
          labelKey: 'sittersHub.filtersModal.tutoring',
          pillClass: 'active-filter-pill--tutoring',
          icon: '/jobs/jobs-for-sitters/assets/active-tutoring.svg',
          close: '/jobs/jobs-for-sitters/assets/x-indigo.svg'
        }
      };

      function activeTabKey() {
        var activeTab = document.querySelector('.results-filter-tab.is-active .results-filter-tab-label');
        if (!activeTab) return 'new';
        var key = activeTab.getAttribute('data-i18n') || '';
        return key.split('.').pop() || 'new';
      }

      function pillMarkup(parts, className, serviceKey) {
        return '<div class="active-filter-pill ' + className + '"' + (serviceKey ? ' data-service="' + serviceKey + '"' : '') + '>' + parts.join('') + '</div>';
      }

      function syncAlignment() {
        row.classList.toggle('is-overflowing', row.scrollWidth > row.clientWidth + 1);
      }

      function render() {
        var services = window.sittersState.appliedServices || [];
        var headingRoot = services.length ? 'sittersHub.activeFiltersHeading.' : 'sittersHub.activeFiltersHeadingEmpty.';
        heading.textContent = t(headingRoot + activeTabKey());

        var html = [];

        services.forEach(function(serviceKey) {
          var meta = serviceMeta[serviceKey];
          if (!meta) return;
          html.push(
            pillMarkup(
              [
                '<img class="active-filter-pill-icon" src="' + meta.icon + '" alt="" aria-hidden="true">',
                '<span>' + t(meta.labelKey) + '</span>',
                '<img class="active-filter-pill-close" src="' + meta.close + '" alt="" aria-hidden="true">'
              ],
              meta.pillClass,
              serviceKey
            )
          );
        });

        row.innerHTML = html.join('');
        requestAnimationFrame(syncAlignment);
      }

      window.sittersRenderActiveFilters = render;
      window.addEventListener('resize', syncAlignment);
      row.addEventListener('click', function(event) {
        var close = event.target.closest('.active-filter-pill-close');
        if (!close) return;
        var pill = close.closest('.active-filter-pill[data-service]');
        if (!pill) return;
        if (window.sittersRemoveAppliedService) {
          window.sittersRemoveAppliedService(pill.getAttribute('data-service'));
        }
      });
      render();
    })();

    (function initSittersFiltersModal() {
      var modal = document.getElementById('sitters-filters-modal');
      var openButton = document.getElementById('sitters-open-filters');
      var closeButton = document.getElementById('sitters-close-filters');
      var applyButton = modal ? modal.querySelector('.filters-modal-cta') : null;
      var modalBadge = modal ? modal.querySelector('.filters-modal-header-badge') : null;
      var triggerBadge = openButton ? openButton.querySelector('.jobs-filter-badge') : null;
      var serviceChips = modal ? Array.prototype.slice.call(modal.querySelectorAll('.filters-service-chip')) : [];
      var clearButtons = modal ? Array.prototype.slice.call(modal.querySelectorAll('.filters-section-clear')) : [];
      if (!modal || !openButton || !closeButton) return;

      var serviceWeights = {
        babysitting: 42,
        cleaning: 22,
        petCare: 18,
        seniorCare: 16,
        tutoring: 30
      };

      function syncServiceChip(button) {
        var image = button.querySelector('.filters-service-chip-icon img');
        var isActive = button.classList.contains('is-active');
        button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        if (image) {
          image.src = isActive ? button.getAttribute('data-on') : button.getAttribute('data-off');
        }
      }

      function getSelectedServicesCount() {
        return serviceChips.filter(function(button) {
          return button.classList.contains('is-active');
        }).length;
      }

      function getFilteredJobsCount() {
        var activeServices = serviceChips.filter(function(button) {
          return button.classList.contains('is-active');
        });
        if (activeServices.length === 0 || activeServices.length === serviceChips.length) {
          return 128;
        }
        return activeServices.reduce(function(total, button) {
          var keyNode = button.querySelector('[data-i18n]');
          var key = keyNode ? keyNode.getAttribute('data-i18n').split('.').pop() : '';
          return total + (serviceWeights[key] || 0);
        }, 0);
      }

      function syncApplyButtonLabel() {
        if (!applyButton) return;
        applyButton.textContent = 'Show ' + getFilteredJobsCount() + ' jobs';
      }

      function setBadgeVisibility(node, count) {
        if (!node) return;
        node.textContent = String(count);
        node.style.display = count > 0 ? 'inline-flex' : 'none';
      }

      function syncModalBadge() {
        var count = getSelectedServicesCount();
        var servicesSection = modal.querySelector('.filters-section[data-section="services"]');
        var sectionClear = servicesSection ? servicesSection.querySelector('.filters-section-clear') : null;
        var sectionDot = servicesSection ? servicesSection.querySelector('.filters-section-clear-dot') : null;
        setBadgeVisibility(modalBadge, count);
        if (sectionClear) {
          sectionClear.style.display = count > 0 ? 'inline-flex' : 'none';
        }
        if (sectionDot) {
          sectionDot.style.display = count > 0 ? 'inline-flex' : 'none';
        }
      }

      function applyActiveFilters() {
        window.sittersState.appliedServices = serviceChips.filter(function(button) {
          return button.classList.contains('is-active');
        }).map(function(button) {
          return button.getAttribute('data-service');
        });
        setBadgeVisibility(triggerBadge, getSelectedServicesCount());
        if (window.sittersRenderActiveFilters) window.sittersRenderActiveFilters();
      }

      function syncServiceChipsFromAppliedState() {
        serviceChips.forEach(function(button) {
          var isActive = (window.sittersState.appliedServices || []).indexOf(button.getAttribute('data-service')) !== -1;
          button.classList.toggle('is-active', isActive);
          syncServiceChip(button);
        });
        syncModalBadge();
        syncApplyButtonLabel();
      }

      function setOpen(isOpen) {
        modal.classList.toggle('is-open', isOpen);
        modal.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
        openButton.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      }

      openButton.addEventListener('click', function() {
        syncServiceChipsFromAppliedState();
        syncModalBadge();
        syncApplyButtonLabel();
        setOpen(true);
      });

      closeButton.addEventListener('click', function() {
        setOpen(false);
      });

      serviceChips.forEach(function(button) {
        syncServiceChip(button);
        button.addEventListener('click', function() {
          button.classList.toggle('is-active');
          syncServiceChip(button);
          syncModalBadge();
          syncApplyButtonLabel();
        });
      });

      clearButtons.forEach(function(button) {
        button.addEventListener('click', function(event) {
          event.preventDefault();
          event.stopPropagation();
          serviceChips.forEach(function(chip) {
            chip.classList.remove('is-active');
            syncServiceChip(chip);
          });
          syncModalBadge();
          syncApplyButtonLabel();
        });
      });

      if (applyButton) {
        applyButton.addEventListener('click', function() {
          applyActiveFilters();
          setOpen(false);
          if (window.sittersTriggerResultsReload) window.sittersTriggerResultsReload();
        });
      }

      window.sittersRemoveAppliedService = function(serviceKey) {
        window.sittersState.appliedServices = (window.sittersState.appliedServices || []).filter(function(key) {
          return key !== serviceKey;
        });
        syncServiceChipsFromAppliedState();
        setBadgeVisibility(triggerBadge, window.sittersState.appliedServices.length);
        if (window.sittersRenderActiveFilters) window.sittersRenderActiveFilters();
        if (window.sittersTriggerResultsReload) window.sittersTriggerResultsReload();
      };

      modal.querySelectorAll('.filters-section-header').forEach(function(header) {
        function toggleSection() {
          var section = header.closest('.filters-section');
          var nextState = !section.classList.contains('is-collapsed');
          section.classList.toggle('is-collapsed', nextState);
          header.setAttribute('aria-expanded', nextState ? 'false' : 'true');
        }

        header.addEventListener('click', function(event) {
          if (event.target.closest('.filters-section-clear')) return;
          toggleSection();
        });

        header.addEventListener('keydown', function(event) {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            toggleSection();
          }
        });
      });

      modal.querySelectorAll('.filters-sort-option').forEach(function(button) {
        function syncSortOption(option) {
          var isActive = option.classList.contains('is-active');
          var image = option.querySelector('.filters-sort-radio img');
          option.setAttribute('aria-pressed', isActive ? 'true' : 'false');
          if (image) {
            image.src = isActive
              ? '/jobs/jobs-for-sitters/assets/radio-selected.svg'
              : '/jobs/jobs-for-sitters/assets/radio-non-selected.svg';
          }
        }

        syncSortOption(button);
        button.addEventListener('click', function() {
          modal.querySelectorAll('.filters-sort-option').forEach(function(option) {
            option.classList.remove('is-active');
            syncSortOption(option);
          });
          button.classList.add('is-active');
          syncSortOption(button);
        });
      });

      applyActiveFilters();
      syncModalBadge();
      syncApplyButtonLabel();
    })();

    (function initSittersLocationSelect() {
      var select = document.getElementById('sitters-location-select');
      var display = document.getElementById('sitters-location-display');
      if (!select || !display) return;

      function sync() {
        var option = select.options[select.selectedIndex];
        display.textContent = option ? option.text : '';
      }

      select.addEventListener('change', function() {
        sync();
        if (window.sittersRenderActiveFilters) window.sittersRenderActiveFilters();
        if (window.sittersTriggerResultsReload) window.sittersTriggerResultsReload();
      });
      sync();
    })();

    (function initSittersNotificationsModal() {
      var modal = document.getElementById('sitters-notifications-modal');
      var openLink = document.getElementById('sitters-notifications-link');
      var closeButton = document.getElementById('sitters-close-notifications');
      var cancelButton = document.getElementById('sitters-cancel-notifications');
      var saveButton = document.getElementById('sitters-save-notifications');
      var emailSelect = document.getElementById('sitters-email-notifications');
      var mobileSelect = document.getElementById('sitters-mobile-notifications');
      var emailDisplay = document.getElementById('sitters-email-notifications-display');
      var mobileDisplay = document.getElementById('sitters-mobile-notifications-display');
      if (!modal || !openLink || !closeButton || !cancelButton || !saveButton || !emailSelect || !mobileSelect || !emailDisplay || !mobileDisplay) return;

      function syncSelect(select, display) {
        var option = select.options[select.selectedIndex];
        display.textContent = option ? option.text : '';
      }

      function setOpen(isOpen) {
        modal.classList.toggle('is-open', isOpen);
        modal.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
      }

      openLink.addEventListener('click', function(event) {
        event.preventDefault();
        setOpen(true);
      });

      [closeButton, cancelButton, saveButton].forEach(function(button) {
        button.addEventListener('click', function() {
          setOpen(false);
        });
      });

      emailSelect.addEventListener('change', function() {
        syncSelect(emailSelect, emailDisplay);
      });

      mobileSelect.addEventListener('change', function() {
        syncSelect(mobileSelect, mobileDisplay);
      });

      syncSelect(emailSelect, emailDisplay);
      syncSelect(mobileSelect, mobileDisplay);
    })();

    (function initSittersRadiusSelect() {
      var select = document.getElementById('sitters-radius-select');
      var display = document.getElementById('sitters-radius-display');
      if (!select || !display) return;

      function sync() {
        var option = select.options[select.selectedIndex];
        display.textContent = option ? option.text : '';
      }

      select.addEventListener('change', function() {
        sync();
        if (window.sittersRenderActiveFilters) window.sittersRenderActiveFilters();
        if (window.sittersTriggerResultsReload) window.sittersTriggerResultsReload();
      });
      sync();
    })();

    (function initSittersShowMore() {
      var grid = document.getElementById('sitters-results-grid');
      var button = document.getElementById('sitters-show-more');
      if (!grid || !button) return;

      var totalCards = 40;
      var batchSize = 10;
      var visibleCount = 0;
      var reloadTimer = null;
      var repliedSequence = 0;
      var cardsData = Array.from({ length: totalCards }, function(_, index) {
        return {
          id: 'job-' + (index + 1),
          status: 'new',
          repliedOrder: null
        };
      });

      function esc(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function iconClose() {
        return '<img src="/jobs/jobs-for-sitters/assets/icon-close-v2.svg" alt="" aria-hidden="true">';
      }

      function iconMessage() {
        return '<img src="/jobs/jobs-for-sitters/assets/icon-message.svg" alt="" aria-hidden="true">';
      }

      function iconReply() {
        return '<img src="/jobs/jobs-for-sitters/assets/icon-reply-v2.svg" alt="" aria-hidden="true">';
      }

      function iconChevronDown() {
        return '<img src="/jobs/jobs-for-sitters/assets/icon-chevron-down-v2.svg" alt="" aria-hidden="true">';
      }

      function iconBabysitting() {
        return '<svg class="job-advert-tag-icon" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M6 2.25a1.375 1.375 0 1 0 0 2.75 1.375 1.375 0 0 0 0-2.75ZM3.417 9.75V7.958A1.958 1.958 0 0 1 5.375 6h1.25a1.958 1.958 0 0 1 1.958 1.958V9.75M2.667 5.333V6.5M9.333 5.333V6.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }

      function dismissReasonIcon(key) {
        var map = {
          location: '/jobs/jobs-for-sitters/assets/icon-location.svg',
          rate: '/jobs/jobs-for-sitters/assets/icon-money.svg',
          schedule: '/jobs/jobs-for-sitters/assets/icon-calendar.svg',
          other: '/jobs/jobs-for-sitters/assets/icon-misc.svg'
        };
        return '<img src="' + map[key] + '" alt="" aria-hidden="true">';
      }

      function activeTabKey() {
        var activeTab = document.querySelector('.results-filter-tab.is-active .results-filter-tab-label');
        if (!activeTab) return 'new';
        var key = activeTab.getAttribute('data-i18n') || '';
        return key.split('.').pop() || 'new';
      }

      function getFilteredCardsData() {
        var tab = activeTabKey();
        var newCards = cardsData.filter(function(card) {
          return card.status === 'new';
        });
        var repliedCards = cardsData.filter(function(card) {
          return card.status === 'replied';
        }).sort(function(a, b) {
          return (a.repliedOrder || 0) - (b.repliedOrder || 0);
        });

        if (tab === 'new') return newCards;
        if (tab === 'replied') return repliedCards;
        return newCards.concat(repliedCards);
      }

      function dismissMenuMarkup(card) {
        if (card.status !== 'new') return '';
        if (window.sittersState.openDismissJobId !== card.id) return '';
        var reasonKeys = ['location', 'rate', 'schedule', 'other'];
        return [
          '<div class="job-advert-dismiss-menu" role="menu">',
          '<div class="job-advert-dismiss-label">' + esc(t('sittersHub.jobAdvert.dismissTitle')) + '</div>',
          reasonKeys.map(function(key) {
            return '<button class="job-advert-dismiss-option" type="button" data-dismiss-reason="' + key + '" data-job-id="' + card.id + '">' + dismissReasonIcon(key) + '<span>' + esc(t('sittersHub.jobAdvert.dismissReasons.' + key)) + '</span></button>';
          }).join(''),
          '</div>'
        ].join('');
      }

      function cardMarkup(card, hidden) {
        return [
          '<article class="job-advert-box', hidden ? ' is-hidden' : '', '" data-job-id="', card.id, '">',
            '<div class="job-advert-card">',
              '<div class="job-advert-topline">',
                '<div class="job-advert-posted"><span>', esc(t('sittersHub.jobAdvert.postedLabel')), '</span><span class="job-advert-posted-time">', esc(t('sittersHub.jobAdvert.postedTime')), '</span></div>',
                (card.status === 'replied'
                  ? '<span class="job-advert-status-icon" aria-hidden="true">' + iconMessage() + '</span>'
                  : '<button class="job-advert-close" type="button" aria-label="Close advert" data-job-id="' + card.id + '">' + iconClose() + '</button>'),
              '</div>',
              dismissMenuMarkup(card),
              '<div class="job-advert-heading-group">',
                '<div class="job-advert-heading">',
                  '<div class="job-advert-title">', esc(t('sittersHub.jobAdvert.title')), '</div>',
                '</div>',
                '<div class="job-advert-distance-line"><strong>', esc(t('sittersHub.jobAdvert.distance')), '</strong> ', esc(t('sittersHub.jobAdvert.distanceSuffix')), '</div>',
              '</div>',
              '<div class="job-advert-tags">',
                '<span class="job-advert-tag job-advert-tag--price">', esc(t('sittersHub.jobAdvert.price')), '</span>',
                '<span class="job-advert-tag job-advert-tag--service">', iconBabysitting(), esc(t('sittersHub.jobAdvert.service')), '</span>',
                '<span class="job-advert-tag job-advert-tag--date">', esc(t('sittersHub.jobAdvert.date')), '</span>',
              '</div>',
              '<div class="job-advert-divider"></div>',
              '<div class="job-advert-message">',
                '<div class="job-advert-message-intro"><span class="job-advert-author">', esc(t('sittersHub.jobAdvert.author')), '</span> ', esc(t('sittersHub.jobAdvert.wrote')), '</div>',
                '<div>', esc(t('sittersHub.jobAdvert.body')), '</div>',
              '</div>',
              '<div class="job-advert-divider"></div>',
              '<button class="job-advert-reply" type="button">', iconReply(), '<span>', esc(t('sittersHub.jobAdvert.reply')), '</span></button>',
              '<button class="job-advert-actions" type="button"><span>', esc(t('sittersHub.jobAdvert.otherActions')), '</span>', iconChevronDown(), '</button>',
            '</div>',
          '</article>'
        ].join('');
      }

      function skeletonCardMarkup() {
        return [
          '<article class="job-advert-box is-skeleton">',
            '<div class="job-advert-skeleton">',
              '<div class="job-advert-topline">',
                '<div class="skeleton-line skeleton-line--sm"></div>',
                '<div class="skeleton-line skeleton-line--sm" style="width:20px;height:20px;"></div>',
              '</div>',
              '<div class="skeleton-line skeleton-line--title"></div>',
              '<div class="skeleton-line skeleton-line--meta"></div>',
              '<div class="skeleton-chip-row">',
                '<div class="skeleton-chip skeleton-chip--price"></div>',
                '<div class="skeleton-chip skeleton-chip--service"></div>',
                '<div class="skeleton-chip skeleton-chip--date"></div>',
              '</div>',
              '<div class="job-advert-divider"></div>',
              '<div class="skeleton-line skeleton-line--text"></div>',
              '<div class="skeleton-line skeleton-line--text"></div>',
              '<div class="skeleton-line skeleton-line--text skeleton-line--text-short"></div>',
              '<div class="job-advert-divider"></div>',
              '<div class="skeleton-button"></div>',
            '</div>',
          '</article>'
        ].join('');
      }

      function renderCards() {
        var html = '';
        var filteredCards = getFilteredCardsData();
        filteredCards.forEach(function(card, index) {
          html += cardMarkup(card, index >= visibleCount);
        });
        grid.innerHTML = html;
      }

      function renderSkeletons() {
        var skeletonCount = Math.min(4, Math.max(visibleCount, 1));
        var html = '';
        for (var i = 0; i < skeletonCount; i++) {
          html += skeletonCardMarkup();
        }
        grid.innerHTML = html;
      }

      function syncButton() {
        button.style.display = visibleCount < getFilteredCardsData().length ? 'inline-flex' : 'none';
      }

      function triggerResultsReload() {
        if (reloadTimer) {
          clearTimeout(reloadTimer);
        }
        renderSkeletons();
        button.style.display = 'none';
        reloadTimer = setTimeout(function() {
          renderCards();
          syncButton();
          reloadTimer = null;
        }, 450);
      }

      visibleCount = batchSize;
      renderCards();
      syncButton();
      window.sittersTriggerResultsReload = triggerResultsReload;
      window.sittersSyncResultsAfterFilterChange = function() {
        visibleCount = Math.max(batchSize, Math.min(visibleCount, Math.max(getFilteredCardsData().length, batchSize)));
        window.sittersState.openDismissJobId = null;
        triggerResultsReload();
      };

      button.addEventListener('click', function() {
        var cards = Array.prototype.slice.call(grid.querySelectorAll('.job-advert-box'));
        var nextBatch = cards.slice(visibleCount, visibleCount + batchSize);
        nextBatch.forEach(function(card) {
          card.classList.remove('is-hidden');
        });
        if (nextBatch.length) {
          requestAnimationFrame(function() {
            nextBatch[0].scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
        }
        visibleCount = Math.min(visibleCount + batchSize, getFilteredCardsData().length);
        syncButton();
      });

      document.addEventListener('click', function(event) {
        if (!event.target.closest('.job-advert-dismiss-menu') && !event.target.closest('.job-advert-close')) {
          if (window.sittersState.openDismissJobId) {
            window.sittersState.openDismissJobId = null;
            renderCards();
            syncButton();
          }
        }
      });

      grid.addEventListener('click', function(event) {
        var closeButton = event.target.closest('.job-advert-close');
        if (closeButton) {
          var toggleId = closeButton.getAttribute('data-job-id');
          window.sittersState.openDismissJobId = window.sittersState.openDismissJobId === toggleId ? null : toggleId;
          renderCards();
          syncButton();
          return;
        }

        var reasonButton = event.target.closest('.job-advert-dismiss-option');
        if (!reasonButton) return;
        var jobId = reasonButton.getAttribute('data-job-id');
        var card = cardsData.find(function(item) { return item.id === jobId; });
        if (!card) return;

        card.status = 'replied';
        card.repliedOrder = ++repliedSequence;
        if (window.sittersState.dismissedJobIds.indexOf(jobId) === -1) {
          window.sittersState.dismissedJobIds.push(jobId);
        }
        window.sittersState.openDismissJobId = null;
        visibleCount = batchSize;
        triggerResultsReload();
      });

      syncButton();
    })();
  </script>
</body>
</html>
