<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Hlídačky.cz — Jobs for sitters</title>
  <link rel="icon" type="image/svg+xml" href="/hlidacky-logo_small.svg">
  <script>
    window.STRINGS = window.STRINGS || {};
    (function() {
      var langs = ['en', 'sk', 'hu', 'at', 'hr', 'cz'];
      var segments = location.pathname.split('/').filter(Boolean);
      var last = segments[segments.length - 1] || '';
      var lang = langs.indexOf(last) !== -1 ? last : '';
      var baseSegments = lang ? segments.slice(0, -1) : segments.slice();
      var base = baseSegments.length ? '/' + baseSegments.join('/') : '';
      document.write('<scr' + 'ipt src="' + base + '/strings.js"><\/scr' + 'ipt>');
      if (lang !== 'cz') {
        document.write('<scr' + 'ipt src="' + base + '/strings_' + (lang || 'en') + '.js"><\/scr' + 'ipt>');
      }
    })();
  </script>
  <style>
    :root {
      --text: #2a3539;
      --muted: #6b7176;
      --bg: #dce2e8;
      --panel: #ffffff;
      --border: #dde2e5;
      --surface: #f7f8fb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'soleil', Inter, system-ui, sans-serif;
    }

    .phone-frame {
      width: 390px;
      max-width: 100%;
      height: min(844px, calc(100vh - 48px));
      position: relative;
      background: var(--panel);
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(49, 72, 87, 0.18);
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      height: 52px;
      padding: 14px 21px 10px 23px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      background: #fff;
      flex-shrink: 0;
      position: relative;
      z-index: 5;
    }

    .notch-pill {
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .screen-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--panel);
      padding-bottom: var(--composer-scroll-padding, 0px);
      box-sizing: border-box;
    }

    .top-navbar {
      display: flex;
      width: 100%;
      height: 48px;
      padding: 0 16px;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #E5E5EA;
      background: #FFF;
      flex-shrink: 0;
      position: relative;
      z-index: 4;
    }

    .top-navbar-inner {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .top-navbar img {
      display: block;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .top-navbar-title {
      color: #2A3539;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: -0.051px;
    }

    .status-time {
      color: #2A3539;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 20px;
      letter-spacing: -0.165px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .status-icons img {
      display: block;
      flex-shrink: 0;
    }

    .content {
      min-height: 100%;
      padding: 0 0 20px;
      display: grid;
      align-content: start;
      gap: 0;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
    }

    .results-filter-tabs {
      display: flex;
      width: 375px;
      max-width: 100%;
      align-items: flex-start;
      margin: 0 auto;
      background: #FFF;
      border-bottom: 1px solid #E5E5EA;
      flex-shrink: 0;
      position: relative;
      z-index: 3;
    }

    .results-filter-tab {
      display: flex;
      width: 125px;
      padding: 8px 0;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1 0 0;
      border: 0;
      border-bottom: 2px solid #FFF;
      background: #FFF;

    .results-filter-tab.is-active {

    }

    .results-filter-tab:hover {
      background: #F7F7F7;
    }

    .results-filter-tab-label {
      display: flex;
      width: 100%;
      height: 28px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #212529;
      text-align: center;
      font-feature-settings: 'liga' off, 'clig' off;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: 'soleil', sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 450;
      line-height: 120%;
      letter-spacing: -0.32px;
    }

    .selector-section {
      display: flex;
      width: 375px;
      max-width: 100%;
      padding: 16px 20px 12px;
      flex-direction: column;
      align-items: center;
      gap: 8px;

      background: #FFF;
    }

    .selector-section-label {
      color: #2A3539;
      text-align: center;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: -0.051px;
    }

    .selector-group {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 450;
      line-height: 150%;
      letter-spacing: -0.16px;
    }

    .selector-chip {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      border: 1px solid #E5E5EA;
      background: #FFF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;

      background: #F7F7F7;
    }

    .selector-chip img {
      width: 24px;
      height: 24px;
      display: block;
      transition: filter 0.15s ease;
    }

    .selector-chip.is-selected {
      border-color: var(--chip-color, #F96073);
    }

    .selector-chip.is-selected:hover {
      border-color: var(--chip-color, #F96073);
      background: #F7F7F7;
    }

    .selector-chip--cleaning { --chip-color: #35CFEA; }
    .selector-chip--pet-care { --chip-color: #00D98B; }
    .selector-chip--senior-care { --chip-color: #FD8B25; }
    .selector-chip--tutoring { --chip-color: #B85EFF; }

    .selector-chip:focus-visible {
      outline: 2px solid rgba(42, 53, 57, 0.25);
      outline-offset: 2px;
    }

      display: flex;
      width: 100%;
      min-height: 60px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 9px 20px;

    .form-demo-section .selector-chip img {

    .form-demo-section .selector-chip.is-selected {

    .jobs-field--select {

    .jobs-filter-button {

      background: #FFF;

    .jobs-filter-button img {

      height: 16px;

      height: 24px;

      background: #FFF;

    .filters-modal-title-wrap {

      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .filters-modal-title-icon,
    .filters-modal-title-icon svg {
      width: 16px;
      height: 16px;
      display: block;
      color: #4A5A61;

    }

    .filters-modal-title {
      color: #2A3539;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', sans-serif;
      font-size: 24px;
      font-style: normal;
      font-weight: 450;
      line-height: 132%;
      letter-spacing: -0.32px;
    }

    .notifications-modal .filters-modal-title-wrap {
      gap: 8px;
      align-items: center;
    }

    .notifications-modal .filters-modal-title-icon,
    .notifications-modal .filters-modal-title-icon img {
      width: 42px;
      height: 42px;
      display: block;
      flex-shrink: 0;
    }

    .notifications-modal .filters-modal-title {
      color: #2A3539;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', sans-serif;
      font-size: 24px;
      font-style: normal;
      font-weight: 450;
      line-height: 140%;
      letter-spacing: -0.2px;
    }

    .filters-modal-header-badge {
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 999px;
      background: #F96073;
      color: #FFF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'soleil', sans-serif;
      font-size: 18px;
      font-style: normal;
      font-weight: 450;
      line-height: 100%;
      flex-shrink: 0;
    }

    .filters-modal-close {

      height: 40px;
      border: 0;
      background: none;
      color: #BEC2CE;
      opacity: 0.8;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;

      margin: -8px -8px -8px 0;
    }

    .filters-modal-close img {
      width: 20px;
      height: 20px;
      display: block;
    }

    .filters-modal-close:hover {

    }

    .filters-modal-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0 16px;
      background: #FFF;
    }

    .filters-section {
      padding: 16px 0;
      border-bottom: 1px solid #E5E5EA;
    }

    .filters-section.is-hidden {
      display: none;
    }

    .filters-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
    }

    .filters-section-title-wrap {

    }

    .filters-section-icon,
    .filters-section-icon svg {
      width: 18px;

      flex-shrink: 0;
    }

    .filters-section-title {
      color: #2A3539;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 450;
      line-height: 140%;
      letter-spacing: -0.32px;
    }

    .filters-section-controls {

    }

    .filters-section-clear {

    .filters-section-chevron,

      transition: transform 0.15s ease;
    }

    .filters-section.is-collapsed .filters-section-chevron {
      transform: rotate(-180deg);
    }

    .filters-section-content {
      padding-top: 14px;
    }

    .filters-section.is-collapsed .filters-section-content {

    }

    .filters-service-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 8px;
    }

    .filters-service-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid #E5E5EA;
      background: #FFF;
      color: #2A3539;
      font-family: 'soleil', sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 450;
      line-height: 140%;
      cursor: pointer;
      transition: background-color 200ms ease, border-color 200ms ease, color 200ms ease;
    }

    .filters-service-chip.is-active {
      border-color: transparent;
      background: #F96073;
      color: #FFF;
    }

    .filters-service-chip.is-active:hover {
      background: #E6213A;
      border-color: transparent;
      color: #FFF;
    }

    .filters-service-chip:not(.is-active):hover {
      border-color: #BEC2CE;
      background: #F7F7F7;
      color: #2A3539;
    }

    .filters-service-chip-icon,
    .filters-service-chip-icon img {
      width: 16px;
      height: 16px;
      display: block;
      flex-shrink: 0;
    }

    .filters-service-chip.is-active .filters-service-chip-icon img {

    .filters-select-field {
      width: 100%;
      min-height: 52px;
      border: 1px solid #E5E5EA;
      border-radius: 4px;
      background: #FFF;
      box-shadow: 0 1px 0 rgba(42, 53, 57, 0.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 12px;
      position: relative;
      overflow: hidden;
    }

    .filters-select-field-value {
      color: #2A3539;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 140%;
      letter-spacing: -0.16px;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .filters-select-field-chevron {
      width: 16px;
      height: 16px;
      display: block;
      flex-shrink: 0;
      color: #6F7A86;
    }

    .filters-select-field-select {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      appearance: none;
      border: 0;
    }

    .filters-modal-footer {
      position: sticky;
      bottom: 0;
      background: #FFF;
      border-top: 1px solid #E5E5EA;
      padding: 14px 20px 20px;
      flex-shrink: 0;
    }

    .filters-modal-cta {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 4px;
      background: #0DB020;
      color: #FFF;
      text-align: center;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 450;
      line-height: 22px;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.16);
      cursor: pointer;
      transition: background-color 200ms ease, box-shadow 200ms ease;
    }

    .filters-modal-cta:hover {
      background: #0A8C20;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.16);
    }

    .notifications-modal-body {

      font-family: 'soleil', sans-serif;
      font-size: 16px;

      font-size: 14px;
      font-style: normal;
      font-weight: 450;
      line-height: 140%;
      letter-spacing: 0;

    .notifications-field {
      width: 100%;
      min-height: 52px;
    }

    .notifications-field .jobs-field-value {
      padding-right: 28px;
      overflow: hidden;
      color: #2A3539;

      min-height: 52px;
      border: 0;
      border-radius: 4px;
      background: #0DB020;
      color: #FFF;
      text-align: center;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 450;

      min-height: 0;
      overflow-y: auto;
      padding: 16px 20px 20px;
      background: #FFF;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

      color: #8B91A3;
      font-family: 'soleil', sans-serif;

      border-radius: 8px;
      background: #F1F5FB;

  <script>
    window.sittersState = {
      appliedServices: ['babysitting'],
      dismissedJobIds: [],
      openDismissJobId: null,
      openMoreActionsJobId: null,
      openTemplatesJobId: null
    };

    function t(path) {
      var value = path.split('.').reduce(function(acc, key) {
        return acc && acc[key] !== undefined ? acc[key] : null;
      }, window.STRINGS);
      return value === null ? path : value;
    }

    function formatText(template, params) {
      return String(template).replace(/\{(\w+)\}/g, function(_, key) {
        return params && params[key] !== undefined ? params[key] : '';
      });
    }

    document.querySelectorAll('[data-i18n]').forEach(function(node) {
      node.textContent = t(node.getAttribute('data-i18n'));
    });

    document.querySelectorAll('[data-i18n-placeholder]').forEach(function(node) {
      node.setAttribute('placeholder', t(node.getAttribute('data-i18n-placeholder')));
    });

    window.sittersSyncSelectorChips = function() {};

    document.querySelectorAll('.selector-chip').forEach(function(button) {
      var image = button.querySelector('img');

      function syncFromAppliedState() {
        if (!image) return;
        var isSelected = (window.sittersState.appliedServices || []).indexOf(button.getAttribute('data-service')) !== -1;
        button.classList.toggle('is-selected', isSelected);
        button.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
        image.src = isSelected ? button.getAttribute('data-on') : button.getAttribute('data-off');
      }

      button.addEventListener('click', function() {
        var serviceKey = button.getAttribute('data-service');
        var applied = window.sittersState.appliedServices || [];
        var isSelected = applied.indexOf(serviceKey) !== -1;
        window.sittersState.appliedServices = isSelected
          ? applied.filter(function(key) { return key !== serviceKey; })
          : applied.concat(serviceKey);
        syncFromAppliedState();
        if (window.sittersSyncFiltersFromAppliedState) window.sittersSyncFiltersFromAppliedState();
        if (window.sittersRenderActiveFilters) window.sittersRenderActiveFilters();
        if (window.sittersTriggerResultsReload) window.sittersTriggerResultsReload();
      });

      syncFromAppliedState();
    });

    window.sittersSyncSelectorChips = function() {
      document.querySelectorAll('.selector-chip').forEach(function(button) {
        var image = button.querySelector('img');
        if (!image) return;
        var isSelected = (window.sittersState.appliedServices || []).indexOf(button.getAttribute('data-service')) !== -1;
        button.classList.toggle('is-selected', isSelected);
        button.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
        image.src = isSelected ? button.getAttribute('data-on') : button.getAttribute('data-off');
      });
    };

    document.querySelectorAll('.results-filter-tab').forEach(function(button) {
      button.addEventListener('click', function() {
        var previousTab = document.querySelector('.results-filter-tab.is-active .results-filter-tab-label');
        var previousTabKey = previousTab ? (previousTab.getAttribute('data-i18n') || '').split('.').pop() : 'new';
        var nextTab = button.querySelector('.results-filter-tab-label');
        var nextTabKey = nextTab ? (nextTab.getAttribute('data-i18n') || '').split('.').pop() : 'new';
        if (previousTabKey === 'new' && nextTabKey !== 'new' && window.cardsDataForSitters) {
          window.cardsDataForSitters.forEach(function(card) {
            card.keepInNewTab = false;
          });
        }
        document.querySelectorAll('.results-filter-tab').forEach(function(tab) {
          tab.classList.remove('is-active');
          tab.setAttribute('aria-pressed', 'false');
        });
        button.classList.add('is-active');
        button.setAttribute('aria-pressed', 'true');
        if (window.sittersRenderActiveFilters) window.sittersRenderActiveFilters();
        if (window.sittersTriggerResultsReload) window.sittersTriggerResultsReload();
      });
    });

    (function initSittersActiveFilters() {
      var row = document.getElementById('sitters-active-filters-row');
      var locationDisplay = document.getElementById('sitters-location-display');
      var radiusDisplay = document.getElementById('sitters-radius-display');
      if (!row || !locationDisplay || !radiusDisplay) return;

      function render() {
        var locationText = (locationDisplay.textContent || '').trim();
        var radiusText = (radiusDisplay.textContent || '').trim();
        var label = locationText;

        if (locationText && radiusText && locationText !== 'all locations') {
          label += ' (' + radiusText + ')';
        }

        row.innerHTML = label
          ? '<button class="active-filter-pill active-filter-pill--location" type="button" data-filter-action="open-modal"><img class="active-filter-pill-icon" src="/jobs/jobs-for-sitters/assets/location-pin-icon.svg" alt="" aria-hidden="true"><span>' + label + '</span></button>'
          : '';
      }

      window.sittersRenderActiveFilters = render;
      row.addEventListener('click', function(event) {
        var locationPill = event.target.closest('.active-filter-pill[data-filter-action="open-modal"]');
        if (locationPill) {
          if (window.sittersOpenFiltersModal) {
            window.sittersOpenFiltersModal();
          }
        }
      });
      render();
    })();

    (function initSittersFiltersModal() {
      var modal = document.getElementById('sitters-filters-modal');
      var openButton = document.getElementById('sitters-open-filters');
      var closeButton = document.getElementById('sitters-close-filters');
      var applyButton = modal ? modal.querySelector('.filters-modal-cta') : null;
      var modalBadge = modal ? modal.querySelector('.filters-modal-header-badge') : null;
      var triggerBadge = openButton ? openButton.querySelector('.jobs-filter-badge') : null;
      var topLocationSelect = document.getElementById('sitters-location-select');
      var topRadiusSelect = document.getElementById('sitters-radius-select');
      var modalLocationSelect = document.getElementById('sitters-modal-location-select');
      var modalRadiusSelect = document.getElementById('sitters-modal-radius-select');
      var modalLocationDisplay = document.getElementById('sitters-modal-location-display');
      var modalRadiusDisplay = document.getElementById('sitters-modal-radius-display');
      var radiusSection = modal ? modal.querySelector('.filters-section[data-section="radius"]') : null;
      var serviceChips = modal ? Array.prototype.slice.call(modal.querySelectorAll('.filters-service-chip')) : [];
      var clearButtons = modal ? Array.prototype.slice.call(modal.querySelectorAll('.filters-section-clear')) : [];
      if (!modal || !closeButton) return;

      var serviceWeights = {
        babysitting: 8,
        cleaning: 8,
        petCare: 8,
        seniorCare: 8,
        tutoring: 8
      };

      function syncServiceChip(button) {
        var image = button.querySelector('.filters-service-chip-icon img');
        var isActive = button.classList.contains('is-active');
        button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        if (image) {
          image.src = isActive ? button.getAttribute('data-on') : button.getAttribute('data-off');
        }
      }

      function getSelectedServicesCount() {
        return serviceChips.filter(function(button) {
          return button.classList.contains('is-active');
        }).length;
      }

      function getFilteredJobsCount() {
        var activeServices = serviceChips.filter(function(button) {
          return button.classList.contains('is-active');
        });
        if (activeServices.length === 0) {
          return 40;
        }
        return activeServices.reduce(function(total, button) {
          var keyNode = button.querySelector('[data-i18n]');
          var key = keyNode ? keyNode.getAttribute('data-i18n').split('.').pop() : '';
          return total + (serviceWeights[key] || 0);
        }, 0);
      }

      function syncApplyButtonLabel() {
        if (!applyButton) return;
        applyButton.textContent = 'Show ' + getFilteredJobsCount() + ' jobs';
      }

      function setBadgeVisibility(node, count) {
        if (!node) return;
        node.textContent = String(count);
        node.style.display = count > 0 ? 'inline-flex' : 'none';
      }

      function syncModalBadge() {
        var count = getSelectedServicesCount();
        var servicesSection = modal.querySelector('.filters-section[data-section="services"]');
        var sectionClear = servicesSection ? servicesSection.querySelector('.filters-section-clear') : null;
        var sectionDot = servicesSection ? servicesSection.querySelector('.filters-section-clear-dot') : null;
        setBadgeVisibility(modalBadge, count);
        if (sectionClear) {
          sectionClear.style.display = count > 0 ? 'inline-flex' : 'none';
        }

        if (window.sittersRenderActiveFilters) window.sittersRenderActiveFilters();

        var option = select.options[select.selectedIndex];
        display.textContent = option ? option.text : '';
      }

        if (!modalLocationSelect) return true;
        var option = modalLocationSelect.options[modalLocationSelect.selectedIndex];
        var value = option ? option.text : '';
        return value !== 'all locations';
      }

      function syncRadiusSectionVisibility() {
        if (!radiusSection) return;
        radiusSection.classList.toggle('is-hidden', !radiusShouldBeVisible());
      }

      function syncModalSelectsFromTopState() {
        if (topLocationSelect && modalLocationSelect) {
          modalLocationSelect.selectedIndex = topLocationSelect.selectedIndex;
        }
        if (topRadiusSelect && modalRadiusSelect) {
          modalRadiusSelect.selectedIndex = topRadiusSelect.selectedIndex;
        }
        syncSelectDisplay(modalLocationSelect, modalLocationDisplay);
        syncSelectDisplay(modalRadiusSelect, modalRadiusDisplay);
        syncRadiusSectionVisibility();
      }

      function applyModalSelectsToTopState() {
        if (topLocationSelect && modalLocationSelect && topLocationSelect.selectedIndex !== modalLocationSelect.selectedIndex) {
          topLocationSelect.selectedIndex = modalLocationSelect.selectedIndex;
          topLocationSelect.dispatchEvent(new Event('change', { bubbles: true }));
        }
        if (topRadiusSelect && modalRadiusSelect && topRadiusSelect.selectedIndex !== modalRadiusSelect.selectedIndex) {
          topRadiusSelect.selectedIndex = modalRadiusSelect.selectedIndex;
          topRadiusSelect.dispatchEvent(new Event('change', { bubbles: true }));
        }
      }

      function syncServiceChipsFromAppliedState() {
        serviceChips.forEach(function(button) {
          var isActive = (window.sittersState.appliedServices || []).indexOf(button.getAttribute('data-service')) !== -1;
          button.classList.toggle('is-active', isActive);
          syncServiceChip(button);

        syncApplyButtonLabel();

        modal.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
        if (openButton) {
          openButton.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        }
      }

        if (window.sittersTriggerResultsReload) window.sittersTriggerResultsReload();
      };

      window.sittersOpenFiltersModal = openFiltersModal;
      window.sittersSyncFiltersFromAppliedState = syncServiceChipsFromAppliedState;

        function toggleSection() {
          var section = header.closest('.filters-section');
          var nextState = !section.classList.contains('is-collapsed');

        }

        header.addEventListener('click', function(event) {
          if (event.target.closest('.filters-section-clear')) return;
          toggleSection();
        });

        header.addEventListener('keydown', function(event) {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            toggleSection();
          }
        });
      });

      if (modalLocationSelect) {
        modalLocationSelect.addEventListener('change', function() {
          syncSelectDisplay(modalLocationSelect, modalLocationDisplay);
          syncRadiusSectionVisibility();
        });
      }

      if (modalRadiusSelect) {
        modalRadiusSelect.addEventListener('change', function() {
          syncSelectDisplay(modalRadiusSelect, modalRadiusDisplay);
        });
      }

      applyActiveFilters();
      syncModalSelectsFromTopState();
      syncModalBadge();
      syncApplyButtonLabel();

        toastBody.textContent = t('sittersHub.reportModal.toast.body');
        toast.classList.add('is-visible');
        prepareToastSVG();
        requestAnimationFrame(function() {
          animateToastSVG();
        });
        if (toastTimer) {
          clearTimeout(toastTimer);
        }
        toastTimer = setTimeout(function() {
          hideToast();
        }, 3400);
      }

      function getResolvedInboxCount() {
        return initialNewJobIds.reduce(function(count, jobId) {
          var card = cardsData.find(function(item) { return item.id === jobId; });
          return count + (card && card.status !== 'new' ? 1 : 0);
        }, 0);
      }

      function getInboxToastMilestone(count) {
        var total = initialNewJobIds.length;
        if (!total || count <= 0) return null;
        if (count === total) return 'all';
        return count % 5 === 0 ? count : null;
      }

      function showInboxProgressToast(milestone) {
        if (!toast || !toastTitle || !toastBody) return;
        syncToastOffset();
        if (toastIllustration) {
          toastIllustration.innerHTML = inboxToastIllustration;
        }
        toast.classList.remove('toast-card--notifications');
        toastTitle.textContent = t('sittersHub.notificationsModal.inboxToast.title');
        toastBody.textContent = formatText(t('sittersHub.notificationsModal.inboxToast.body'), {
          countLabel: milestone === 'all'
            ? t('sittersHub.notificationsModal.inboxToast.all')
            : String(milestone)
        });
        toast.classList.add('is-visible');
        prepareToastSVG();
        requestAnimationFrame(function() {
          animateToastSVG();
        });
        if (toastTimer) {
          clearTimeout(toastTimer);
        }
        toastTimer = setTimeout(function() {
          hideToast();
        }, 3400);
      }

      function maybeShowInboxProgressToast() {
        var resolvedCount = getResolvedInboxCount();
        var milestone = getInboxToastMilestone(resolvedCount);
        if (!milestone) return false;
        if (inboxToastMilestonesShown.indexOf(String(milestone)) !== -1) return false;
        inboxToastMilestonesShown.push(String(milestone));
        showInboxProgressToast(milestone);
        return true;
      }

      window.sittersShowNotificationsToast = showNotificationsToast;
      window.sittersShowReportToast = showReportToast;

      function queueTypewriter(jobId, text) {
        pendingTypewriterJobId = jobId;
        pendingTypewriterText = text || '';
      }

      function queueComposerFocus(jobId, mode) {
        pendingFocusJobId = jobId || null;
        pendingFocusMode = mode || 'end';
      }

      function stopTypewriter() {
        if (typewriterTimer) {
          clearTimeout(typewriterTimer);
          typewriterTimer = null;
        }
        activeTypewriterJobId = null;
      }

      function startPendingTypewriter() {
        if (!pendingTypewriterJobId) return;
        var textarea = grid.querySelector('.job-advert-textarea[data-job-id="' + pendingTypewriterJobId + '"]');
        var text = pendingTypewriterText;
        pendingTypewriterJobId = null;
        pendingTypewriterText = '';
        if (!textarea) return;

        stopTypewriter();
        activeTypewriterJobId = textarea.getAttribute('data-job-id');
        textarea.value = '';
        autosizeTextarea(textarea);

        var index = 0;
        function step() {
          if (activeTypewriterJobId !== textarea.getAttribute('data-job-id')) return;
          index += 1;
          textarea.value = text.slice(0, index);
          autosizeTextarea(textarea);
          if (index < text.length) {
            var nextChar = text.charAt(index);
            var delay = nextChar === '\n' ? 60 : 8;
            typewriterTimer = setTimeout(step, delay);
            return;
          }
          stopTypewriter();
        }

        typewriterTimer = setTimeout(step, 60);
      }

      function focusPendingComposer() {
        if (!pendingFocusJobId) return;
        var textarea = grid.querySelector('.job-advert-textarea[data-job-id="' + pendingFocusJobId + '"]');
        var focusJobId = pendingFocusJobId;
        var focusMode = pendingFocusMode;
        pendingFocusJobId = null;
        pendingFocusMode = 'end';
        if (!textarea) return;
        requestAnimationFrame(function() {
          if (focusJobId !== textarea.getAttribute('data-job-id')) return;
          textarea.focus({ preventScroll: true });
          activeFocusedComposerJobId = focusJobId;
          var length = textarea.value.length;
          try {
            if (focusMode === 'start') {
              textarea.setSelectionRange(0, 0);
            } else {
              textarea.setSelectionRange(length, length);
            }
          } catch (error) {}
          syncComposerScrollPadding();
          ensureComposerVisible(textarea);
          setTimeout(function() {
            if (activeFocusedComposerJobId !== focusJobId) return;
            syncComposerScrollPadding();
            ensureComposerVisible(textarea);
          }, 280);
        });
      }

      function ensureComposerVisible(textarea) {
        if (!textarea || !screenScroll) return;
        var composer = textarea.closest('.job-advert-composer');
        if (!composer) return;
        var sendButton = composer.querySelector('.job-advert-reply[data-reply-action="send"]');

        var scrollRect = screenScroll.getBoundingClientRect();
        var viewportBottom = scrollRect.bottom;
        if (window.visualViewport && window.visualViewport.height) {
          viewportBottom = Math.min(viewportBottom, window.visualViewport.height);
        }

        var textareaRect = textarea.getBoundingClientRect();
        var composerRect = composer.getBoundingClientRect();
        var sendButtonRect = sendButton ? sendButton.getBoundingClientRect() : null;
        var targetBottom = viewportBottom - 12;
        var focusBottom = sendButtonRect
          ? sendButtonRect.bottom
          : Math.max(textareaRect.bottom, composerRect.bottom);
        var overflowBottom = focusBottom - targetBottom;
        if (overflowBottom > 0) {
          screenScroll.scrollTop += overflowBottom;
          return;
        }

        var targetTop = scrollRect.top + 12;
        var overflowTop = targetTop - textareaRect.top;
        if (overflowTop > 0) {
          screenScroll.scrollTop -= overflowTop;
        }
      }

      function syncComposerScrollPadding() {
        if (!screenScroll) return;
        if (!activeFocusedComposerJobId) {
          screenScroll.style.setProperty('--composer-scroll-padding', '0px');
          return;
        }

        var keyboardInset = 0;
        if (window.visualViewport && window.visualViewport.height) {
          keyboardInset = Math.max(0, window.innerHeight - window.visualViewport.height);
        }

        var extraPadding = Math.max(220, keyboardInset + 140);
        screenScroll.style.setProperty('--composer-scroll-padding', extraPadding + 'px');
      }

      function currentReplyText(card) {
        return typeof card.replyText === 'string' ? card.replyText : '';
      }

      function sendDisabled(card) {
        return !currentReplyText(card).trim() || activeTypewriterJobId === card.id;
      }

      function templatesModalOptionMarkup(templateText, index) {
        var isActive = index === modalTemplateIndex;
        return [
          '<button class="templates-modal-option', (isActive ? ' is-active' : ''), '" type="button" data-template-index="', index, '">',
            '<span class="templates-modal-option-radio">', dismissReasonRadio(isActive), '</span>',
            '<p class="templates-modal-option-text">', esc(templateText), '</p>',
          '</button>'
        ].join('');
      }

      function renderTemplatesModal() {
        if (!templatesList) return;
        templatesList.innerHTML = replyTemplates.map(function(templateText, index) {
          return templatesModalOptionMarkup(templateText, index);
        }).join('');
      }

      function setTemplatesModalOpen(isOpen) {
        if (!templatesModal) return;
        templatesModal.classList.toggle('is-open', isOpen);
        templatesModal.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
        if (!isOpen) {
          window.sittersState.openTemplatesJobId = null;
        }
      }

      function openTemplatesModal(jobId) {
        var card = cardsData.find(function(item) { return item.id === jobId; });
        if (!card || !templatesModal) return;
        window.sittersState.openTemplatesJobId = jobId;
        modalTemplateIndex = card.templateIndex || 0;
        renderTemplatesModal();
        setTemplatesModalOpen(true);
      }

      function applySelectedTemplate() {
        var jobId = window.sittersState.openTemplatesJobId;
        var card = cardsData.find(function(item) { return item.id === jobId; });
        if (!card) {
          setTemplatesModalOpen(false);
          return;
        }
        if (card.replyStage === 'custom') {
          card.customReplyText = card.replyText;
        }
        var shouldAnimate = card.templateIndex !== modalTemplateIndex || card.replyStage !== 'template';
        card.templateIndex = modalTemplateIndex;
        card.replyStage = 'template';
        card.replyText = replyTemplates[modalTemplateIndex];
        if (shouldAnimate) {
          queueTypewriter(jobId, card.replyText);
        }
        queueComposerFocus(jobId, 'end');
        setTemplatesModalOpen(false);
        renderCards();
        syncButton();
      }

      function replyComposerMarkup(card) {
        var isTemplate = card.replyStage === 'template';
        var textareaValue = (isTemplate && pendingTypewriterJobId === card.id) ? '' : esc(card.replyText);
        var isSendDisabled = sendDisabled(card);
        return [
          '<div class="job-advert-composer">',
            '<div class="job-advert-composer-head">',
              '<div class="job-advert-composer-label">', (isTemplate ? iconSparkle() : iconPenSquare()), '<span>', esc(t(isTemplate ? 'sittersHub.jobAdvert.replyComposer.automaticReply' : 'sittersHub.jobAdvert.replyComposer.yourReply')), '</span></div>',
              (isTemplate
                ? '<button class="job-advert-composer-action" type="button" data-reply-action="clear" data-job-id="' + card.id + '">' + iconEraser() + '<span>' + esc(t('sittersHub.jobAdvert.replyComposer.clear')) + '</span></button>'
                : '<button class="job-advert-composer-action" type="button" data-reply-action="use-template" data-job-id="' + card.id + '">' + iconSparkle() + '<span>' + esc(t('sittersHub.jobAdvert.replyComposer.useTemplate')) + '</span></button>'),
            '</div>',
            '<textarea class="job-advert-textarea', (isTemplate ? ' job-advert-textarea--template' : ''), '" data-job-id="', card.id, '" spellcheck="false" placeholder="', (!isTemplate ? esc(t('sittersHub.jobAdvert.replyComposer.inputPlaceholder')) : ''), '">', textareaValue, '</textarea>',
            (isTemplate
              ? '<div class="job-advert-template-footer"><div class="job-advert-template-switcher"><button class="job-advert-template-nav" type="button" data-template-step="-1" data-job-id="' + card.id + '">' + iconChevronLeft() + '</button><span class="job-advert-template-switcher-label">' + templatePagerLabel(card) + '</span><button class="job-advert-template-nav" type="button" data-template-step="1" data-job-id="' + card.id + '">' + iconChevronRight() + '</button></div><button class="job-advert-template-link" type="button" data-reply-action="all-templates" data-job-id="' + card.id + '">' + esc(t('sittersHub.jobAdvert.replyComposer.allTemplates')) + '</button></div>'
              : ''),
            '<div class="job-advert-action-row">',
              '<button class="job-advert-reply" type="button" data-reply-action="send" data-job-id="', card.id, '"', (isSendDisabled ? ' disabled aria-disabled="true"' : ''), '>', iconPaperplane(), '<span>', esc(t('sittersHub.jobAdvert.replyComposer.sendMessage')), '</span></button>',
              archiveTriggerMarkup(card),
              dismissMenuMarkup(card),
            '</div>',
          '</div>'
        ].join('');
      }

      function replySummaryMarkup(card) {
        return [
          '<div class="job-advert-response-block">',
            '<div class="job-advert-response-time">', esc(card.replyTimestamp), '</div>',
            '<div class="job-advert-response-preview">', esc(card.replyText), '</div>',
            '<div class="job-advert-action-row">',
              '<button class="job-advert-secondary" type="button" data-reply-action="show-messages" data-job-id="', card.id, '">', iconReplyMessages(), '<span>', esc(t('sittersHub.jobAdvert.replyComposer.showMessages')), '</span></button>',
            '</div>',
          '</div>'
        ].join('');
      }

      function actionAreaMarkup(card) {
        if (card.replyStage === 'summary') return replySummaryMarkup(card);
        if (card.replyStage === 'template' || card.replyStage === 'custom') return replyComposerMarkup(card);
        return '<div class="job-advert-action-row"><button class="job-advert-reply" type="button" data-reply-action="open-template" data-job-id="' + card.id + '">' + iconReply() + '<span>' + esc(t('sittersHub.jobAdvert.reply')) + '</span></button>' + archiveTriggerMarkup(card) + dismissMenuMarkup(card) + '</div>';
      }

      function cardMarkup(card, hidden) {
        var isExpanded = !!card.descriptionExpanded;
        return [
          '<article class="job-advert-box', hidden ? ' is-hidden' : '', '" data-job-id="', card.id, '">',
            '<div class="job-advert-card">',
              '<div class="job-advert-topline">',
                '<div class="job-advert-posted"><span class="job-advert-posted-author">', esc(t('sittersHub.jobAdvert.author')), '</span><span>', esc(t('sittersHub.jobAdvert.postedLabel')), '</span><span class="job-advert-posted-time">', esc(t('sittersHub.jobAdvert.postedTime')), '</span></div>',
                (card.status === 'replied'
                    ? '<div class="job-advert-status-badge">' + iconCheckStatus() + '<span>' + esc(t('sittersHub.jobAdvert.alreadyReplied')) + '</span></div>'
                    : '<div class="job-advert-topline-actions"><button class="job-advert-ellipsis" type="button" aria-label="More actions" data-more-actions-trigger="true" data-job-id="' + card.id + '">' + iconEllipsis() + '</button></div>'),
              '</div>',
              moreActionsMenuMarkup(card),
              '<div class="job-advert-heading-group">',
                '<div class="job-advert-heading">',
                  '<div class="job-advert-title">', esc(t('sittersHub.jobAdvert.title')), '</div>',
                '</div>',
                '<div class="job-advert-distance-line"><strong>', esc(t('sittersHub.jobAdvert.distance')), '</strong> ', esc(t('sittersHub.jobAdvert.distanceSuffix')), '</div>',
              '</div>',
              '<div class="job-advert-tags">',
                '<span class="job-advert-tag job-advert-tag--price">', esc(t('sittersHub.jobAdvert.price')), '</span>',
                serviceBadgeMarkup(card.serviceKey),
                '<span class="job-advert-tag job-advert-tag--date">', esc(t('sittersHub.jobAdvert.date')), '</span>',
              '</div>',
              '<div class="job-advert-divider"></div>',
              '<div class="job-advert-message">',
                '<div class="job-advert-message-body', (isExpanded ? '' : ' is-collapsed'), '" data-job-description-body="', card.id, '">', esc(card.bodyText || t('sittersHub.jobAdvert.body')), '</div>',
                '<button class="job-advert-message-more', (isExpanded ? '' : ' is-visible'), '" type="button" data-description-action="expand" data-job-id="', card.id, '">', esc(t('sittersHub.jobAdvert.readMore')), '</button>',
              '</div>',
              '<div class="job-advert-divider"></div>',
              actionAreaMarkup(card),
            '</div>',
          '</article>'
        ].join('');
      }

      function skeletonCardMarkup() {
        return [
          '<article class="job-advert-box is-skeleton">',
            '<div class="job-advert-skeleton">',
              '<div class="job-advert-topline">',
                '<div class="skeleton-line skeleton-line--sm"></div>',
                '<div class="skeleton-line skeleton-line--sm" style="width:20px;height:20px;"></div>',
              '</div>',
              '<div class="skeleton-line skeleton-line--title"></div>',
              '<div class="skeleton-line skeleton-line--meta"></div>',
              '<div class="skeleton-chip-row">',
                '<div class="skeleton-chip skeleton-chip--price"></div>',
                '<div class="skeleton-chip skeleton-chip--service"></div>',
                '<div class="skeleton-chip skeleton-chip--date"></div>',
              '</div>',
              '<div class="job-advert-divider"></div>',
              '<div class="skeleton-line skeleton-line--text"></div>',
              '<div class="skeleton-line skeleton-line--text"></div>',
              '<div class="skeleton-line skeleton-line--text skeleton-line--text-short"></div>',
              '<div class="job-advert-divider"></div>',
              '<div class="skeleton-button"></div>',
            '</div>',
          '</article>'
        ].join('');
      }

      function renderCards() {
        stopTypewriter();
        var html = '';
        var filteredCards = getFilteredCardsData();
        filteredCards.forEach(function(card, index) {
          html += cardMarkup(card, index >= visibleCount);
        });
        grid.innerHTML = html;
        syncDismissMenusPlacement();
        syncDescriptionClamp();
        syncTextareas();
        startPendingTypewriter();
        focusPendingComposer();
      }

      function syncDismissMenusPlacement() {
        if (!screenScroll) return;
        var scrollRect = screenScroll.getBoundingClientRect();
        Array.prototype.forEach.call(grid.querySelectorAll('.job-advert-dismiss-menu'), function(menu) {
          menu.classList.remove('job-advert-dismiss-menu--above');
          menu.classList.remove('job-advert-dismiss-menu--below');
          var menuRect = menu.getBoundingClientRect();
          var overflowsTop = menuRect.top < scrollRect.top + 8;
          if (overflowsTop) {
            menu.classList.add('job-advert-dismiss-menu--below');
          } else {
            menu.classList.add('job-advert-dismiss-menu--above');
          }
        });
        Array.prototype.forEach.call(grid.querySelectorAll('.job-advert-more-menu'), function(menu) {
          menu.classList.remove('job-advert-more-menu--upward');
          var menuRect = menu.getBoundingClientRect();
          var overflowsBottom = menuRect.bottom > scrollRect.bottom - 8;
          if (overflowsBottom) {
            menu.classList.add('job-advert-more-menu--upward');
          }
        });
      }

      function syncDescriptionClamp() {
        Array.prototype.forEach.call(grid.querySelectorAll('[data-job-description-body]'), function(body) {
          var jobId = body.getAttribute('data-job-description-body');
          var buttonNode = grid.querySelector('[data-description-action="expand"][data-job-id="' + jobId + '"]');
          if (!buttonNode) return;
          var card = cardsData.find(function(item) { return item.id === jobId; });
          if (!card) return;
          if (card.descriptionExpanded) {
            buttonNode.classList.remove('is-visible');
            return;
          }
          var isOverflowing = body.scrollHeight > body.clientHeight + 1;
          buttonNode.classList.toggle('is-visible', isOverflowing);
        });
      }

      function autosizeTextarea(textarea) {
        if (!textarea) return;
        var minHeight = textarea.classList.contains('job-advert-textarea--template') ? 144 : 108;
        textarea.style.height = 'auto';
        textarea.style.height = Math.max(minHeight, textarea.scrollHeight) + 'px';
      }

      function syncTemplateComposerInPlace(jobId, focusMode) {
        var textarea = grid.querySelector('.job-advert-textarea[data-job-id="' + jobId + '"]');
        var card = cardsData.find(function(item) { return item.id === jobId; });
        if (!textarea || !card) return false;

        textarea.value = card.replyText || '';
        autosizeTextarea(textarea);

        var composer = textarea.closest('.job-advert-composer');
        if (composer) {
          var switcherLabel = composer.querySelector('.job-advert-template-switcher-label');
          if (switcherLabel) {
            switcherLabel.textContent = t('sittersHub.jobAdvert.replyComposer.templateLabel') + ' ' + (card.templateIndex + 1) + ' / ' + replyTemplates.length;
          }
          var sendButton = composer.querySelector('.job-advert-reply[data-reply-action="send"][data-job-id="' + jobId + '"]');
          if (sendButton) {
            var disabled = sendDisabled(card);
            sendButton.disabled = disabled;
            sendButton.setAttribute('aria-disabled', disabled ? 'true' : 'false');
          }
        }

        activeFocusedComposerJobId = jobId;
        requestAnimationFrame(function() {
          try {
            textarea.focus({ preventScroll: true });
            var length = textarea.value.length;
            if (focusMode === 'start') {
              textarea.setSelectionRange(0, 0);
            } else {
              textarea.setSelectionRange(length, length);
            }
          } catch (error) {}
          syncComposerScrollPadding();
          ensureComposerVisible(textarea);
          setTimeout(function() {
            if (activeFocusedComposerJobId !== jobId) return;
            syncComposerScrollPadding();
            ensureComposerVisible(textarea);
          }, 180);
          setTimeout(function() {
            if (activeFocusedComposerJobId !== jobId) return;
            syncComposerScrollPadding();
            ensureComposerVisible(textarea);
          }, 320);
        });

        return true;
      }

      function syncTextareas() {
        Array.prototype.forEach.call(grid.querySelectorAll('.job-advert-textarea'), function(textarea) {
          autosizeTextarea(textarea);
        });
      }

      function renderSkeletons() {
        var skeletonCount = Math.min(4, Math.max(visibleCount, 1));
        var html = '';
        for (var i = 0; i < skeletonCount; i++) {
          html += skeletonCardMarkup();
        }
        grid.innerHTML = html;
      }

      function syncButton() {
        button.style.display = visibleCount < getFilteredCardsData().length ? 'inline-flex' : 'none';
      }

      function triggerResultsReload() {
        if (reloadTimer) {
          clearTimeout(reloadTimer);
        }
        renderSkeletons();
        button.style.display = 'none';
        reloadTimer = setTimeout(function() {
          renderCards();
          syncButton();
          reloadTimer = null;
        }, 450);
      }

      visibleCount = batchSize;
      renderCards();
      syncButton();
      window.sittersTriggerResultsReload = triggerResultsReload;
      window.sittersSyncResultsAfterFilterChange = function() {
        visibleCount = Math.max(batchSize, Math.min(visibleCount, Math.max(getFilteredCardsData().length, batchSize)));
        window.sittersState.openDismissJobId = null;
        window.sittersState.openMoreActionsJobId = null;
        triggerResultsReload();
      };

      button.addEventListener('click', function() {
        var cards = Array.prototype.slice.call(grid.querySelectorAll('.job-advert-box'));
        var nextBatch = cards.slice(visibleCount, visibleCount + batchSize);
        nextBatch.forEach(function(card) {
          card.classList.remove('is-hidden');
        });
        if (nextBatch.length) {
          requestAnimationFrame(function() {
            nextBatch[0].scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
        }
        visibleCount = Math.min(visibleCount + batchSize, getFilteredCardsData().length);
        syncButton();
      });

      document.addEventListener('click', function(event) {
        var shouldCloseDismiss = !event.target.closest('.job-advert-dismiss-menu') && !event.target.closest('[data-dismiss-trigger]') && !event.target.closest('.job-advert-status-icon');
        var shouldCloseMore = !event.target.closest('.job-advert-more-menu') && !event.target.closest('[data-more-actions-trigger]');
        if (shouldCloseDismiss && window.sittersState.openDismissJobId) {
          window.sittersState.openDismissJobId = null;
          renderCards();
          syncButton();
          return;
        }
        if (shouldCloseMore && window.sittersState.openMoreActionsJobId) {
          window.sittersState.openMoreActionsJobId = null;
          renderCards();
          syncButton();
        }
      });

      grid.addEventListener('click', function(event) {
        var descriptionActionButton = event.target.closest('[data-description-action]');
        if (descriptionActionButton) {
          var descriptionJobId = descriptionActionButton.getAttribute('data-job-id');
          var descriptionCard = cardsData.find(function(item) { return item.id === descriptionJobId; });
          if (!descriptionCard) return;
          descriptionCard.descriptionExpanded = true;
          renderCards();
          syncButton();
          return;
        }

        var replyActionButton = event.target.closest('[data-reply-action]');
        if (replyActionButton) {
          var action = replyActionButton.getAttribute('data-reply-action');
          var actionJobId = replyActionButton.getAttribute('data-job-id');
          var actionCard = cardsData.find(function(item) { return item.id === actionJobId; });
          if (!actionCard) return;

          if (action === 'open-template') {
            if (actionCard.replyStage === 'custom') {
              actionCard.customReplyText = actionCard.replyText;
            }
            actionCard.replyStage = 'template';
            actionCard.replyText = replyTemplates[actionCard.templateIndex];
            queueTypewriter(actionJobId, actionCard.replyText);
            queueComposerFocus(actionJobId, 'end');
            renderCards();
            syncButton();
            return;
          }

          if (action === 'send') {
            if (sendDisabled(actionCard)) return;
            if (actionCard.status !== 'replied') {
              actionCard.repliedOrder = ++repliedSequence;
            }
            actionCard.status = 'replied';
            actionCard.keepInNewTab = activeTabKey() === 'new';
            actionCard.dismissReason = null;
            actionCard.replyStage = 'summary';
            actionCard.replyTimestamp = t('sittersHub.jobAdvert.replyComposer.sentAt');
            renderCards();
            syncButton();
            if (!maybeShowInboxProgressToast()) {
              showSentToast(t('sittersHub.jobAdvert.author'));
            }
            return;
          }

          if (action === 'use-template') {
            actionCard.customReplyText = actionCard.replyText;
            actionCard.replyStage = 'template';
            actionCard.replyText = replyTemplates[actionCard.templateIndex];
            queueTypewriter(actionJobId, actionCard.replyText);
            queueComposerFocus(actionJobId, 'end');
            renderCards();
            syncButton();
            return;
          }

          if (action === 'clear') {
            actionCard.replyStage = 'custom';
            actionCard.replyText = actionCard.customReplyText || '';
            queueComposerFocus(actionJobId, actionCard.replyText ? 'end' : 'start');
            renderCards();
            syncButton();
            return;
          }

          if (action === 'all-templates') {
            openTemplatesModal(actionJobId);
            return;
          }

          if (action === 'show-messages') {
            return;
          }
        }

        var templateNavButton = event.target.closest('[data-template-step]');
        if (templateNavButton) {
          var templateJobId = templateNavButton.getAttribute('data-job-id');
          var templateCard = cardsData.find(function(item) { return item.id === templateJobId; });
          if (!templateCard) return;
          var step = Number(templateNavButton.getAttribute('data-template-step')) || 0;
          templateCard.templateIndex = (templateCard.templateIndex + step + replyTemplates.length) % replyTemplates.length;
          templateCard.replyText = replyTemplates[templateCard.templateIndex];
          if (activeTypewriterJobId === templateJobId) {
            stopTypewriter();
          }
          if (!syncTemplateComposerInPlace(templateJobId, 'end')) {
            queueComposerFocus(templateJobId, 'end');
            renderCards();
            syncButton();
          }
          return;
        }

        var dismissTriggerButton = event.target.closest('[data-dismiss-trigger]');
        if (dismissTriggerButton) {
          var toggleId = dismissTriggerButton.getAttribute('data-job-id');
          window.sittersState.openDismissJobId = window.sittersState.openDismissJobId === toggleId ? null : toggleId;
          window.sittersState.openMoreActionsJobId = null;
          renderCards();
          syncButton();
          return;
        }

        var statusButton = event.target.closest('.job-advert-status-icon');
        if (statusButton) {
          var repliedId = statusButton.getAttribute('data-job-id');
          window.sittersState.openDismissJobId = window.sittersState.openDismissJobId === repliedId ? null : repliedId;
          window.sittersState.openMoreActionsJobId = null;
          renderCards();
          syncButton();
          return;
        }

        var moreActionsButton = event.target.closest('[data-more-actions-trigger]');
        if (moreActionsButton) {
          var moreId = moreActionsButton.getAttribute('data-job-id');
          window.sittersState.openMoreActionsJobId = window.sittersState.openMoreActionsJobId === moreId ? null : moreId;
          window.sittersState.openDismissJobId = null;
          renderCards();
          syncButton();
          return;
        }

        var moreActionItem = event.target.closest('[data-more-action]');
        if (moreActionItem) {
          var moreAction = moreActionItem.getAttribute('data-more-action');
          var moreActionJobId = moreActionItem.getAttribute('data-job-id');
          window.sittersState.openMoreActionsJobId = null;
          renderCards();
          syncButton();
          if (moreAction === 'report-ad' && window.sittersOpenReportModal) {
            window.sittersOpenReportModal(moreActionJobId);
          }
          return;
        }

        var reasonButton = event.target.closest('.job-advert-dismiss-option');
        if (!reasonButton) return;
        var jobId = reasonButton.getAttribute('data-job-id');
        var card = cardsData.find(function(item) { return item.id === jobId; });
        if (!card) return;

        card.dismissReason = reasonButton.getAttribute('data-dismiss-reason');
        card.status = 'archived';
        card.replyStage = null;
        card.repliedOrder = null;
        if (window.sittersState.dismissedJobIds.indexOf(jobId) === -1) {
          window.sittersState.dismissedJobIds.push(jobId);
        }
        window.sittersState.openDismissJobId = null;
        window.sittersState.openMoreActionsJobId = null;
        visibleCount = batchSize;
        triggerResultsReload();
        maybeShowInboxProgressToast();
      });

      grid.addEventListener('pointerdown', function(event) {
        var templateNavButton = event.target.closest('.job-advert-template-nav');
        if (!templateNavButton) return;
        event.preventDefault();
      });

      grid.addEventListener('input', function(event) {
        if (!event.target.classList.contains('job-advert-textarea')) return;
        var jobId = event.target.getAttribute('data-job-id');
        var card = cardsData.find(function(item) { return item.id === jobId; });
        if (!card) return;
        if (activeTypewriterJobId === jobId) {
          stopTypewriter();
        }
        card.replyText = event.target.value;
        if (card.replyStage === 'custom') {
          card.customReplyText = card.replyText;
        }
        autosizeTextarea(event.target);
        var sendButton = grid.querySelector('.job-advert-reply[data-reply-action="send"][data-job-id="' + jobId + '"]');
        if (sendButton) {
          var disabled = sendDisabled(card);
          sendButton.disabled = disabled;
          sendButton.setAttribute('aria-disabled', disabled ? 'true' : 'false');
        }
      });

      grid.addEventListener('focusin', function(event) {
        if (!event.target.classList.contains('job-advert-textarea')) return;
        activeFocusedComposerJobId = event.target.getAttribute('data-job-id');
        syncComposerScrollPadding();
        ensureComposerVisible(event.target);
        setTimeout(function() {
          if (activeFocusedComposerJobId !== event.target.getAttribute('data-job-id')) return;
          syncComposerScrollPadding();
          ensureComposerVisible(event.target);
        }, 280);
      });

      grid.addEventListener('focusout', function(event) {
        if (!event.target.classList.contains('job-advert-textarea')) return;
        if (activeFocusedComposerJobId === event.target.getAttribute('data-job-id')) {
          activeFocusedComposerJobId = null;
        }
        syncComposerScrollPadding();
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', function() {
          syncComposerScrollPadding();
          syncToastOffset();
          if (!activeFocusedComposerJobId) return;
          var activeTextarea = grid.querySelector('.job-advert-textarea[data-job-id="' + activeFocusedComposerJobId + '"]');
          ensureComposerVisible(activeTextarea);
        });
      }

      grid.addEventListener('keydown', function(event) {
        if (!event.target.classList.contains('job-advert-textarea')) return;
        if (!(event.metaKey || event.ctrlKey) || event.key !== 'Enter') return;
        var jobId = event.target.getAttribute('data-job-id');
        var card = cardsData.find(function(item) { return item.id === jobId; });
        if (!card || sendDisabled(card)) return;
        event.preventDefault();
        if (card.status !== 'replied') {
          card.repliedOrder = ++repliedSequence;
        }
        card.status = 'replied';
        card.keepInNewTab = activeTabKey() === 'new';
        card.dismissReason = null;
        card.replyStage = 'summary';
        card.replyTimestamp = t('sittersHub.jobAdvert.replyComposer.sentAt');
        renderCards();
        syncButton();
        if (!maybeShowInboxProgressToast()) {
          showSentToast(t('sittersHub.jobAdvert.author'));
        }
      });

      if (templatesList) {
        templatesList.addEventListener('click', function(event) {
          var option = event.target.closest('.templates-modal-option');
          if (!option) return;
          modalTemplateIndex = Number(option.getAttribute('data-template-index')) || 0;
          renderTemplatesModal();
        });
      }

      [templatesCloseButton].forEach(function(buttonNode) {
        if (!buttonNode) return;
        buttonNode.addEventListener('click', function() {
          setTemplatesModalOpen(false);
        });
      });

      if (templatesApplyButton) {
        templatesApplyButton.addEventListener('click', function() {
          applySelectedTemplate();
        });
      }

      if (toastCloseButton) {
        toastCloseButton.addEventListener('click', function() {
          hideToast();
        });
      }

      syncToastOffset();

      function getToastSVGEls() {
        var svg = toast ? toast.querySelector('.toast-svg') : null;
        if (!svg) return null;
        var all = Array.prototype.slice.call(svg.querySelectorAll('path, circle, ellipse, rect, line, polyline, polygon'));
        var strokeEls = all.filter(function(el) {
          var stroke = el.getAttribute('stroke');
          return stroke && stroke !== 'none';
        });
        var fillEls = all.filter(function(el) {
          var fill = el.getAttribute('fill');
          return fill && fill !== 'none';
        });
        return { svg: svg, all: all, strokeEls: strokeEls, fillEls: fillEls };
      }

      function prepareToastSVG() {
        var els = getToastSVGEls();
        if (!els) return;
        toastAnimationRunId += 1;
        els.all.forEach(function(el) {
          el.style.transition = 'none';
          el.style.fillOpacity = '';
        });
        els.fillEls.forEach(function(el) {
          el.style.fillOpacity = '0';
        });
        els.strokeEls.forEach(function(el) {
          var len = el.getTotalLength ? el.getTotalLength() : 60;
          el.style.strokeDasharray = len;
          el.style.strokeDashoffset = len;
        });
        els.svg.style.opacity = '1';
      }

      function animateToastSVG() {
        var els = getToastSVGEls();
        if (!els) return;
        var runId = toastAnimationRunId;
        var staggerMs = 18;
        var durationMs = 380;
        els.strokeEls.forEach(function(el, index) {
          setTimeout(function() {
            if (runId !== toastAnimationRunId) return;
            el.style.transition = 'stroke-dashoffset ' + durationMs + 'ms cubic-bezier(0.4,0,0.2,1)';
            el.style.strokeDashoffset = '0';
          }, index * staggerMs);
        });
        setTimeout(function() {
          if (runId !== toastAnimationRunId) return;
          els.fillEls.forEach(function(el) {
            el.style.transition = 'fill-opacity 0.35s ease';
            el.style.fillOpacity = '1';
          });
        }, 200);
      }

      syncButton();
    })();
  </script>
</body>
</html>
