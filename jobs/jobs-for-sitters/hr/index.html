<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Hlídačky.cz — Jobs for sitters</title>
  <link rel="icon" type="image/svg+xml" href="/hlidacky-logo_small.svg">
  <script>
    window.STRINGS = window.STRINGS || {};
    (function() {
      var langs = ['en', 'sk', 'hu', 'at', 'hr', 'cz'];
      var segments = location.pathname.split('/').filter(Boolean);
      var last = segments[segments.length - 1] || '';
      var lang = langs.indexOf(last) !== -1 ? last : '';
      var baseSegments = lang ? segments.slice(0, -1) : segments.slice();
      var base = baseSegments.length ? '/' + baseSegments.join('/') : '';
      document.write('<scr' + 'ipt src="' + base + '/strings.js"><\/scr' + 'ipt>');
      if (lang !== 'cz') {
        document.write('<scr' + 'ipt src="' + base + '/strings_' + (lang || 'en') + '.js"><\/scr' + 'ipt>');
      }
    })();
  </script>
  <style>
    :root {
      --text: #2a3539;
      --muted: #6b7176;
      --bg: #dce2e8;
      --panel: #ffffff;
      --border: #dde2e5;
      --surface: #f7f8fb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: 'soleil', Inter, system-ui, sans-serif;
    }

    .phone-frame {
      width: 390px;
      max-width: 100%;
      height: min(844px, calc(100vh - 48px));
      background: var(--panel);
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(49, 72, 87, 0.18);
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      height: 52px;
      padding: 14px 21px 10px 23px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      background: #fff;
      flex-shrink: 0;
      position: relative;
      z-index: 5;
    }

    .screen-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      background: var(--panel);
    }

    .top-navbar {
      display: flex;
      width: 100%;
      padding: 8px 16px;
      justify-content: center;
      border-bottom: 1px solid #E5E5EA;
      background: #FFF;
      flex-shrink: 0;
      position: relative;
      z-index: 4;
    }

    .top-navbar-inner {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .top-navbar img {
      display: block;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .top-navbar-title {
      color: #2A3539;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: -0.051px;
    }

    .status-time {
      color: #2A3539;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 20px;
      letter-spacing: -0.165px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .status-icons img {
      display: block;
      flex-shrink: 0;
    }

    .content {
      min-height: 100%;
      padding: 0 0 120px;
      display: grid;
      align-content: start;
      gap: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
    }

    .selector-section {
      display: flex;
      width: 375px;
      max-width: 100%;
      padding: 16px 20px 12px;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin: 0 auto;
      background: #FFF;
    }

    .selector-section-label {
      color: #2A3539;
      text-align: center;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: -0.051px;
    }

    .selector-group {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-feature-settings: 'liga' off, 'clig' off;
      font-family: 'soleil', Inter, system-ui, sans-serif;
      font-size: 14px;
      font-style: normal;
      font-weight: 450;
      line-height: 150%;
      letter-spacing: -0.16px;
    }

    .selector-chip {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      border: 1px solid #E5E5EA;
      background: #FFF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
      cursor: pointer;
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }

    .selector-chip:not(.is-selected):hover {
      border-color: #2A3539;
      background: #FFF;
    }

    .selector-chip img {
      width: 24px;
      height: 24px;
      display: block;
      transition: filter 0.15s ease;
    }

    .selector-chip.is-selected {
      border-color: var(--chip-color, #F96073);
    }

    .selector-chip.is-selected:hover {
      border-color: var(--chip-color, #F96073);
      background: #FFF;
    }

    .selector-chip--babysitting { --chip-color: #F96073; }
    .selector-chip--cleaning { --chip-color: #35CFEA; }
    .selector-chip--pet-care { --chip-color: #00D98B; }
    .selector-chip--senior-care { --chip-color: #FD8B25; }
    .selector-chip--tutoring { --chip-color: #B85EFF; }

    .selector-chip:focus-visible {
      outline: 2px solid rgba(42, 53, 57, 0.25);
      outline-offset: 2px;
    }

    .form-demo-section {
      display: flex;
      width: 100%;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      margin: 0 auto;
      border-top: 1px solid #E5E5EA;
      border-bottom: 1px solid #E5E5EA;
      background: #F1F5FB;
    }

    .form-demo-grid {
      width: 375px;
      max-width: 100%;
      display: flex;
      height: 52px;
      align-items: flex-start;
      gap: 12px;
      flex: 1 0 0;
      padding: 0 12px;
    }

    .jobs-field {
      flex: 1 0 0;
      height: 52px;
      border: 1px solid #E5E5EA;
      border-radius: 4px;
      background: #FFF;
      box-shadow: 0 1px 0 rgba(42, 53, 57, 0.04);
      display: flex;
      align-items: center;
      padding: 0 12px;
      min-width: 0;
      position: relative;
    }

    .jobs-field--search {
      gap: 12px;
    }

    .jobs-field--select {
      flex: 0 0 128px;
      position: relative;
      justify-content: space-between;
      gap: 8px;
      overflow: hidden;
    }

    .jobs-field-icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .jobs-field-icon img,
    .jobs-field-icon svg,
    .jobs-field-action img,
    .jobs-field-action svg {
      display: block;
      width: 18px;
      height: 18px;
    }

    .jobs-field-value,
    .jobs-field-input,
    .jobs-field-select {
      min-width: 0;
      color: #2A3539;
      font-family: 'soleil', sans-serif;
      font-size: 16px;
      font-style: normal;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: -0.051px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .jobs-field-input {
      flex: 1 1 auto;
      width: 100%;
      border: 0;
      background: transparent;
      outline: none;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .jobs-field-input::placeholder {
      color: #8B91A3;
    }

    .jobs-field-select {
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      background: transparent;
      outline: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      padding: 0 12px;
      cursor: pointer;
      z-index: 2;
      white-space: nowrap;
      text-overflow: clip;
    }

    .jobs-field-action {
      margin-left: auto;
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #F96073;
      background: none;
      border: 0;
      padding: 0;
      cursor: pointer;
    }

    .jobs-field-action--passive {
      pointer-events: none;
    }

    .location-wrap {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
    }

    .location-suggestions {
      position: fixed;
      z-index: 40;
      top: 0;
      left: 0;
      width: 0;
      background: #fff;
      border: 1px solid #E5E5EA;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      padding: 4px 0;
      margin: 0;
      list-style: none;
      max-height: calc(6 * 44px);
      overflow-y: auto;
      display: none;
    }

    .location-suggestions.open {
      display: block;
    }

    .location-suggestions li {
      padding: 10px 12px;
      font-size: 13px;
      color: #2A3539;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #F7F7F7;
      font-family: 'soleil', sans-serif;
    }

    .location-suggestions li:last-child {
      border-bottom: none;
    }

    .location-suggestions li:hover {
      background: #F7F7F7;
    }

    .location-suggestions li svg {
      flex-shrink: 0;
      opacity: 0.5;
    }

    .placeholder-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
      padding: 18px 16px;
      display: grid;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(42, 53, 57, 0.04);
    }

    .placeholder-card h1 {
      font-size: 28px;
      line-height: 1.04;
      letter-spacing: -0.04em;
    }

    .placeholder-card p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .placeholder-block {
      height: 140px;
      border-radius: 16px;
      border: 1px dashed #d7dde1;
      background:
        linear-gradient(180deg, rgba(247, 248, 251, 0.92) 0%, rgba(242, 245, 248, 0.92) 100%);
    }

    @media (pointer: coarse) and (max-width: 768px) {
      body {
        padding: 0;
        background: #fff;
      }

      .status-bar {
        display: none;
      }

      .top-navbar {
        display: none;
      }

      .phone-frame {
        width: 100%;
        height: 100vh;
        max-height: none;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="phone-frame">
    <div class="status-bar">
      <div class="status-time">9:41</div>
      <div class="status-icons" aria-label="Phone status">
        <img src="/jobs/jobs-for-sitters/assets/mobile-signal.svg" alt="" width="17" height="11">
        <img src="/jobs/jobs-for-sitters/assets/wifi.svg" alt="" width="16" height="11">
        <img src="/jobs/jobs-for-sitters/assets/battery.svg" alt="" width="25" height="12">
      </div>
    </div>
    <div class="top-navbar">
      <div class="top-navbar-inner">
        <img src="/jobs/jobs-for-sitters/assets/icon-paperplane.svg" alt="">
        <div class="top-navbar-title" data-i18n="sittersHub.topNavTitle"></div>
      </div>
    </div>
    <div class="screen-scroll">
      <section class="content">
        <section class="selector-section">
          <div class="selector-section-label" data-i18n="sittersHub.selectorLabel"></div>
          <div class="selector-group" aria-label="Service filters">
            <button class="selector-chip selector-chip--babysitting is-selected" type="button" aria-pressed="true" data-on="/jobs/jobs-for-sitters/assets/babysitting-on.svg" data-off="/jobs/jobs-for-sitters/assets/babysitting-off.svg">
              <img src="/jobs/jobs-for-sitters/assets/babysitting-on.svg" alt="Babysitting">
            </button>
            <button class="selector-chip selector-chip--cleaning" type="button" aria-pressed="false" data-on="/jobs/jobs-for-sitters/assets/cleaning-on.svg" data-off="/jobs/jobs-for-sitters/assets/cleaning-off.svg">
              <img src="/jobs/jobs-for-sitters/assets/cleaning-off.svg" alt="Cleaning">
            </button>
            <button class="selector-chip selector-chip--pet-care" type="button" aria-pressed="false" data-on="/jobs/jobs-for-sitters/assets/pet-care-on.svg" data-off="/jobs/jobs-for-sitters/assets/pet-care-off.svg">
              <img src="/jobs/jobs-for-sitters/assets/pet-care-off.svg" alt="Pet care">
            </button>
            <button class="selector-chip selector-chip--senior-care" type="button" aria-pressed="false" data-on="/jobs/jobs-for-sitters/assets/senior-care-on.svg" data-off="/jobs/jobs-for-sitters/assets/senior-care-off.svg">
              <img src="/jobs/jobs-for-sitters/assets/senior-care-off.svg" alt="Senior care">
            </button>
            <button class="selector-chip selector-chip--tutoring" type="button" aria-pressed="false" data-on="/jobs/jobs-for-sitters/assets/tutoring-on.svg" data-off="/jobs/jobs-for-sitters/assets/tutoring-off.svg">
              <img src="/jobs/jobs-for-sitters/assets/tutoring-off.svg" alt="Tutoring">
            </button>
          </div>
        </section>
        <section class="form-demo-section" aria-label="Filters">
          <div class="form-demo-grid">
            <div class="jobs-field jobs-field--search">
              <span class="jobs-field-icon" aria-hidden="true">
                <img src="/jobs/jobs-for-sitters/assets/icon-search.svg" alt="">
              </span>
              <div class="location-wrap">
                <input id="sitters-location-input" class="jobs-field-input" type="text" value="Praha 2" autocomplete="off">
                <ul class="location-suggestions" id="sitters-location-suggestions"></ul>
              </div>
              <button class="jobs-field-action" id="sitters-location-clear" type="button" aria-label="Clear location">
                <img src="/jobs/jobs-for-sitters/assets/icon-x-mark.svg" alt="">
              </button>
            </div>
            <div class="jobs-field jobs-field--select">
              <div class="jobs-field-value" id="sitters-radius-display">+20 km</div>
              <select class="jobs-field-select" id="sitters-radius-select" aria-label="Distance radius">
                <option>+5 km</option>
                <option>+10 km</option>
                <option>+15 km</option>
                <option selected>+20 km</option>
                <option>+25 km</option>
              </select>
              <span class="jobs-field-action jobs-field-action--passive" aria-hidden="true">
                <img src="/jobs/jobs-for-sitters/assets/icon-chevron-down.svg" alt="">
              </span>
            </div>
          </div>
        </section>
        <article class="placeholder-card">
          <h1 data-i18n="sittersHub.title"></h1>
          <p data-i18n="sittersHub.subtitle"></p>
        </article>
        <div class="placeholder-block" aria-hidden="true"></div>
        <div class="placeholder-block" aria-hidden="true"></div>
        <div class="placeholder-block" aria-hidden="true"></div>
      </section>
    </div>
  </main>
  <script>
    var SITTERS_LOCATION_SUGGESTIONS = [
      'Václavské náměstí, Praha 1',
      'Náměstí Míru, Praha 2',
      'Náměstí Republiky, Praha 1',
      'Karlovo náměstí, Praha 2',
      'Anděl, Praha 5',
      'Dejvická, Praha 6',
      'Jiřího z Poděbrad, Praha 3',
      'Masarykovo nádraží, Praha 1'
    ];

    function t(path) {
      return path.split('.').reduce(function(acc, key) {
        return acc && acc[key] !== undefined ? acc[key] : null;
      }, window.STRINGS) || path;
    }

    document.querySelectorAll('[data-i18n]').forEach(function(node) {
      node.textContent = t(node.getAttribute('data-i18n'));
    });

    document.querySelectorAll('.selector-chip').forEach(function(button) {
      var image = button.querySelector('img');

      button.addEventListener('click', function() {
        var isSelected = button.classList.contains('is-selected');
        button.classList.toggle('is-selected', !isSelected);
        button.setAttribute('aria-pressed', isSelected ? 'false' : 'true');
        image.src = isSelected ? button.getAttribute('data-off') : button.getAttribute('data-on');
      });
    });

    (function initSittersLocationSuggestions() {
      var input = document.getElementById('sitters-location-input');
      var list = document.getElementById('sitters-location-suggestions');
      var clear = document.getElementById('sitters-location-clear');
      var frame = document.querySelector('.phone-frame');
      var scrollRoot = document.querySelector('.screen-scroll');
      if (!input || !list || !clear) return;

      function pinIcon() {
        return '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5C4.79 1.5 3 3.29 3 5.5c0 3.1 4 7 4 7s4-3.9 4-7c0-2.21-1.79-3.5-4-3.5zm0 5.25a1.75 1.75 0 1 1 0-3.5 1.75 1.75 0 0 1 0 3.5z" fill="#BEC2CE"/></svg>';
      }

      function positionList() {
        var inputRect = input.getBoundingClientRect();
        var frameRect = frame ? frame.getBoundingClientRect() : { left: 0, width: window.innerWidth };
        list.style.top = (inputRect.bottom + 4) + 'px';
        list.style.left = frameRect.left + 'px';
        list.style.width = frameRect.width + 'px';
      }

      function renderSuggestions(query) {
        var q = (query || '').trim().toLowerCase();
        var filtered = q ? SITTERS_LOCATION_SUGGESTIONS.filter(function(item) {
          return item.toLowerCase().indexOf(q) !== -1;
        }) : SITTERS_LOCATION_SUGGESTIONS.slice();

        list.innerHTML = filtered.map(function(item) {
          return '<li>' + pinIcon() + item + '</li>';
        }).join('');

        if (filtered.length) {
          positionList();
          list.classList.add('open');
        } else {
          list.classList.remove('open');
        }

        list.querySelectorAll('li').forEach(function(li, index) {
          li.addEventListener('mousedown', function(e) {
            e.preventDefault();
            input.value = filtered[index];
            list.classList.remove('open');
          });
        });
      }

      input.addEventListener('focus', function() {
        renderSuggestions(input.value);
      });

      input.addEventListener('input', function() {
        renderSuggestions(input.value);
      });

      input.addEventListener('blur', function() {
        setTimeout(function() { list.classList.remove('open'); }, 150);
      });

      clear.addEventListener('click', function() {
        input.value = '';
        input.focus();
        renderSuggestions('');
      });

      window.addEventListener('resize', function() {
        if (list.classList.contains('open')) positionList();
      });

      window.addEventListener('scroll', function() {
        if (list.classList.contains('open')) positionList();
      }, true);

      if (scrollRoot) {
        scrollRoot.addEventListener('scroll', function() {
          if (list.classList.contains('open')) positionList();
        });
      }
    })();

    (function initSittersRadiusSelect() {
      var select = document.getElementById('sitters-radius-select');
      var display = document.getElementById('sitters-radius-display');
      if (!select || !display) return;

      function sync() {
        var option = select.options[select.selectedIndex];
        display.textContent = option ? option.text : '';
      }

      select.addEventListener('change', sync);
      sync();
    })();
  </script>
</body>
</html>
