<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hlídacky sitters test v2</title>
  <link rel="icon" type="image/svg+xml" href="/hlidacky-logo_small.svg">
  <style>
    :root {
      --bg: #ecf1f6;
      --card: #ffffff;
      --text: #27363c;
      --muted: #6f7b81;
      --border: #dde2e5;
      --accent: #f96073;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: center;
      font-family: soleil, Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #dce2e8 0%, var(--bg) 100%);
      color: var(--text);
    }

    .card {
      width: min(680px, 100%);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      box-shadow: 0 18px 50px rgba(49, 72, 87, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(32px, 6vw, 44px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.45;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 60px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      background: #fff;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    a:hover {
      transform: translateY(-1px);
      border-color: #cfd7dc;
      box-shadow: 0 12px 24px rgba(49, 72, 87, 0.08);
    }

    .lang {
      display: grid;
      gap: 2px;
    }

    .label {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }

    .path {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .arrow {
      color: var(--accent);
      font-size: 22px;
      line-height: 1;
    }

    @media (max-width: 640px) {
      .card { padding: 22px; }
      .grid { grid-template-columns: 1fr; }
      p { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Jobs for sitters v2 test</h1>
    <p>Choose a language version for quick mobile testing.</p>
    <div class="grid">
      <a href="/sitters-test-v2/cz/"><span class="lang"><span class="label">Cestina</span><span class="path">/sitters-test-v2/cz/</span></span><span class="arrow">-></span></a>
      <a href="/sitters-test-v2/sk/"><span class="lang"><span class="label">Slovencina</span><span class="path">/sitters-test-v2/sk/</span></span><span class="arrow">-></span></a>
      <a href="/sitters-test-v2/hu/"><span class="lang"><span class="label">Magyar</span><span class="path">/sitters-test-v2/hu/</span></span><span class="arrow">-></span></a>
      <a href="/sitters-test-v2/at/"><span class="lang"><span class="label">Deutsch (AT)</span><span class="path">/sitters-test-v2/at/</span></span><span class="arrow">-></span></a>
      <a href="/sitters-test-v2/hr/"><span class="lang"><span class="label">Hrvatski</span><span class="path">/sitters-test-v2/hr/</span></span><span class="arrow">-></span></a>
      <a href="/sitters-test-v2/en/"><span class="lang"><span class="label">English</span><span class="path">/sitters-test-v2/en/</span></span><span class="arrow">-></span></a>
    </div>
  </main>
</body>
</html>
